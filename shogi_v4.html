<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:15px;color:#222;background:#f5f5f0;min-height:100vh}
.header{background:#1F3864;color:#fff;padding:10px 12px;display:flex;align-items:center;justify-content:space-between}

.tab-bar{display:flex;gap:3px;margin-bottom:10px;background:#fff;border-radius:10px;padding:5px;border:1px solid #ddd}
.tab{flex:1;padding:10px 4px;border-radius:8px;border:none;cursor:pointer;font-size:13px;background:transparent;color:#666;font-family:inherit}
.tab.active{background:#1F3864;color:#fff;font-weight:500}
.section{background:#fff;border-radius:10px;padding:12px 12px;margin-bottom:12px;border:1px solid #e0e0e0}

input[type=text]{height:44px;padding:0 12px;border:1px solid #ccc;border-radius:8px;font-size:16px;font-family:inherit}

button{cursor:pointer;padding:10px 16px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:15px;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn-primary{background:#1F3864;color:#fff;border-color:#1F3864}

<script>
var state = {
  players: {A:[], B:[]},
  rounds: 4,
  pairings: {A:[], B:[]},
  results: {A:[], B:[]},
  started: false,
  report: {date:'', place:'労政会館', start:'', end:'', sei:'', fuku:'', note:''}
};

var STORAGE_KEY='shogi_v4';
var LEGACY_STORAGE_KEYS=['shogi_v3'];

// ============================================================
// UTILITY: 共通の純粋/参照系関数(escapeHtml, 名前取得, 料金計算, 勝数集計, 整合チェック, JSON正規化)
// ============================================================

function escapeHtml(value){
  return String(value==null?'':value)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function getName(id,cls){
  var players=state.players[cls];
  for(var i=0;i<players.length;i++){if(players[i].id===id)return players[i].name;}
  return '(削除)';
}

// A-5.1 §11.8 (欠番維持): entry_no を player に永続化する。
//   削除発生後も他参加者の番号を詰めない（再採番は現場混乱を招くため禁止）。
//   旧 A-4 §7 の「配列 index+1 から都度算出」は normalizeState による
//   legacy backfill 経由で互換維持し、新規採番は nextEntryNoForClass で
//   max(entry_no)+1 を採る。entryNoOf は entry_no を優先し、未付与時は
//   index+1 にフォールバック（安全網）。
function entryNoOf(cls,id){
  var players=state.players[cls];
  for(var i=0;i<players.length;i++){
    if(players[i].id===id){
      var en=players[i].entry_no;
      if(typeof en==='number'&&en>0)return ('00'+en).slice(-2);
      return ('00'+(i+1)).slice(-2);
    }
  }
  return '--';
}

// A-5.1 §11.8: 同一クラス内で次に採番すべき entry_no を返す。
//   max(entry_no)+1 を採用し、削除発生で生まれた欠番は再利用しない。
//   entry_no 未付与の legacy player があれば、その場で配列 index+1 を
//   backfill する（既存表示と整合）。
function nextEntryNoForClass(cls,stateObj){
  var s=stateObj||state;
  var players=(s&&s.players&&s.players[cls])||[];
  var maxEntryNo=0;
  for(var i=0;i<players.length;i++){
    var p=players[i];
    if(!p)continue;
    var en=p.entry_no;
    if(typeof en!=='number'||en<=0){
      p.entry_no=i+1;
      en=i+1;
    }
    if(en>maxEntryNo)maxEntryNo=en;
  }
  return maxEntryNo+1;
}

// A-4 §2: 「番号｜名前」の表示フォーマット。プレフィックス幅2桁ゼロ埋め。
function getNameWithNo(id,cls){
  return entryNoOf(cls,id)+'｜'+getName(id,cls);
}

function getFee(member,grade){
  if(grade==='chu')return member==='member'?0:500;
  return member==='member'?500:1000;
}

function calcTotal(){
  var all=state.players.A.concat(state.players.B);
  var t=0;
  for(var i=0;i<all.length;i++)t+=getFee(all[i].member||'member',all[i].grade||'ippan');
  return t;
}

function getWins(cls){
  var wins={};
  var players=state.players[cls];
  for(var i=0;i<players.length;i++)wins[players[i].id]=0;
  var results=state.results[cls];
  for(var r=0;r<results.length;r++){
    for(var m=0;m<results[r].length;m++){
      var match=results[r][m];
      if(match.winner)wins[match.winner]=(wins[match.winner]||0)+1;
    }
  }
  return wins;
}

function pairHasRematch(cls,p1,p2){
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      var match=state.results[cls][r][m];
      if((match.p1===p1&&match.p2===p2)||(match.p1===p2&&match.p2===p1))return true;
    }
  }
  return false;
}

function findPairContainingPlayer(cls,playerId,excludeIdx){
  for(var i=0;i<state.pairings[cls].length;i++){
    if(i===excludeIdx)continue;
    var pair=state.pairings[cls][i];
    if(!pair)continue;
    if(pair.p1===playerId||pair.p2===playerId)return i;
  }
  return -1;
}

function getDuplicatePlayersInPairings(cls){
  var used={};
  var dups=[];
  for(var i=0;i<state.pairings[cls].length;i++){
    var m=state.pairings[cls][i];
    if(!m)continue;
    [m.p1,m.p2].forEach(function(pid){
      if(!pid)return;
      if(used[pid]&&dups.indexOf(pid)<0)dups.push(pid);
      used[pid]=true;
    });
  }
  return dups;
}

function normalizeState(raw){
  var base={players:{A:[],B:[]},rounds:4,pairings:{A:[],B:[]},results:{A:[],B:[]},started:false,report:{date:'', place:'労政会館', start:'', end:'', sei:'', fuku:'', note:''}};
  var s=raw&&typeof raw==='object'?raw:{};
  base.rounds=Number(s.rounds)||4;
  base.started=!!s.started;
  ['A','B'].forEach(function(cls){
    var players=(s.players&&Array.isArray(s.players[cls]))?s.players[cls]:[];
    base.players[cls]=players.map(function(p,idx){
      var pp={
        id:p&&p.id?p.id:('restored_'+cls+'_'+idx+'_'+Date.now()),
        name:p&&p.name?String(p.name):'',
        cls:cls,
        member:p&&p.member==='other'?'other':'member',
        grade:p&&p.grade==='chu'?'chu':'ippan'
      };
      // 支部マスタとの紐付け（F2）。既存JSON（member_id 不在）は従来通り。
      if(p&&typeof p.member_id==='string'&&p.member_id)pp.member_id=p.member_id;
      // A-5.1 §11.8: entry_no を永続化（欠番維持）。
      //   保存済みの entry_no があればそれを使う。
      //   legacy データ（entry_no 不在）は配列 index+1 で補完。
      if(p&&typeof p.entry_no==='number'&&p.entry_no>0){
        pp.entry_no=p.entry_no;
      } else {
        pp.entry_no=idx+1;
      }
      return pp;
    }).filter(function(p){return p.name;});

    // 実在 player id のみ許可。p1/p2 が未登録なら除去、winner が p1/p2 と一致しないなら null 化
    var validIds={};
    for(var i=0;i<base.players[cls].length;i++)validIds[base.players[cls][i].id]=true;
    function sanitizeMatch(m){
      var p1=m&&m.p1&&validIds[m.p1]?m.p1:'';
      var p2=m&&m.p2&&validIds[m.p2]?m.p2:'';
      var winner=m&&m.winner?m.winner:null;
      if(winner!==p1&&winner!==p2)winner=null;
      // A-4 §4: lastModifiedBy が未定義/不正値なら "auto" に補完。"manual" のみ尊重。
      var lastModifiedBy=(m&&m.lastModifiedBy==='manual')?'manual':'auto';
      return {p1:p1,p2:p2,winner:winner,lastModifiedBy:lastModifiedBy};
    }

    base.pairings[cls]=((s.pairings&&Array.isArray(s.pairings[cls]))?s.pairings[cls]:[])
      .map(sanitizeMatch).filter(function(m){return m.p1&&m.p2;});

    base.results[cls]=((s.results&&Array.isArray(s.results[cls]))?s.results[cls]:[]).map(function(round){
      return Array.isArray(round)?round.map(sanitizeMatch).filter(function(m){return m.p1&&m.p2;}):[];
    });
  });
  if(s.report&&typeof s.report==='object'){
    ['date','place','start','end','sei','fuku','note'].forEach(function(k){
      if(typeof s.report[k]==='string')base.report[k]=s.report[k];
    });
  }
  // 支部マスタ連携用の tournament_id を保持（F2）
  if(typeof s.tournament_id==='string'&&s.tournament_id)base.tournament_id=s.tournament_id;
  return base;
}

// ============================================================
// STORAGE: localStorageへの保存と復元(旧版キーからの移行込み)
// ============================================================

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){notifyError('保存に失敗しました。容量超過か、プライベートブラウズの可能性があります。大会データをコピー（バックアップ）してください。');}}
function load(){
  // 現行キー → 旧キーの順に試行。各 key は parse 失敗時に次の key にフォールバック。
  var keys=[STORAGE_KEY].concat(LEGACY_STORAGE_KEYS);
  for(var i=0;i<keys.length;i++){
    var d=null;
    try{d=localStorage.getItem(keys[i]);}catch(e){continue;}
    if(!d)continue;
    try{
      state=normalizeState(JSON.parse(d));
      return;
    }catch(e){
      // この key の JSON は壊れている → 次の key を試す
    }
  }
  // すべての key が空 or 壊れている → 初期 state を normalize
  state=normalizeState(state);
}

// ============================================================
// BRANCH MASTER (支部マスタ) — Phase A-1
//   localStorage キー: shogi_branch_master（既存 state とは別管理）
//   破損時も既存大会運営を止めない（normalizeBranchMaster）
//   resetAll() ではマスタを消さない（仕様書 3.4.1）
// ============================================================

var BRANCH_MASTER_KEY='shogi_branch_master';
var BRANCH_MASTER_SCHEMA_VERSION=1;
// 仕様書 v6 §3.7 / Codex Minor #2: 同一セッション内で crypto 不在通知を1度だけ出すためのフラグ
var _phaseA2State={cryptoNotificationShown:false};

// A-4 §3.4.1: マスタタブの「削除済みを表示」トグル状態（タブ切替で保持）
var _masterShowDeleted=false;

function createEmptyBranchMaster(){
  return {schema_version:BRANCH_MASTER_SCHEMA_VERSION,updated_at:new Date().toISOString(),members:[]};
}

function isValidYmd(s){
  // 仕様書 v5 §3.5 / Codex Minor: 形式チェックに加え Date オブジェクトで実在検証
  if(typeof s!=='string')return false;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(s))return false;
  var d=new Date(s+'T00:00:00Z');
  if(isNaN(d.getTime()))return false;
  // toISOString が同じ日付を返すか（例: '2026-02-30' は '2026-03-02' に補正される）
  return d.toISOString().slice(0,10)===s;
}

function todayYmd(){
  var d=new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}

function generateMemberId(master){
  // 仕様書 v5 §3.3 / Codex MF #4: crypto.randomUUID 不在時は明示 throw。
  // 旧実装は raw='' で 'm_' だけの不正 ID を保存していた。スマホ運用前提のため
  // サイレントフォールバックではなくエラーで気付ける設計とする。
  if(typeof crypto==='undefined'||!crypto.randomUUID){
    throw new Error('crypto.randomUUID が利用不可な環境です。古い iOS Safari 等の場合、ブラウザを更新してください。');
  }
  for(var i=0;i<3;i++){
    // 必ず replace(/-/g,'') を先に行う（slice 先行だとハイフンが残る危険）
    var id='m_'+crypto.randomUUID().replace(/-/g,'').slice(0,12);
    var dup=false;
    if(master&&Array.isArray(master.members)){
      for(var j=0;j<master.members.length;j++){
        if(master.members[j]&&master.members[j].id===id){dup=true;break;}
      }
    }
    if(!dup)return id;
  }
  throw new Error('member_id 生成に3回連続で失敗。マスタが異常です。');
}

function normalizePersonName(name){
  if(typeof name!=='string')return '';
  // 仕様書 3.4.4: 全角空白→半角空白、連続空白を単一空白、前後空白除去
  return name.replace(/　/g,' ').replace(/\s+/g,' ').replace(/^\s+|\s+$/g,'');
}

// 仕様書 v6 §3.4: ふりがな正規化（A-2 ふりがな3点セット用）
// - カタカナ → ひらがな統一（[ァ-ヶ] = U+30A1〜U+30F6 を 0x60 減算）
// - 前後空白除去 + 途中の半角・全角空白も削除（ふりがな用途のため）
// - 長音符（ー）/ 小書き文字は保持
// - 半角カナ（U+FF66-FF9F）は A-2 非対応（変換せず → getYomiInitialRow で other 扱い）
// - undefined / null / 非文字列でも安全（ChatGPT D 反映）
function normalizeYomi(yomi){
  if(typeof yomi!=='string')return '';
  return yomi
    .replace(/^\s+|\s+$/g,'')
    .replace(/[ァ-ヶ]/g,function(m){return String.fromCharCode(m.charCodeAt(0)-0x60);})
    .replace(/[\s　]/g,'');
}

// 仕様書 v6 §3.5: 50音タブ用の行判定
// 入力は normalizeYomi 済み前提（ひらがな正規化済み）
// 12分類: a / ka / sa / ta / na / ha / ma / ya / ra / wa / other
// - 濁音・半濁音は同行（が→か行、ぱ→は行）
// - 小書き文字も同行（ぁ→あ行、ょ→や行、っ→た行）
// - ゔ（ヴ由来）/ ゕ（ヵ由来）/ ゖ（ヶ由来）/ 半角カナ / 数字 / 記号 / 先頭長音符はすべて other
function getYomiInitialRow(yomi){
  if(!yomi)return 'other';
  var first=yomi.charAt(0);
  if('あいうえおぁぃぅぇぉ'.indexOf(first)>=0)return 'a';
  if('かきくけこがぎぐげご'.indexOf(first)>=0)return 'ka';
  if('さしすせそざじずぜぞ'.indexOf(first)>=0)return 'sa';
  if('たちつてとだぢづでどっ'.indexOf(first)>=0)return 'ta';
  if('なにぬねの'.indexOf(first)>=0)return 'na';
  if('はひふへほばびぶべぼぱぴぷぺぽ'.indexOf(first)>=0)return 'ha';
  if('まみむめも'.indexOf(first)>=0)return 'ma';
  if('やゆよゃゅょ'.indexOf(first)>=0)return 'ya';
  if('らりるれろ'.indexOf(first)>=0)return 'ra';
  if('わをん'.indexOf(first)>=0)return 'wa';
  return 'other';
}

// Phase 1 §2.1: 市町村(city)正規化。trim + maxlength 20 + null/undefined→""。
// 手入力・JSON import・旧データ補完すべてで同一ルールを適用するため一箇所に集約。
function normalizeCity(value){
  if(value==null)return '';
  if(typeof value!=='string')return '';
  return value.replace(/^\s+|\s+$/g,'').slice(0,20);
}

function normalizeBranchMaster(raw){
  // 仕様書 3.5: 破損データを与えられても落ちない／既存運営を止めない
  if(!raw||typeof raw!=='object'||Array.isArray(raw))return createEmptyBranchMaster();
  var schema_version=Number(raw.schema_version);
  if(!schema_version||isNaN(schema_version))schema_version=BRANCH_MASTER_SCHEMA_VERSION;
  if(schema_version!==BRANCH_MASTER_SCHEMA_VERSION)return createEmptyBranchMaster();

  var membersRaw=Array.isArray(raw.members)?raw.members:[];
  var seenIds={};
  var members=[];
  for(var i=0;i<membersRaw.length;i++){
    var m=membersRaw[i];
    if(!m||typeof m!=='object')continue;
    var id=typeof m.id==='string'?m.id:'';
    var name=typeof m.name==='string'?m.name:'';
    if(!id||!name||seenIds[id])continue;
    seenIds[id]=true;

    var yomi=typeof m.yomi==='string'?m.yomi:'';
    var last_class=(m.last_class==='A'||m.last_class==='B')?m.last_class:null;
    var last_attended=isValidYmd(m.last_attended)?m.last_attended:'';
    var first_attended=isValidYmd(m.first_attended)?m.first_attended:'';
    if(!last_attended&&first_attended)last_attended=first_attended;
    if(!first_attended&&last_attended)first_attended=last_attended;
    if(!last_attended&&!first_attended){var t=todayYmd();last_attended=t;first_attended=t;}

    var tidsRaw=Array.isArray(m.tournament_ids)?m.tournament_ids:[];
    var seenTid={};
    var tournament_ids=[];
    for(var ti=0;ti<tidsRaw.length;ti++){
      var t2=tidsRaw[ti];
      if(typeof t2==='string'&&t2&&!seenTid[t2]){seenTid[t2]=true;tournament_ids.push(t2);}
    }

    var memberStatus=(m.member==='other')?'other':'member';
    var gradeStatus=(m.grade==='chu')?'chu':'ippan';

    members.push({
      id:id,
      name:name,
      yomi:yomi,
      last_class:last_class,
      last_attended:last_attended,
      first_attended:first_attended,
      attendance_count:tournament_ids.length,
      tournament_ids:tournament_ids,
      deleted:m.deleted===true,
      deleted_at:typeof m.deleted_at==='string'?m.deleted_at:null,
      note:typeof m.note==='string'?m.note:'',
      member:memberStatus,
      grade:gradeStatus,
      // Phase 1 §2 / §4: city フィールド。旧データ(city 不在)は normalizeCity('') で '' 補完。
      // schema_version は bump せず(migration 関数なし、bump で既存 v=1 全消失するため、§8.1 「無し」相当)。
      city:normalizeCity(m.city)
    });
  }
  var updated_at=typeof raw.updated_at==='string'?raw.updated_at:new Date().toISOString();
  return {schema_version:BRANCH_MASTER_SCHEMA_VERSION,updated_at:updated_at,members:members};
}

function loadBranchMaster(){
  var raw=null;
  try{raw=localStorage.getItem(BRANCH_MASTER_KEY);}catch(e){return createEmptyBranchMaster();}
  if(!raw)return createEmptyBranchMaster();
  try{
    return normalizeBranchMaster(JSON.parse(raw));
  }catch(e){
    // 仕様書 v5 §3.5 / Codex MF #3: 破損 raw を読んだ場合、空マスタに破損フラグを付与。
    // 既存 localStorage は自動上書きしない（呼び出し側が saveBranchMaster をスキップする）。
    if(typeof console!=='undefined'&&console.warn)console.warn('支部マスタの読込に失敗。空マスタで継続。既存 localStorage は保持。',e);
    var empty=createEmptyBranchMaster();
    empty._loaded_with_corruption=true;
    return empty;
  }
}

function saveBranchMaster(master){
  try{
    // 仕様書 v5 §3.5: _loaded_with_corruption は永続化対象外（clone から除外）
    var clone={
      schema_version:master.schema_version,
      updated_at:new Date().toISOString(),
      members:master.members
    };
    master.updated_at=clone.updated_at;
    localStorage.setItem(BRANCH_MASTER_KEY,JSON.stringify(clone));
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('支部マスタの保存に失敗。',e);
  }
}

function findMemberCandidates(participant,master){
  if(!participant||!master||!Array.isArray(master.members))return [];
  var pname=normalizePersonName(participant.name||'');
  if(!pname)return [];
  var pyomi=typeof participant.yomi==='string'?participant.yomi:'';
  var out=[];
  for(var i=0;i<master.members.length;i++){
    var m=master.members[i];
    if(!m||m.deleted)continue;
    var nm=normalizePersonName(m.name||'');
    if(nm===pname){out.push(m);continue;}
    // 異体字（髙/高 等）は自動統合しない（仕様書 3.4.4 の方針）
    if(pyomi&&m.yomi&&pyomi===m.yomi)out.push(m);
  }
  return out;
}

// ============================================================
// QUICK FILTER (A-3 §1-2 / クイックフィルタ): 過去参加者パネル用
//   3種・排他選択（再タップで解除）。検索・50音タブと AND。
// ============================================================
var QUICK_FILTER_RECENT_LAST='recent_last';   // 前回参加（最終大会日と一致）
var QUICK_FILTER_WITHIN_3MO='within_3mo';     // 3ヶ月以内（90日以内）
var QUICK_FILTER_REGULAR='regular';           // 常連（attendance_count >= 5）
var QUICK_FILTER_NO_YOMI='no_yomi';           // A-4 §3.5.4: ふりがな未入力
var QUICK_FILTER_REGULAR_MIN=5;
var QUICK_FILTER_WITHIN_DAYS=90;

// A-4 §3.5.1 (Should Fix 4): ふりがな未入力判定の共通関数。
// サマリー・バッジ・フィルタ・テストすべてでこの関数を使う。
function isNoYomiMember(member){
  if(!member)return true;
  return !normalizeYomi(member.yomi||'');
}

// 全 member の last_attended の最大日（空文字 = データなし）
function computeLatestAttendedDate(members){
  if(!Array.isArray(members))return '';
  var max='';
  for(var i=0;i<members.length;i++){
    var m=members[i];
    if(!m)continue;
    if(typeof m.last_attended==='string'&&m.last_attended>max)max=m.last_attended;
  }
  return max;
}

// today から days 日前の YMD（純粋関数）
function computeDateBefore(todayStr,days){
  if(!isValidYmd(todayStr))return '';
  var parts=todayStr.split('-');
  var d=new Date(Number(parts[0]),Number(parts[1])-1,Number(parts[2]));
  d.setDate(d.getDate()-days);
  var y=d.getFullYear();
  var m=('0'+(d.getMonth()+1)).slice(-2);
  var dd=('0'+d.getDate()).slice(-2);
  return y+'-'+m+'-'+dd;
}

// クイックフィルタ適用（純粋関数）
//   filterKey: null/未指定 → 全件、それ以外は QUICK_FILTER_* のいずれか
//   members は呼び出し側で deleted 除外済みを想定（既存の buildPastParticipantsPanelHtml と同じ）
function applyQuickFilter(members,filterKey,todayStr){
  if(!Array.isArray(members))return [];
  if(!filterKey)return members.slice();
  if(filterKey===QUICK_FILTER_RECENT_LAST){
    var latest=computeLatestAttendedDate(members);
    if(!latest)return [];
    return members.filter(function(m){return m&&m.last_attended===latest;});
  }
  if(filterKey===QUICK_FILTER_WITHIN_3MO){
    if(!isValidYmd(todayStr))return [];
    var threshold=computeDateBefore(todayStr,QUICK_FILTER_WITHIN_DAYS);
    if(!threshold)return [];
    return members.filter(function(m){
      if(!m||typeof m.last_attended!=='string'||!m.last_attended)return false;
      return m.last_attended>=threshold&&m.last_attended<=todayStr;
    });
  }
  if(filterKey===QUICK_FILTER_REGULAR){
    return members.filter(function(m){return m&&(Number(m.attendance_count)||0)>=QUICK_FILTER_REGULAR_MIN;});
  }
  // A-4 §3.5.4: ふりがな未入力フィルタ
  if(filterKey===QUICK_FILTER_NO_YOMI){
    return members.filter(isNoYomiMember);
  }
  return members.slice();
}

// ============================================================
// MASTER IMPORT (A-3 §1-3 / F8-b): フォーマット検出 + 上書きインポート
//   F8 は branch master 形式のみを扱う（大会データは別経路＝マイグレ機能）。
// ============================================================

// 入力 JSON の形式を判定: 'branch_master' | 'tournament' | 'unknown'
function detectImportFormat(parsed){
  if(!parsed||typeof parsed!=='object'||Array.isArray(parsed))return 'unknown';
  // 大会データは players（オブジェクト）を持つ → F8 では扱わない
  if(parsed.players&&typeof parsed.players==='object'&&!Array.isArray(parsed.players))return 'tournament';
  // branch master は members（配列）を持つ
  if(Array.isArray(parsed.members))return 'branch_master';
  return 'unknown';
}

// 上書きインポート: parsed を新しいマスタとして返す（純粋関数、mutate しない）
//   戻り値: {success, error?, newMaster?}
//   error: 'tournament_format' | 'invalid_format' | 'parse_failed'
function applyOverwriteImport(parsed){
  var fmt=detectImportFormat(parsed);
  if(fmt==='tournament')return {success:false,error:'tournament_format'};
  if(fmt==='unknown')return {success:false,error:'invalid_format'};
  // branch_master: normalizeBranchMaster で堅牢化（破損行は除外、tombstone は保持）
  var normalized=normalizeBranchMaster(parsed);
  return {success:true,newMaster:normalized};
}

// マージインポート: member.id を基準に統合、既存側優先（純粋関数、mutate しない）
//   戻り値: {success, error?, newMaster?, summary?}
//   ルール（v7.3 §1-3 / 実装依頼書 F8 マージ）:
//     - id 一致 → 統合（name/yomi/member/grade/last_class/note は既存維持）
//     - tournament_ids は union
//     - last_attended は新しい日付
//     - first_attended は古い日付
//     - attendance_count = max(existing, imported, unionTournamentIds.length)
//     - deleted=true は deleted=false に自動復元しない（既存の deleted 状態を維持）
//     - id 不一致は別人扱い（name+yomi 一致では自動統合しない）
function applyMergeImport(parsed,currentMaster){
  var fmt=detectImportFormat(parsed);
  if(fmt==='tournament')return {success:false,error:'tournament_format'};
  if(fmt==='unknown')return {success:false,error:'invalid_format'};

  // normalize で deep copy + 堅牢化（mutate 防止）
  var imported=normalizeBranchMaster(parsed);
  var working=normalizeBranchMaster(currentMaster||createEmptyBranchMaster());

  var existingById={};
  for(var i=0;i<working.members.length;i++){
    existingById[working.members[i].id]=working.members[i];
  }

  var added=0,merged=0;
  for(var j=0;j<imported.members.length;j++){
    var imp=imported.members[j];
    var ex=existingById[imp.id];
    if(!ex){
      // 既存に id なし → 新規として追加（tombstone 状態は保持）
      working.members.push(imp);
      added++;
      continue;
    }
    // id 一致 → 統合（既存側優先 + 集計ルール）
    var seen={};
    var unionIds=[];
    var arrA=Array.isArray(ex.tournament_ids)?ex.tournament_ids:[];
    var arrB=Array.isArray(imp.tournament_ids)?imp.tournament_ids:[];
    for(var ai=0;ai<arrA.length;ai++){
      var ta=arrA[ai];
      if(typeof ta==='string'&&ta&&!seen[ta]){seen[ta]=true;unionIds.push(ta);}
    }
    for(var bi=0;bi<arrB.length;bi++){
      var tb=arrB[bi];
      if(typeof tb==='string'&&tb&&!seen[tb]){seen[tb]=true;unionIds.push(tb);}
    }
    ex.tournament_ids=unionIds;

    if(isValidYmd(imp.last_attended)){
      if(!ex.last_attended||imp.last_attended>ex.last_attended)ex.last_attended=imp.last_attended;
    }
    if(isValidYmd(imp.first_attended)){
      if(!ex.first_attended||imp.first_attended<ex.first_attended)ex.first_attended=imp.first_attended;
    }

    var ac=Math.max(
      Number(ex.attendance_count)||0,
      Number(imp.attendance_count)||0,
      unionIds.length
    );
    ex.attendance_count=ac;

    // tombstone は安全側ルール（OR）: 既存 OR インポートのどちらかが deleted=true なら true 維持。
    // ・既存 deleted=true → そのまま維持（変更なし、deleted_at も既存維持）
    // ・既存 deleted=false + imported deleted=true → deleted=true、deleted_at はインポート側採用
    //   （existing 側に元々 deleted_at は無いため）
    // 一度削除と判定された member を OR ルールで保護する（誤復元防止）。
    if(ex.deleted!==true&&imp.deleted===true){
      ex.deleted=true;
      ex.deleted_at=(typeof imp.deleted_at==='string'&&imp.deleted_at)?imp.deleted_at:todayYmd();
    }

    // name / yomi / member / grade / last_class / note は既存維持（変更しない）
    merged++;
  }

  return {success:true,newMaster:working,summary:{added:added,merged:merged,total:working.members.length}};
}

// テキスト → parsed JSON（JSON.parse のラッパ、失敗時は null）
function safeParseImportText(text){
  if(typeof text!=='string')return null;
  // BOM 除去
  if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
  var trimmed=text.replace(/^\s+|\s+$/g,'');
  if(!trimmed)return null;
  try{return JSON.parse(trimmed);}catch(e){return null;}
}

// ============================================================
// MASTER EXPORT (A-3 §1-3 / F8-a): branch master 全体を JSON 文字列に
//   schema_version / updated_at / members（tombstone 含む）を保持。
//   _loaded_with_corruption 等の内部フラグは出力しない。
//   純粋関数（mutate しない）。
// ============================================================
function serializeBranchMasterForExport(master){
  if(!master||typeof master!=='object')return null;
  var clone={
    schema_version:typeof master.schema_version==='number'?master.schema_version:BRANCH_MASTER_SCHEMA_VERSION,
    updated_at:typeof master.updated_at==='string'?master.updated_at:new Date().toISOString(),
    members:Array.isArray(master.members)?master.members:[]
  };
  return JSON.stringify(clone,null,2);
}

function buildMasterExportFilename(dateYmd){
  var ymd=isValidYmd(dateYmd)?dateYmd:todayYmd();
  return 'shogi_branch_master_'+ymd+'.json';
}

// ============================================================
// Phase 2 §5.1: マスタリセット(純粋関数)
//   members を空にした新マスタを返す(mutate しない、tombstone も全削除)。
//   呼び出し側で saveBranchMaster を実行する責務。
//   戻り値: {success, newMaster}
// ============================================================
function applyMasterReset(master){
  if(!master||typeof master!=='object')return {success:false,error:'invalid_master'};
  return {
    success:true,
    newMaster:{
      schema_version:typeof master.schema_version==='number'?master.schema_version:BRANCH_MASTER_SCHEMA_VERSION,
      updated_at:new Date().toISOString(),
      members:[]
    }
  };
}

// ============================================================
// Phase 2 §2.1: 22 名取り込みデータ検証(純粋関数)
//   配列長 22 / A 18・B 4 / 全件 last_played === EXPECTED_DATE / name 非空 / city ≤ 20。
//   1 件でも fail があれば全件ロールバック(applyPhase2Import 側で実行抑止)。
//   戻り値: {ok, errors:[{index,field,message}], summary:{total,classA,classB}}
// ============================================================
var PHASE2_EXPECTED_DATE='2026-04-12';
var PHASE2_EXPECTED_TOTAL=22;
var PHASE2_EXPECTED_A=18;
var PHASE2_EXPECTED_B=4;

function validatePhase2ImportData(parsed){
  var errors=[];
  if(!Array.isArray(parsed)){
    return {ok:false,errors:[{index:-1,field:'root',message:'配列形式の JSON ではありません'}],summary:null};
  }
  if(parsed.length!==PHASE2_EXPECTED_TOTAL){
    errors.push({index:-1,field:'length',message:'配列長が '+PHASE2_EXPECTED_TOTAL+' 名ではありません(実際: '+parsed.length+' 名)'});
  }
  var classA=0,classB=0;
  for(var i=0;i<parsed.length;i++){
    var p=parsed[i];
    if(!p||typeof p!=='object'||Array.isArray(p)){
      errors.push({index:i,field:'object',message:'要素がオブジェクトではありません'});
      continue;
    }
    if(typeof p.name!=='string'||!p.name.replace(/^\s+|\s+$/g,'')){
      errors.push({index:i,field:'name',message:'name が空または非文字列です'});
    }
    if(p.last_played!==PHASE2_EXPECTED_DATE){
      errors.push({index:i,field:'last_played',message:'last_played が '+PHASE2_EXPECTED_DATE+' ではありません(実際: '+JSON.stringify(p.last_played)+')'});
    }
    if(p.last_class!=='A'&&p.last_class!=='B'){
      errors.push({index:i,field:'last_class',message:'last_class が "A" または "B" ではありません(実際: '+JSON.stringify(p.last_class)+')'});
    }else if(p.last_class==='A')classA++;
    else if(p.last_class==='B')classB++;
    var cityRaw=(p.city==null)?'':String(p.city);
    if(cityRaw.length>20){
      errors.push({index:i,field:'city',message:'city が 20 文字を超えています(実際: '+cityRaw.length+' 文字)'});
    }
  }
  if(classA!==PHASE2_EXPECTED_A||classB!==PHASE2_EXPECTED_B){
    errors.push({index:-1,field:'class_breakdown',message:'A 級 '+PHASE2_EXPECTED_A+' / B 級 '+PHASE2_EXPECTED_B+' 件ではありません(実際: A '+classA+' / B '+classB+')'});
  }
  return {
    ok:errors.length===0,
    errors:errors,
    summary:{total:parsed.length,classA:classA,classB:classB}
  };
}

// ============================================================
// Phase 2 §5.2: 配列形式の 22 名データを members 配列に変換(純粋関数)
//   各要素に id 自動生成 / last_played → last_attended / first_attended = last_played を割当。
//   city は Phase 1 normalizeCity 経由で正規化。yomi/member/grade は空文字許容。
//   呼び出し側で空マスタ前提を保証(applyPhase2Import 側で空マスタ検証 + ロールバック)。
//   戻り値: {success, error?, members?}
// ============================================================
function convertPhase2ParticipantsToMembers(parsed,master){
  if(!Array.isArray(parsed))return {success:false,error:'invalid_parsed'};
  if(!master||!Array.isArray(master.members))return {success:false,error:'invalid_master'};
  var working={schema_version:master.schema_version,updated_at:master.updated_at,members:master.members.slice()};
  var members=[];
  try{
    for(var i=0;i<parsed.length;i++){
      var p=parsed[i];
      var newId=generateMemberId(working);
      var memberStatus=(p.member==='other')?'other':'member';
      var gradeStatus=(p.grade==='chu')?'chu':'ippan';
      var nameNorm=normalizePersonName(typeof p.name==='string'?p.name:'');
      var yomiNorm=normalizeYomi(typeof p.yomi==='string'?p.yomi:'');
      var cityNorm=normalizeCity(p.city);
      var date=isValidYmd(p.last_played)?p.last_played:todayYmd();
      var lastClass=(p.last_class==='A'||p.last_class==='B')?p.last_class:null;
      var newMember={
        id:newId,
        name:nameNorm,
        yomi:yomiNorm,
        last_class:lastClass,
        last_attended:date,
        first_attended:date,
        attendance_count:0,
        tournament_ids:[],
        deleted:false,
        deleted_at:null,
        note:'',
        member:memberStatus,
        grade:gradeStatus,
        city:cityNorm
      };
      members.push(newMember);
      working.members.push(newMember);
    }
  }catch(e){
    return {success:false,error:'convert_failed',message:(e&&e.message)?String(e.message):''};
  }
  return {success:true,members:members};
}

// ============================================================
// Phase 2 §5.2: 22 名取り込み(純粋関数、空マスタ専用)
//   既存マスタが 1 件以上(deleted=false)あれば拒否、tombstone のみは許容。
//   §2.1 検証 + 変換 + 全件 or 0 件のロールバックを保証する。
//   戻り値: {success, error?, errors?, summary?, newMaster?}
// ============================================================
function applyPhase2Import(parsed,master){
  if(!master||!Array.isArray(master.members))return {success:false,error:'invalid_master'};
  // 空マスタ専用ガード(deleted=false の生存件数で判定。tombstone のみのマスタは許容)
  var liveCount=0;
  for(var li=0;li<master.members.length;li++){if(!master.members[li].deleted)liveCount++;}
  if(liveCount>0){
    return {success:false,error:'master_not_empty',liveCount:liveCount};
  }
  // §2.1 検証
  var validation=validatePhase2ImportData(parsed);
  if(!validation.ok){
    return {success:false,error:'validation_failed',errors:validation.errors,summary:validation.summary};
  }
  // 変換(全件成功 or 0 件適用)
  var conv=convertPhase2ParticipantsToMembers(parsed,master);
  if(!conv.success){
    return {success:false,error:conv.error||'convert_failed'};
  }
  // tombstone は維持して新規 members を追加(空マスタが「生存 0 + tombstone 0」の通常ケースなら結果は新規 22 件のみ)
  var newMembers=master.members.slice().concat(conv.members);
  return {
    success:true,
    summary:validation.summary,
    newMaster:{
      schema_version:master.schema_version,
      updated_at:new Date().toISOString(),
      members:newMembers
    }
  };
}

// ============================================================
// MASTER DELETE (A-3 §1-2 / F7-b): tombstone（deleted:true + deleted_at）
//   物理削除はしない。復元 UI は A-4 以降。
//   戻り値: {success, error?}
// ============================================================
function applyMasterMemberDelete(memberId,master,dateYmd){
  if(!master||!Array.isArray(master.members))return {success:false,error:'invalid_master'};
  if(typeof memberId!=='string'||!memberId)return {success:false,error:'invalid_id'};
  var target=null;
  for(var i=0;i<master.members.length;i++){
    if(master.members[i].id===memberId){target=master.members[i];break;}
  }
  if(!target)return {success:false,error:'not_found'};
  if(target.deleted===true)return {success:false,error:'already_deleted'};

  var dateStr=isValidYmd(dateYmd)?dateYmd:todayYmd();
  target.deleted=true;
  target.deleted_at=dateStr;
  return {success:true};
}

// ============================================================
// MASTER RESTORE (A-4 §3.4.3 / F7-e): tombstone から復元
//   物理削除しない。member_id は変更しない。
//   戻り値: {success, error?}
//   エラー: invalid_master / invalid_id / not_found / not_deleted
// ============================================================
function applyMasterMemberRestore(memberId,master){
  if(!master||!Array.isArray(master.members))return {success:false,error:'invalid_master'};
  if(typeof memberId!=='string'||!memberId)return {success:false,error:'invalid_id'};
  var target=null;
  for(var i=0;i<master.members.length;i++){
    if(master.members[i].id===memberId){target=master.members[i];break;}
  }
  if(!target)return {success:false,error:'not_found'};
  if(target.deleted!==true)return {success:false,error:'not_deleted'};

  target.deleted=false;
  target.deleted_at=null;
  return {success:true};
}

// ============================================================
// MASTER EDIT (A-3 §1-2 / F7-a): name + yomi (+ A-4 options) を編集
//   参加履歴・削除フラグは触らない。
//   A-4 §3.3.2 (Must Fix 2): シグネチャ一本化
//     applyMasterMemberEdit(memberId, newName, newYomi, master, options)
//     - options 省略時: member/grade は変更しない（既存挙動維持・A3-S2-edit-01〜29 互換）
//     - options.member: 'member' | 'other' のみ許容（不正値で invalid_member_value）
//     - options.grade : 'ippan'  | 'chu'   のみ許容（不正値で invalid_grade_value）
//   戻り値: {success, error?, duplicateCount?}
// ============================================================
function applyMasterMemberEdit(memberId,newName,newYomi,master,options){
  if(!master||!Array.isArray(master.members))return {success:false,error:'invalid_master'};
  if(typeof memberId!=='string'||!memberId)return {success:false,error:'invalid_id'};
  var target=null;
  for(var i=0;i<master.members.length;i++){
    if(master.members[i].id===memberId){target=master.members[i];break;}
  }
  if(!target)return {success:false,error:'not_found'};
  if(target.deleted===true)return {success:false,error:'deleted'};

  var nm=normalizePersonName(typeof newName==='string'?newName:'');
  var yo=normalizeYomi(typeof newYomi==='string'?newYomi:'');
  if(!nm)return {success:false,error:'empty_name'};

  // A-4 §3.3.2: options バリデーション（変更前にチェックして失敗時は target を触らない）
  // A-4.3 §2.5: last_class（A/B/null）も追加
  // Phase 1 §2.1: city も options 経由で受け取り、normalizeCity で正規化する(undefined は「変更しない」)
  var hasMemberOpt=(options&&typeof options==='object'&&Object.prototype.hasOwnProperty.call(options,'member'));
  var hasGradeOpt =(options&&typeof options==='object'&&Object.prototype.hasOwnProperty.call(options,'grade'));
  var hasLastClassOpt=(options&&typeof options==='object'&&Object.prototype.hasOwnProperty.call(options,'last_class'));
  var hasCityOpt =(options&&typeof options==='object'&&Object.prototype.hasOwnProperty.call(options,'city'));
  if(hasMemberOpt&&options.member!=='member'&&options.member!=='other'){
    return {success:false,error:'invalid_member_value'};
  }
  if(hasGradeOpt&&options.grade!=='ippan'&&options.grade!=='chu'){
    return {success:false,error:'invalid_grade_value'};
  }
  // A-4.5 §3.4: null 受理を撤廃。A / B のみ受理(undefined は「変更しない」を意味)
  if(hasLastClassOpt&&options.last_class!=='A'&&options.last_class!=='B'){
    return {success:false,error:'invalid_last_class_value'};
  }

  target.name=nm;
  target.yomi=yo;
  if(hasMemberOpt)target.member=options.member;
  if(hasGradeOpt)target.grade=options.grade;
  if(hasLastClassOpt)target.last_class=options.last_class;
  // Phase 1 §2.1: normalizeCity で trim + maxlength 20 + null/undefined→"" を保存時にも保証
  if(hasCityOpt)target.city=normalizeCity(options.city);

  // 同名重複検知（自分以外・deleted 以外、normalize 後一致）
  var dupCount=0;
  for(var j=0;j<master.members.length;j++){
    var other=master.members[j];
    if(!other||other.id===memberId||other.deleted===true)continue;
    if(normalizePersonName(other.name||'')===nm)dupCount++;
  }
  return {success:true,duplicateCount:dupCount};
}

// ============================================================
// SUGGEST (A-3 §1-1): 登録画面サジェスト
//   query は inp-name の生入力。最大5件。deleted=true・既登録 member_id は除外。
// ============================================================
var SUGGEST_MAX=5;

function findMasterSuggestions(query,master,excludedMemberIds){
  if(!master||!Array.isArray(master.members))return [];
  if(typeof query!=='string')return [];
  var trimmed=query.replace(/^\s+|\s+$/g,'');
  if(!trimmed)return [];
  var qn=normalizePersonName(query);
  var qy=normalizeYomi(query);
  if(!qn&&!qy)return [];
  var excluded={};
  if(Array.isArray(excludedMemberIds)){
    for(var ei=0;ei<excludedMemberIds.length;ei++){
      var eid=excludedMemberIds[ei];
      if(typeof eid==='string'&&eid)excluded[eid]=true;
    }
  }
  var out=[];
  for(var i=0;i<master.members.length;i++){
    var m=master.members[i];
    if(!m||m.deleted===true)continue;
    if(excluded[m.id])continue;
    var hit=false;
    if(qn){
      var mn=normalizePersonName(m.name||'');
      if(mn&&mn.indexOf(qn)>=0)hit=true;
    }
    if(!hit&&qy){
      var my=normalizeYomi(m.yomi||'');
      if(my&&my.indexOf(qy)>=0)hit=true;
    }
    if(hit){
      out.push(m);
      if(out.length>=SUGGEST_MAX)break;
    }
  }
  return out;
}

// ============================================================
// BRANCH MASTER SYNC (F2): 大会データコピー時のマスタ同期
//   呼び出しは saveData() からのみ。save()/resetAll()/編集時には呼ばない。
// ============================================================

function ensureTournamentId(state,master,tournamentDate){
  if(state&&typeof state.tournament_id==='string'&&state.tournament_id)return state.tournament_id;
  // 仕様書 v5 §3.3 / Codex MF #1: tournament_id は「大会日」ベースで生成。
  // tournamentDate が無効な場合のみ todayYmd() にフォールバック。
  var date=isValidYmd(tournamentDate)?tournamentDate:todayYmd();
  var base='t_'+date.replace(/-/g,'_');
  var id=base;
  if(master&&Array.isArray(master.members)){
    var existing={};
    for(var i=0;i<master.members.length;i++){
      var arr=master.members[i].tournament_ids||[];
      for(var j=0;j<arr.length;j++)existing[arr[j]]=true;
    }
    var n=2;
    while(existing[id]){id=base+'_'+n;n++;}
  }
  if(state)state.tournament_id=id;
  return id;
}

function attachMemberIdToPlayer(player,member){
  if(!player||!member)return;
  player.member_id=member.id;
}

// A-4.2 §3.3: マスタの member を指定クラスで state.players に追加する純粋関数。
// master 側のフィールド（yomi / last_class / attendance_count / last_attended / tournament_ids）は
// 一切変更しない（saveData → syncBranchMasterOnSave 側の責務）。
function addPlayerFromMaster(memberId,cls,master,state){
  if(!master||!Array.isArray(master.members))return {success:false,error:'invalid_master'};
  if(!state||!state.players||!Array.isArray(state.players.A)||!Array.isArray(state.players.B))return {success:false,error:'invalid_state'};
  if(typeof memberId!=='string'||memberId==='')return {success:false,error:'invalid_id'};
  if(cls!=='A'&&cls!=='B')return {success:false,error:'invalid_class'};
  var member=null;
  for(var mi=0;mi<master.members.length;mi++){
    if(master.members[mi]&&master.members[mi].id===memberId){member=master.members[mi];break;}
  }
  if(!member)return {success:false,error:'not_found'};
  if(member.deleted===true)return {success:false,error:'deleted'};
  // 重複チェック：member_id 一致を最優先（duplicate_member）。なければ normalizePersonName 同名（duplicate_name）。
  var memberNameNorm=normalizePersonName(member.name||'');
  var all=state.players.A.concat(state.players.B);
  for(var pi=0;pi<all.length;pi++){
    var p=all[pi];
    if(!p)continue;
    if(typeof p.member_id==='string'&&p.member_id===memberId){
      return {success:false,error:'duplicate_member'};
    }
  }
  for(var pj=0;pj<all.length;pj++){
    var q=all[pj];
    if(!q)continue;
    if(memberNameNorm&&normalizePersonName(q.name||'')===memberNameNorm){
      // member_id 不一致 or なしの同名は安全側で duplicate_name（同名別人を自動許容しない）
      if(typeof q.member_id!=='string'||q.member_id!==memberId){
        return {success:false,error:'duplicate_name'};
      }
    }
  }
  var id='p'+Date.now()+Math.floor(Math.random()*1000);
  var player={
    id:id,
    name:memberNameNorm||String(member.name||''),
    cls:cls,
    member:(member.member==='other')?'other':'member',
    grade:(member.grade==='chu')?'chu':'ippan',
    member_id:member.id,
    // A-5.1 §11.8: 同一クラス内で max(entry_no)+1 を採番（欠番維持）
    entry_no:nextEntryNoForClass(cls,state)
  };
  state.players[cls].push(player);
  return {success:true,player:player};
}

// A-4.3 §3.1: 既登録 player のクラスを変更する純粋関数。
// state.players[oldCls] から削除し、state.players[newCls] に同 id で再追加。
// マスタの last_class も即時更新する（addPlayerFromMaster とは責務が分かれる）。
function changePlayerClass(memberId,newCls,master,state){
  if(!master||!Array.isArray(master.members))return {success:false,error:'invalid_master'};
  if(!state||!state.players||!Array.isArray(state.players.A)||!Array.isArray(state.players.B))return {success:false,error:'invalid_state'};
  if(typeof memberId!=='string'||memberId==='')return {success:false,error:'invalid_id'};
  if(newCls!=='A'&&newCls!=='B')return {success:false,error:'invalid_class'};
  var target=null,oldCls=null,oldIdx=-1;
  var classes=['A','B'];
  for(var ci=0;ci<classes.length;ci++){
    var arr=state.players[classes[ci]];
    for(var pi=0;pi<arr.length;pi++){
      if(arr[pi]&&arr[pi].member_id===memberId){target=arr[pi];oldCls=classes[ci];oldIdx=pi;break;}
    }
    if(target)break;
  }
  if(!target)return {success:false,error:'not_found'};
  if(oldCls===newCls)return {success:false,error:'same_class'};
  state.players[oldCls].splice(oldIdx,1);
  target.cls=newCls;
  // A-5.1 §11.8: クラス移動先で新規 entry_no を採番。
  //   旧クラスの entry_no は破棄（欠番として残す）。新クラス内では
  //   max(entry_no)+1 を採る。
  target.entry_no=nextEntryNoForClass(newCls,state);
  state.players[newCls].push(target);
  for(var mi=0;mi<master.members.length;mi++){
    if(master.members[mi]&&master.members[mi].id===memberId){
      master.members[mi].last_class=newCls;
      break;
    }
  }
  return {success:true,player:target,oldCls:oldCls,newCls:newCls};
}

function addTournamentIdOnce(member,tournamentId){
  if(!member||!tournamentId)return false;
  if(!Array.isArray(member.tournament_ids))member.tournament_ids=[];
  if(member.tournament_ids.indexOf(tournamentId)>=0)return false;
  member.tournament_ids.push(tournamentId);
  return true;
}

function recalcMemberAttendance(member){
  if(!member)return 0;
  if(!Array.isArray(member.tournament_ids))member.tournament_ids=[];
  member.attendance_count=member.tournament_ids.length;
  return member.attendance_count;
}

function createMemberFromParticipant(p,master,date){
  return {
    id:generateMemberId(master),
    name:normalizePersonName(p.name||''),
    yomi:'',
    last_class:(p.cls==='A'||p.cls==='B')?p.cls:null,
    last_attended:date,
    first_attended:date,
    attendance_count:0,
    tournament_ids:[],
    deleted:false,
    deleted_at:null,
    note:'',
    member:(p&&p.member==='other')?'other':'member',
    grade:(p&&p.grade==='chu')?'chu':'ippan',
    // Phase 1 §2: 過去大会データから member 生成時、city は空で初期化(participant 側に city は無いため)
    city:''
  };
}

function updateBranchMasterFromTournament(state,master,tournamentMeta){
  if(!state||!master||!Array.isArray(master.members))return master;
  if(!tournamentMeta||!tournamentMeta.tournament_id)return master;
  var tid=tournamentMeta.tournament_id;
  var date=isValidYmd(tournamentMeta.tournament_date)?tournamentMeta.tournament_date:todayYmd();
  // A-4 §3.1.5: tournamentMeta.yomiMap[player.id] = yomi（オプショナル、Should Fix 1: id キー）
  var yomiMap=(tournamentMeta&&tournamentMeta.yomiMap&&typeof tournamentMeta.yomiMap==='object')?tournamentMeta.yomiMap:null;

  var affected={};
  var pendingSkippedNames=[];
  var classes=['A','B'];
  for(var ci=0;ci<classes.length;ci++){
    var cls=classes[ci];
    var players=(state.players&&Array.isArray(state.players[cls]))?state.players[cls]:[];
    for(var pi=0;pi<players.length;pi++){
      var p=players[pi];
      if(!p||!p.name)continue;
      var member=null;
      if(typeof p.member_id==='string'&&p.member_id){
        for(var mi=0;mi<master.members.length;mi++){
          if(master.members[mi].id===p.member_id){member=master.members[mi];break;}
        }
      }
      if(!member){
        var cands=findMemberCandidates({name:p.name},master);
        if(cands.length===1){
          member=cands[0];
          attachMemberIdToPlayer(p,member);
        }else if(cands.length>1){
          // 仕様書 v5 §3.4.4 / Codex MF #2: 同名複数候補時はマスタ同期をスキップ。
          // 誤タップ・取り違えで別人を統合する事故を防ぐため、member_id は付与しない。
          // tournament_ids への追加もしない。後で手動紐付け（A-2）の余地を残す。
          var skipName=String(p.name||'');
          if(typeof console!=='undefined'&&console.warn)console.warn('「'+skipName+'」は同名候補が '+cands.length+' 件あるためマスタ同期を保留');
          pendingSkippedNames.push(skipName);
          continue;
        }else{
          try{
            member=createMemberFromParticipant(p,master,date);
            // A-4 §3.1.5: 新規 member に yomi を初期反映（_pendingNewYomi 由来）
            if(yomiMap&&typeof yomiMap[p.id]==='string'){
              var yNew=normalizeYomi(yomiMap[p.id]);
              if(yNew)member.yomi=yNew;
            }
            master.members.push(member);
            attachMemberIdToPlayer(p,member);
          }catch(e){
            if(typeof console!=='undefined'&&console.warn)console.warn('member_id 生成失敗。スキップ',e);
            // 仕様書 v6 §3.7 / Codex Minor #2: crypto.randomUUID 不在の専用通知
            // （同一セッション内では1度のみ。過剰繰返し防止）
            var emsg=(e&&e.message)?String(e.message):'';
            if(emsg.indexOf('crypto.randomUUID')>=0&&!_phaseA2State.cryptoNotificationShown){
              if(typeof showMsg==='function'){
                showMsg('お使いのブラウザは古いため、参加者の自動登録ができませんでした。ブラウザ更新を推奨します。','warn');
              }
              _phaseA2State.cryptoNotificationShown=true;
            }
            continue;
          }
        }
      }
      addTournamentIdOnce(member,tid);
      if(isValidYmd(date)){
        if(!member.last_attended||date>=member.last_attended)member.last_attended=date;
        if(!member.first_attended||date<member.first_attended)member.first_attended=date;
      }
      if(p.cls==='A'||p.cls==='B')member.last_class=p.cls;
      // A-3: 支部員区分・中学生以下区分の前回値を記録（次回サジェスト引き継ぎ用）
      if(p.member==='member'||p.member==='other')member.member=p.member;
      if(p.grade==='ippan'||p.grade==='chu')member.grade=p.grade;
      // A-4 §3.1.5 + Should Fix 2: 既存 member の yomi は **空のときのみ** yomiMap から補完。
      //   既存値があれば触らない（誤上書き防止）。
      if(yomiMap&&typeof yomiMap[p.id]==='string'&&!normalizeYomi(member.yomi||'')){
        var yFill=normalizeYomi(yomiMap[p.id]);
        if(yFill)member.yomi=yFill;
      }
      affected[member.id]=member;
    }
  }
  for(var k in affected){
    if(affected.hasOwnProperty(k))recalcMemberAttendance(affected[k]);
  }
  // 保留通知（複数件あっても1度だけ）
  if(pendingSkippedNames.length>0&&typeof showMsg==='function'){
    showMsg('同名候補が複数あるため次の '+pendingSkippedNames.length+' 名のマスタ同期を保留しました：'+pendingSkippedNames.join('、'),'warn');
  }
  return master;
}

// 仕様書 v6 §3.2: 過去参加者検索の判定（漢字一致 OR ふりがな一致）
// ChatGPT E 反映: name 自体は normalizeYomi せず、yomi 側だけ正規化。
// boolean を返すため、両方ヒットしても結果リストには1回しか入らない。
function matchesPastParticipantQuery(member,query){
  if(!query)return true;
  var qn=normalizePersonName(query);
  var name=normalizePersonName(member&&member.name||'');
  // 漢字部分一致（既存 A-1 動作と互換）
  if(qn&&name.indexOf(qn)>=0)return true;
  // ふりがな検索（カタカナ入力もここで吸収）
  var nq=normalizeYomi(query);
  if(!nq)return false;
  // カタカナ入力（「サトウ」→「さとう」）が name に書かれているケースもケア
  if(name.indexOf(nq)>=0)return true;
  var ny=normalizeYomi(member&&member.yomi);
  if(ny&&ny.indexOf(nq)>=0)return true;
  return false;
}

// 仕様書 v6 §3.3 / §4.1: 50音タブ定義（パターン α、12タブ）
var PP_YOMI_TAB_DEFS=[
  {key:'all',label:'全'},
  {key:'a',label:'あ'},
  {key:'ka',label:'か'},
  {key:'sa',label:'さ'},
  {key:'ta',label:'た'},
  {key:'na',label:'な'},
  {key:'ha',label:'は'},
  {key:'ma',label:'ま'},
  {key:'ya',label:'や'},
  {key:'ra',label:'ら'},
  {key:'wa',label:'わ'},

];

// 過去参加者パネルの選択中 50音タブ（モジュールスコープ。再描画間で保持）
var ppYomiRow='all';
var ppQuickFilter=null;  // null | QUICK_FILTER_* のいずれか

function buildPastParticipantsPanelHtml(master,filter,yomiRow,quickFilter){
  var members=(master&&Array.isArray(master.members))?master.members.filter(function(m){return !m.deleted;}):[];
  var query=filter||'';
  var row=yomiRow||'all';
  var qf=(quickFilter===QUICK_FILTER_RECENT_LAST||quickFilter===QUICK_FILTER_WITHIN_3MO||quickFilter===QUICK_FILTER_REGULAR||quickFilter===QUICK_FILTER_NO_YOMI)?quickFilter:null;
  // クイックフィルタを先に適用（最終大会日基準を全 member に対して計算するため、検索・50音タブ前）
  var qfApplied=applyQuickFilter(members,qf,todayYmd());
  var filtered=[];
  for(var i=0;i<qfApplied.length;i++){
    var mm=qfApplied[i];
    if(!matchesPastParticipantQuery(mm,query))continue;
    if(row!=='all'){
      // パターン あ: 「他」 = yomi 空 + getYomiInitialRow が other の人
      var memberRow=getYomiInitialRow(normalizeYomi(mm.yomi));
      if(memberRow!==row)continue;
    }
    filtered.push(mm);
  }
  // ソート: 全タブは既存通り（最終参加日降順、同日は氏名昇順）
  // 各行タブは normalizeYomi(yomi) 昇順、同 yomi なら氏名昇順
  // 「他」タブは yomi 空が先頭、後方に other の人（氏名昇順）
  if(row==='all'){
    filtered.sort(function(a,b){
      var la=a.last_attended||'',lb=b.last_attended||'';
      if(la!==lb)return la<lb?1:-1;
      return (a.name||'')<(b.name||'')?-1:1;
    });
  }else if(row==='other'){
    filtered.sort(function(a,b){
      var aEmpty=!normalizeYomi(a.yomi);
      var bEmpty=!normalizeYomi(b.yomi);
      if(aEmpty!==bEmpty)return aEmpty?-1:1;
      return (a.name||'')<(b.name||'')?-1:1;
    });
  }else{
    filtered.sort(function(a,b){
      var ay=normalizeYomi(a.yomi),by=normalizeYomi(b.yomi);
      if(ay!==by)return ay<by?-1:1;

  var html='<div class="flex" style="margin-bottom:8px">';

  html+='<div id="pp-yomi-tabs" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:4px;overflow-x:auto">';
  for(var ti=0;ti<PP_YOMI_TAB_DEFS.length;ti++){
    var td=PP_YOMI_TAB_DEFS[ti];
    var active=(td.key===row);
    html+='<button type="button" class="pp-yomi-tab'+(active?' active':'')+'" data-row="'+escapeHtml(td.key)+'" style="min-height:36px;min-width:36px;padding:6px 10px;border:1px solid '+(active?'#1976d2':'#ccc')+';background:'+(active?'#e3f2fd':'#fff')+';color:'+(active?'#0d47a1':'#333')+';border-radius:6px;font-size:13px;cursor:pointer">'+escapeHtml(td.label)+'</button>';
  }
  html+='</div>';
  // クイックフィルタ（A-3 §1-2）。排他選択・再タップで解除。
  html+='<div id="pp-quick-filters" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">';
  var qfDefs=[
    {key:QUICK_FILTER_RECENT_LAST,label:'前回参加'},
    {key:QUICK_FILTER_WITHIN_3MO,label:'3ヶ月以内'},
    {key:QUICK_FILTER_REGULAR,label:'常連 (5回以上)'},
    {key:QUICK_FILTER_NO_YOMI,label:'ふりがな未入力'}
  ];
  for(var qi=0;qi<qfDefs.length;qi++){
    var qd=qfDefs[qi];
    var qActive=(qd.key===qf);
    html+='<button type="button" class="pp-quick-filter-btn'+(qActive?' active':'')+'" data-qfkey="'+escapeHtml(qd.key)+'" style="min-height:34px;padding:6px 12px;border:1px solid '+(qActive?'#1976d2':'#ccc')+';background:'+(qActive?'#e3f2fd':'#fff')+';color:'+(qActive?'#0d47a1':'#333')+';border-radius:6px;font-size:13px;cursor:pointer">'+escapeHtml(qd.label)+'</button>';
  }
  html+='</div>';
  // ChatGPT M3 反映: 「他」タブの意味補足（常時表示）
  html+='<div class="yomi-tabs-note" style="font-size:11px;color:#888;margin-bottom:8px">他: ふりがな未登録・その他</div>';
  if(members.length===0){
    html+='<div style="color:#888;font-size:13px;padding:8px 0">支部マスタが空です。「マスタ」タブから過去大会を統合できます。</div>';
    return html;
  }
  if(filtered.length===0){
    html+='<div style="color:#888;font-size:13px;padding:8px 0">該当する参加者がいません。</div>';
    return html;
  }
  // A-4.2 §3.1.2: 「追加先を選択」ヒント（Should Fix 3 反映）
  html+='<div id="pp-hint" style="font-size:11px;color:#888;margin-bottom:4px">追加先を選択（A/Bボタンで指定クラスへ追加）</div>';
  html+='<div style="max-height:280px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:8px;padding:6px;margin-bottom:8px">';
  // A-4.3 §2.1 / A-4.5 §2.1: state.players ベースで現在登録中クラスを判定し、3 セクション(A 済 / B 済 / 未エントリー)に分割
  var currentRegMap={};
  if(state&&state.players){
    var regClasses=['A','B'];
    for(var rci=0;rci<regClasses.length;rci++){
      var rArr=state.players[regClasses[rci]]||[];
      for(var rpi=0;rpi<rArr.length;rpi++){
        var rp=rArr[rpi];
        if(rp&&typeof rp.member_id==='string'&&rp.member_id)currentRegMap[rp.member_id]=regClasses[rci];
      }
    }
  }
  var aEnrolledFiltered=[];
  var bEnrolledFiltered=[];
  var notEnrolledFiltered=[];
  for(var fi=0;fi<filtered.length;fi++){
    var cur=currentRegMap[filtered[fi].id];
    if(cur==='A')aEnrolledFiltered.push(filtered[fi]);
    else if(cur==='B')bEnrolledFiltered.push(filtered[fi]);
    else notEnrolledFiltered.push(filtered[fi]);
  }
  // A-4.5 §2.2 + §4 #6 / A-4.6 §2.1: 行描画 helper。
  // 行内要素は A-4.3 と同じ + 2 段レイアウト維持(行構造は A-4.5 と完全同一、A-4.4 失敗の轍を踏まない)。
  // A-4.6: 現クラス active の **ボタン style のみ** 色強調復活(背景色 + ✓ + bold + pp-add-btn-active クラス)。
  // 前回参加クラス強調(pp-add-btn-highlight、薄琥珀色)は撤廃のまま維持(二重ハイライト混乱回避)。
  function renderPpRow(fm){
    var lastClassText=fm.last_class==='A'?'前回:Aクラス':(fm.last_class==='B'?'前回:Bクラス':'');
    var nameSafe=escapeHtml(fm.name);
    var midSafe=escapeHtml(fm.id);
    var aLabelSafe=escapeHtml(fm.name+'をAクラスで追加');
    var bLabelSafe=escapeHtml(fm.name+'をBクラスで追加');
    // A-4.6 §2.1: 現クラス判定 → A/B ボタン個別の style を組み立てる
    var currentCls=currentRegMap[fm.id]||null;
    var aActive=(currentCls==='A');
    var bActive=(currentCls==='B');
    var btnBaseStyle='min-width:44px;min-height:44px;margin-left:8px;border-radius:6px;font-size:14px;cursor:pointer;flex-shrink:0';
    var aStyle=btnBaseStyle
      +';font-weight:'+(aActive?'bold':'normal')
      +';background:'+(aActive?'#bbdefb':'#fff')
      +';color:'+(aActive?'#0d47a1':'#1976d2')
      +';border:1px solid '+(aActive?'#0d47a1':'#1976d2');
    var bStyle=btnBaseStyle
      +';font-weight:'+(bActive?'bold':'normal')
      +';background:'+(bActive?'#ffe0b2':'#fff')
      +';color:'+(bActive?'#5d4037':'#1976d2')
      +';border:1px solid '+(bActive?'#e65100':'#1976d2');
    var aClass='pp-add-btn'+(aActive?' pp-add-btn-active':'');
    var bClass='pp-add-btn'+(bActive?' pp-add-btn-active':'');
    var aText=aActive?'A ✓':'A';
    var bText=bActive?'B ✓':'B';
    // pp-row は 2 段の縦並び。1 段目に氏名(伸縮)+ A/B ボタン、2 段目にメタ情報(ふりがな + 前回 + 日付)
    var rowHtml='<div class="pp-row" data-mid="'+midSafe+'" style="display:flex;flex-direction:column;gap:2px;padding:6px 4px;border-bottom:1px solid #f0f0f0;cursor:default">';
    // 既存テスト互換のための隠しマーカー(`.pp-check` 件数カウント用、A-3 e2e 依存)
    rowHtml+='<input type="hidden" class="pp-check">';
    // 1 段目: 氏名 + A/B ボタン(氏名は flex:1 で残り全幅、375px でも >= 230px 確保)
    rowHtml+='<div class="pp-row-main" style="display:flex;align-items:center;gap:8px">';
    rowHtml+='<span class="pp-name" style="flex:1;min-width:0;font-size:14px;overflow-wrap:anywhere;font-weight:500">'+nameSafe+'</span>';
    rowHtml+='<button type="button" class="'+aClass+'" data-cls="A" aria-label="'+aLabelSafe+'" title="Aクラスで追加" style="'+aStyle+'">'+aText+'</button>';
    rowHtml+='<button type="button" class="'+bClass+'" data-cls="B" aria-label="'+bLabelSafe+'" title="Bクラスで追加" style="'+bStyle+'">'+bText+'</button>';
    rowHtml+='</div>';
    // 2 段目: メタ情報(ふりがな + 前回:Xクラス + 日付)。値が無ければ要素自体を出さない
    var hasMeta=(!!fm.yomi)||(!!lastClassText)||(!!fm.last_attended);
    if(hasMeta){
      rowHtml+='<div class="pp-row-meta" style="display:flex;align-items:center;gap:8px;font-size:12px;color:#666;padding-left:2px;flex-wrap:wrap">';
      if(fm.yomi){rowHtml+='<span class="pp-yomi" style="color:#888">'+escapeHtml(normalizeYomi(fm.yomi))+'</span>';}
      if(lastClassText){rowHtml+='<span class="pp-last-class" style="font-weight:500">'+escapeHtml(lastClassText)+'</span>';}
      if(fm.last_attended){rowHtml+='<span style="color:#888;margin-left:auto">'+escapeHtml(fm.last_attended)+'</span>';}
      rowHtml+='</div>';
    }
    rowHtml+='</div>';
    return rowHtml;
  }
  // A-4.5 §3.1: セクション描画 helper(各セクション、ヘッダ + 行群 or 「該当なし」)
  function renderSection(headerLabel,list,cssClass){
    var secHtml='<div class="pp-section '+cssClass+'" style="margin-bottom:8px">';
    secHtml+='<div class="pp-section-header" style="font-size:13px;font-weight:600;color:#1F3864;padding:4px 0;border-bottom:1px solid #d0d7e2;margin-bottom:4px">'+headerLabel+' ('+list.length+'名)</div>';
    if(list.length===0){
      secHtml+='<div class="pp-empty" style="color:#888;font-size:12px;padding:6px 4px">該当なし</div>';
    }else{
      for(var si=0;si<list.length;si++)secHtml+=renderPpRow(list[si]);
    }
    secHtml+='</div>';
    return secHtml;
  }
  html+=renderSection('Aクラスエントリー済',aEnrolledFiltered,'pp-section-a-enrolled');
  html+=renderSection('Bクラスエントリー済',bEnrolledFiltered,'pp-section-b-enrolled');
  html+=renderSection('未エントリー',notEnrolledFiltered,'pp-section-not-enrolled');
  html+='</div>';
  return html;
}

function bindPastParticipantsPanelEvents(){
  var input=document.getElementById('pp-search');
  if(input){
    var composing=false;
    input.addEventListener('compositionstart',function(){composing=true;});
    input.addEventListener('compositionend',function(){composing=false;renderPastParticipantsPanel(input.value);});
    input.addEventListener('input',function(){if(!composing)renderPastParticipantsPanel(input.value);});
  }
  // 50音タブ（仕様書 v6 §3.3）。タブクリック時に ppYomiRow を更新して再描画。
  var tabs=document.querySelectorAll('.pp-yomi-tab');
  for(var ti=0;ti<tabs.length;ti++){
    tabs[ti].addEventListener('click',function(e){
      var t=e.currentTarget||e.target;
      var rowKey=t&&t.getAttribute?t.getAttribute('data-row'):null;
      ppYomiRow=rowKey||'all';
      var inp=document.getElementById('pp-search');
      renderPastParticipantsPanel(inp?inp.value:'');
    });
  }
  // クイックフィルタ（A-3 §1-2）。排他選択・再タップで解除。
  var qfBtns=document.querySelectorAll('.pp-quick-filter-btn');
  for(var qbi=0;qbi<qfBtns.length;qbi++){
    qfBtns[qbi].addEventListener('click',function(e){
      var t=e.currentTarget||e.target;
      var key=t&&t.getAttribute?t.getAttribute('data-qfkey'):null;
      if(!key)return;
      // 同じキーをタップ → 解除（null）。違うキー → 切り替え。
      ppQuickFilter=(ppQuickFilter===key)?null:key;
      var inp=document.getElementById('pp-search');
      renderPastParticipantsPanel(inp?inp.value:'');
    });
  }
  // A-4.2 §3.1.3: A/B ボタン押下で addPlayerFromMaster 経由の即時追加
  var addBtns=document.querySelectorAll('.pp-add-btn');
  for(var ai=0;ai<addBtns.length;ai++){
    addBtns[ai].addEventListener('click',function(e){
      if(e&&typeof e.preventDefault==='function')e.preventDefault();
      if(e&&typeof e.stopPropagation==='function')e.stopPropagation();
      var t=e.currentTarget||e.target;
      var cls=t&&t.getAttribute?t.getAttribute('data-cls'):'';
      // mid は親行の data-mid から取得（行に1つだけ存在、属性件数カウント互換）
      var row=t&&typeof t.closest==='function'?t.closest('.pp-row'):null;
      var mid=row&&row.getAttribute?row.getAttribute('data-mid'):'';
      handlePastParticipantClassAdd(mid,cls);
    });
  }
}

// A-4.3 §2.2: 過去参加者パネルの A/B ボタン押下時の処理。
// 3 ケース分岐：未登録（追加 confirm）/ 別クラス登録済（変更 confirm）/ 同クラス登録済（alert OK のみ）。
function handlePastParticipantClassAdd(memberId,cls){
  var master=loadBranchMaster();
  // マスタから member を取得（氏名表示用）
  var member=null;
  if(master&&Array.isArray(master.members)){
    for(var mi=0;mi<master.members.length;mi++){
      if(master.members[mi]&&master.members[mi].id===memberId){member=master.members[mi];break;}
    }
  }
  if(!member){showMsg('該当する参加者が見つかりません','err');return;}
  if(member.deleted===true){showMsg('この参加者は削除済みのため追加できません','err');return;}
  var memberName=member.name||'';
  // 現在の登録クラスを取得
  var existingCls=null;
  var existClasses=['A','B'];
  for(var eci=0;eci<existClasses.length;eci++){
    var eArr=state.players[existClasses[eci]]||[];
    for(var epi=0;epi<eArr.length;epi++){
      if(eArr[epi]&&eArr[epi].member_id===memberId){existingCls=existClasses[eci];break;}
    }
    if(existingCls)break;
  }
  // ケース 3: 同クラス登録済（alert OK のみ、削除提案なし）
  if(existingCls===cls){
    alert(memberName+'さんは既に '+cls+'クラス に登録されています。');
    return;
  }
  // ケース 2: 別クラス登録済（変更 confirm）
  if(existingCls&&existingCls!==cls){
    var ok2=confirm(memberName+'さんは現在 '+existingCls+'クラス に登録されています。\n'+cls+'クラス に変更しますか?');
    if(!ok2)return;
    var r2=changePlayerClass(memberId,cls,master,state);
    if(!r2||!r2.success){showMsg('クラス変更に失敗しました','err');return;}
    saveBranchMaster(master);
    // MASTER-V2-LASTCLASS S03: 既登録者クラス変更分岐限定の master.last_class 保存検証。
    // changePlayerClass が master.members[i].last_class を新クラスに更新済み（line 1250）。
    // saveBranchMaster は例外を握り潰すため、localStorage を再読込して検証する。
    // 新規追加分岐（addPlayerFromMaster 側）では master を更新しないため、ここに verify を入れない。
    // SAVE-UX-DESIGN Level 1: console.warn + showMsg。最終表示が warn になるよう、
    // master verify 失敗時は後段の成功 showMsg を出さない（直後の ok 上書きを防ぐ）。
    // 詳細は docs/specs/20260513_shogi_save_ux_design.md
    var s03MasterVerifyOk=verifyMasterFieldPersisted(memberId,'last_class',cls);
    if(!s03MasterVerifyOk){
      if(typeof console!=='undefined'&&console.warn){
        console.warn('[MASTER-V2-LASTCLASS] S03 last_class verify failed',{memberId:memberId,expected:cls});
      }
      // SAVE-UX-WARN-HELPER: user-facing warn は helper 経由。success showMsg 抑止は下の if(s03MasterVerifyOk) で行う（不変）。
      notifySaveWarning({
        message:'前回クラス情報の保存が確認できませんでした',
        consoleTag:'[MASTER-V2-LASTCLASS]',
        callsiteId:'S03',
        fields:['last_class']
      });
    }
    renderRegList();save();
    var searchInp2=document.getElementById('pp-search');
    renderPastParticipantsPanel(searchInp2?searchInp2.value:'');
    if(s03MasterVerifyOk){
      showMsg('['+memberName+'] を '+cls+'クラス に変更しました','ok');
    }
    // A-5.1-SAVE-003b: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
    // false は「保存未確認」（保存失敗と断定しない）。クラス変更は rollback しない・運営は継続する。
    if(!verifyPlayerPersistedById(r2.player.id,cls,r2.player.name)){
      if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: handlePastParticipantClassAdd (class change) の保存が確認できませんでした (player='+r2.player.id+', cls='+cls+', name='+r2.player.name+')');
      showMsg('クラスを変更しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください','warn');
    }
    return;
  }
  // ケース 1: 未登録（追加 confirm）
  var ok1=confirm(memberName+'さんを '+cls+'クラス に追加しますか?');
  if(!ok1)return;
  var r=addPlayerFromMaster(memberId,cls,master,state);
  if(!r||!r.success){
    var err=r&&r.error;
    if(err==='duplicate_member'){
      // ガード：cls 一致なら通常はケース 3 で処理済、ここは想定外
      showMsg('この参加者はすでに登録されています','err');
    }else if(err==='duplicate_name'){
      showMsg('同じ名前の参加者がいます。別人の場合は手入力で区別してください','err');
    }else if(err==='deleted'){
      showMsg('この参加者は削除済みのため追加できません','err');
    }else if(err==='not_found'){
      showMsg('該当する参加者が見つかりません','err');
    }else{
      showMsg('追加に失敗しました','err');
    }
    return;
  }
  renderRegList();save();
  // 現在の検索条件を維持して再描画（追加済みは候補から外れる）
  var searchInp=document.getElementById('pp-search');
  renderPastParticipantsPanel(searchInp?searchInp.value:'');
  showMsg('['+r.player.name+']（'+cls+'クラス）を登録しました','ok');
  // A-5.1-SAVE-003b: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
  // false は「保存未確認」（保存失敗と断定しない）。追加は rollback しない・運営は継続する。
  if(!verifyPlayerPersistedById(r.player.id,cls,r.player.name)){
    if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: handlePastParticipantClassAdd (add) の保存が確認できませんでした (player='+r.player.id+', cls='+cls+', name='+r.player.name+')');
    showMsg('参加者は登録されましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください','warn');
  }
}

function bindYomiInputModalEvents(callback){
  function close(){var m=document.getElementById('yomi-modal');if(m&&m.remove)m.remove();}
  var cancelBtn=document.getElementById('yomi-cancel');
  if(cancelBtn)cancelBtn.addEventListener('click',function(){
    close();

  });
  var addBtn=document.getElementById('yomi-add');
  if(addBtn)addBtn.addEventListener('click',function(){

function openYomiInputDialog(members,callback){

// 仕様書 v6 §3.1: ダイアログで入力された yomi をマスタへ反映（純粋関数化してテスト可能に）
// yomiInputs は {member_id: rawInputString} のマップ。
// 戻り値: {allEmpty, updatedCount}（M4 通知判定で使う）
function applyYomiInputsToMaster(master,yomiEmptyMembers,yomiInputs){
  var allEmpty=true;
  var updatedCount=0;
  if(!master||!Array.isArray(master.members))return {allEmpty:true,updatedCount:0};
  var ems=Array.isArray(yomiEmptyMembers)?yomiEmptyMembers:[];
  for(var k=0;k<ems.length;k++){
    var em=ems[k]||{};
    var raw=(yomiInputs&&yomiInputs[em.id])||'';
    var normalized=normalizeYomi(raw);
    if(!normalized)continue;
    allEmpty=false;
    for(var mi=0;mi<master.members.length;mi++){
      if(master.members[mi].id===em.id){
        master.members[mi].yomi=normalized;
        updatedCount++;
        break;
      }
    }
  }
  return {allEmpty:allEmpty,updatedCount:updatedCount};
}

function addSelectedPastParticipants(){
  var master=loadBranchMaster();
  var checks=document.querySelectorAll('.pp-check');
  var picked=[];
  for(var i=0;i<checks.length;i++){
    if(!checks[i].checked)continue;
    var mid=checks[i].getAttribute('data-mid');
    for(var j=0;j<master.members.length;j++){
      if(master.members[j].id===mid){picked.push(master.members[j]);break;}
    }
  }
  if(picked.length===0){alert('追加する参加者を選択してください');return;}
  // 仕様書 v6 §3.1: yomi 空の人だけダイアログを出す（方式 Y）
  var yomiEmpty=picked.filter(function(m){return !normalizeYomi(m.yomi);});
  if(yomiEmpty.length===0){
    finalizeAddPastParticipants(picked,master,false);
    return;
  }
  openYomiInputDialog(yomiEmpty,function(yomiInputs,isCancel){
    if(isCancel)return;  // ChatGPT M1 反映: キャンセルは何もしない
    var result=applyYomiInputsToMaster(master,yomiEmpty,yomiInputs||{});
    if(result.updatedCount>0)saveBranchMaster(master);
    finalizeAddPastParticipants(picked,master,result.allEmpty);
  });
}

function finalizeAddPastParticipants(picked,master,allEmptyYomi){
  var existingNames={};
  var existingMids={};
  var allCurrent=state.players.A.concat(state.players.B);
  for(var k=0;k<allCurrent.length;k++){
    if(allCurrent[k].name)existingNames[allCurrent[k].name]=true;
    if(allCurrent[k].member_id)existingMids[allCurrent[k].member_id]=true;
  }
  var added=0,skipped=0;
  // A-5.1-SAVE-003b: バッチ追加分の id/cls/name を保持し、save() 後の verify に使う。
  var addedTargets=[];
  for(var p=0;p<picked.length;p++){
    var m=picked[p];
    if(existingMids[m.id]||existingNames[m.name]){skipped++;continue;}
    var cls=(m.last_class==='A'||m.last_class==='B')?m.last_class:'A';
    var pid='p'+Date.now()+Math.floor(Math.random()*1000)+'_'+p;
    // A-5.1 §11.8: 同一クラス内で max(entry_no)+1 を採番（欠番維持）
    state.players[cls].push({id:pid,name:m.name,cls:cls,member:'member',grade:'ippan',member_id:m.id,entry_no:nextEntryNoForClass(cls,state)});
    existingMids[m.id]=true;
    existingNames[m.name]=true;
    added++;
    addedTargets.push({id:pid,cls:cls,name:m.name});
  }
  renderRegList();save();
  renderPastParticipantsPanel('');
  // ChatGPT M4 反映: 全員空欄追加だった場合は専用通知（既存の成功メッセージを置き換え）
  if(allEmptyYomi&&added>0){
    showMsg('ふりがな未登録のまま '+added+'名を追加しました。未登録者は「他」タブに表示されます。','warn');
  }else{
    showMsg(added+'名を追加しました'+(skipped>0?'（同名・同 member_id 重複 '+skipped+'名はスキップ）':''),'ok');
  }
  // A-5.1-SAVE-003b: バッチ追加の保存確認。warn は件数集約して 1 回のみ（UI ノイズ回避）。
  // rollback しない・運営は継続する。alert も使わない。
  if(addedTargets.length>0){
    var unverifiedCount=0;
    for(var vi=0;vi<addedTargets.length;vi++){
      var t=addedTargets[vi];
      if(!verifyPlayerPersistedById(t.id,t.cls,t.name))unverifiedCount++;
    }
    if(unverifiedCount>0){
      if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: finalizeAddPastParticipants の保存が確認できませんでした ('+unverifiedCount+'/'+addedTargets.length+' 件未確認)');
      showMsg(added+'名を追加しましたが、'+unverifiedCount+'名分の保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください','warn');
    }
  }
}

function renderPastParticipantsPanel(filter){

  var members=(master&&Array.isArray(master.members))?master.members.filter(function(m){return !m.deleted;}):[];

  panel.innerHTML=buildPastParticipantsPanelHtml(master,filter||'',ppYomiRow,ppQuickFilter);
  bindPastParticipantsPanelEvents();
}

function bindMasterResetModalEvents(){
  var cancelBtn=document.getElementById('mr-cancel');

    var m=document.getElementById('master-reset-modal');if(m)m.remove();
  });
  var checkbox=document.getElementById('mr-backup-checked');
  var textInput=document.getElementById('mr-confirm-text');
  var runBtn=document.getElementById('mr-run');
  function updateRunBtn(){
    if(!runBtn)return;
    var ok=(checkbox&&checkbox.checked)&&(textInput&&textInput.value==='リセット');

    if(ok){
      runBtn.style.cssText='background:#c33;color:#fff;border:1px solid #c33;border-radius:6px;padding:8px 14px;font-size:14px;cursor:pointer;font-weight:600';

function bindPhase2ImportModalEvents(){
  var cancelBtn=document.getElementById('p2-cancel');
  if(cancelBtn)cancelBtn.addEventListener('click',function(){
    var m=document.getElementById('phase2-import-modal');if(m)m.remove();
  });
  var fileInput=document.getElementById('p2-file');
  var runBtn=document.getElementById('p2-run');
  var statusEl=document.getElementById('p2-status');
  var previewEl=document.getElementById('p2-preview');
  // 検証通過した parsed をクロージャで保持
  var validatedParsed=null;
  function setStatus(msg,color){
    if(statusEl){statusEl.textContent=msg||'';statusEl.style.color=color||'#a00';}
  }
  function enableRun(){
    if(!runBtn)return;
    runBtn.disabled=false;
    runBtn.style.cssText='';
    runBtn.classList.add('btn-primary');
  }
  function disableRun(){
    if(!runBtn)return;
    runBtn.disabled=true;
    runBtn.style.cssText='opacity:0.5;cursor:not-allowed';
  }
  if(fileInput)fileInput.addEventListener('change',function(){
    validatedParsed=null;
    disableRun();
    if(previewEl){previewEl.style.display='none';previewEl.innerHTML='';}
    setStatus('','#a00');
    var file=fileInput.files&&fileInput.files[0];
    if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      var text=(e&&e.target&&typeof e.target.result==='string')?e.target.result:'';
      var parsed=safeParseImportText(text);
      if(parsed===null){setStatus('JSON の解析に失敗しました(フォーマットが不正です)');return;}
      // 空マスタ事前チェック(モーダル開いた後にマスタが追加された場合の保険)
      var master=loadBranchMaster();
      var liveCount=0;
      for(var i=0;i<master.members.length;i++){if(!master.members[i].deleted)liveCount++;}
      if(liveCount>0){
        setStatus('既存マスタに '+liveCount+' 名いるため実行できません。先にリセットしてください');
        return;
      }
      var validation=validatePhase2ImportData(parsed);
      if(!validation.ok){
        var msg='検証エラー('+validation.errors.length+' 件):\n';
        for(var ei=0;ei<Math.min(validation.errors.length,5);ei++){
          var er=validation.errors[ei];
          msg+='・['+(er.index>=0?'#'+(er.index+1):'全体')+' '+er.field+'] '+er.message+'\n';
        }
        if(validation.errors.length>5)msg+='...他 '+(validation.errors.length-5)+' 件';
        setStatus(msg);
        return;
      }
      // プレビュー(件数 + A/B 集計 + サンプル 3 件: A 1 / B 1 / city 長め 1)
      var sampleA=null,sampleB=null,sampleCityLong=null,longest=-1;
      for(var pi=0;pi<parsed.length;pi++){
        var p=parsed[pi];
        if(p.last_class==='A'&&!sampleA)sampleA=p;
        if(p.last_class==='B'&&!sampleB)sampleB=p;
        var cityLen=(typeof p.city==='string')?p.city.length:0;
        if(cityLen>longest){longest=cityLen;sampleCityLong=p;}
      }
      var prevHtml='<div style="font-weight:600;color:#1F3864;margin-bottom:4px">検証 OK ✅</div>';
      prevHtml+='<div>取り込み件数: <strong>'+validation.summary.total+'</strong> 名(A 級 <strong>'+validation.summary.classA+'</strong> / B 級 <strong>'+validation.summary.classB+'</strong>)</div>';
      prevHtml+='<div style="margin-top:6px;font-size:12px;color:#666">サンプル 3 件:</div>';
      function fmtSample(s,label){
        if(!s)return '';
        return '<div style="margin-left:8px;font-size:12px;color:#444">・'+label+': '+escapeHtml(s.name)+'('+s.last_class+'、city='+escapeHtml(s.city||'')+')</div>';
      }
      prevHtml+=fmtSample(sampleA,'A 級');
      prevHtml+=fmtSample(sampleB,'B 級');
      prevHtml+=fmtSample(sampleCityLong,'city 長め('+(sampleCityLong?sampleCityLong.city.length:0)+'文字)');
      if(previewEl){previewEl.style.display='block';previewEl.innerHTML=prevHtml;}
      validatedParsed=parsed;
      enableRun();
    };
    reader.onerror=function(){setStatus('ファイルの読み込みに失敗しました');};
    reader.readAsText(file);
  });
  if(runBtn)runBtn.addEventListener('click',function(){
    if(runBtn.disabled||!validatedParsed)return;
    var master=loadBranchMaster();
    var result=applyPhase2Import(validatedParsed,master);
    if(!result.success){
      if(result.error==='master_not_empty'){
        setStatus('既存マスタに '+result.liveCount+' 名いるため実行できません。先にリセットしてください');
      }else if(result.error==='validation_failed'){
        setStatus('検証エラー(' +(result.errors?result.errors.length:0)+ ' 件)が発生しました。ファイルを確認してください');
      }else{
        setStatus('取り込みに失敗しました(error: '+result.error+')');
      }
      return;
    }
    saveBranchMaster(result.newMaster);
    var modalEl=document.getElementById('phase2-import-modal');if(modalEl)modalEl.remove();
    if(typeof showMsg==='function')showMsg(result.summary.total+'名(A '+result.summary.classA+' / B '+result.summary.classB+')を取り込みました。「過去参加者から選ぶ」を展開してご確認ください','ok');
    renderMasterTab();
    if(typeof renderPastParticipantsPanel==='function'){
      var ppSearch=document.getElementById('pp-search');
      renderPastParticipantsPanel(ppSearch?ppSearch.value:'');
    }
    // Phase 2 修正 #1: import 完了後に参加者登録タブへ自動切替して過去参加者パネルへ誘導 + section visible を明示再保証(Safari race 対策の safety net)
    if(typeof showTab==='function')showTab('reg');
    var ppSec=document.getElementById('past-participants-section');
    if(ppSec&&result.summary.total>0)ppSec.style.display='block';
  });
}

function runMasterImport(){
  var statusEl=document.getElementById('mi-status');
  var setStatus=function(msg,color){
    if(!statusEl)return;
    statusEl.textContent=msg||'';
    statusEl.style.color=color||'#a00';
  };

  var modeRadios=document.getElementsByName('mi-mode');
  var mode=null;
  for(var i=0;i<modeRadios.length;i++){if(modeRadios[i].checked){mode=modeRadios[i].value;break;}}
  if(!mode){setStatus('インポート方式を選択してください');return;}

  var fileInput=document.getElementById('mi-file');
  var pasteArea=document.getElementById('mi-paste-area');
  var file=fileInput&&fileInput.files&&fileInput.files[0]?fileInput.files[0]:null;
  var pasted=pasteArea?pasteArea.value:'';

  if(file&&pasted&&pasted.trim()){
    setStatus('ファイルと貼り付けの両方が指定されています。どちらか一方にしてください');
    return;
  }
  if(!file&&!(pasted&&pasted.trim())){
    setStatus('ファイルを選択するか、テキストを貼り付けてください');
    return;
  }

  if(file){
    var reader=new FileReader();
    reader.onload=function(e){
      var text=(e&&e.target&&typeof e.target.result==='string')?e.target.result:'';
      processMasterImportText(text,mode,setStatus);
    };
    reader.onerror=function(){setStatus('ファイルの読み込みに失敗しました');};
    reader.readAsText(file);
  }else{
    processMasterImportText(pasted,mode,setStatus);
  }
}

function processMasterImportText(text,mode,setStatus){
  var parsed=safeParseImportText(text);
  if(parsed===null){setStatus('JSON の解析に失敗しました（フォーマットが不正です）');return;}

  if(mode==='overwrite'){
    var result=applyOverwriteImport(parsed);
    if(!result.success){
      if(result.error==='tournament_format')setStatus('これは過去大会データの形式です。「マスタ」タブの「📥 過去大会を支部マスタに統合」をご利用ください');
      else if(result.error==='invalid_format')setStatus('マスタの形式として認識できませんでした（schema_version / members を確認してください）');
      else setStatus('インポートに失敗しました');
      return;
    }
    if(!confirm('現在のマスタをすべて置き換えます。元に戻せません。\n\n続けますか？\n\n読込予定: '+(result.newMaster.members.length)+'名'))return;
    saveBranchMaster(result.newMaster);
    var modalEl=document.getElementById('master-import-modal');if(modalEl)modalEl.remove();
    if(typeof showMsg==='function')showMsg('マスタを上書きインポートしました（'+result.newMaster.members.length+'名）','ok');
    renderMasterTab();
    return;
  }

  if(mode==='merge'){
    var current=loadBranchMaster();
    var mr=applyMergeImport(parsed,current);
    if(!mr.success){
      if(mr.error==='tournament_format')setStatus('これは過去大会データの形式です。「マスタ」タブの「📥 過去大会を支部マスタに統合」をご利用ください');
      else if(mr.error==='invalid_format')setStatus('マスタの形式として認識できませんでした（schema_version / members を確認してください）');
      else setStatus('インポートに失敗しました');
      return;
    }
    saveBranchMaster(mr.newMaster);
    var modalEl2=document.getElementById('master-import-modal');if(modalEl2)modalEl2.remove();
    if(typeof showMsg==='function')showMsg('マスタにマージしました（新規追加 '+mr.summary.added+'名 / 既存統合 '+mr.summary.merged+'名 / 合計 '+mr.summary.total+'名）','ok');
    renderMasterTab();
    return;
  }
}
