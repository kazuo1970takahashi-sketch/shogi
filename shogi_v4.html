function calcFinal(cls){
  var players=state.players[cls];
  var wins=getWins(cls);
  var opponents={};
  var played={};
  for(var i=0;i<players.length;i++){
    opponents[players[i].id]=[];
    played[players[i].id]=0;
  }
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      var match=state.results[cls][r][m];
      if(match.winner){
        opponents[match.p1].push({opp:match.p2,won:match.winner===match.p1});
        opponents[match.p2].push({opp:match.p1,won:match.winner===match.p2});
        played[match.p1]++;
        played[match.p2]++;
      }
    }
  }
  var res=[];
  for(var i=0;i<players.length;i++){
    var p=players[i];
    var A=wins[p.id]||0;
    var opps=opponents[p.id]||[];
    var B=0;for(var j=0;j<opps.length;j++)B+=(wins[opps[j].opp]||0);
    var C=0;for(var j=0;j<opps.length;j++){if(opps[j].won)C+=(wins[opps[j].opp]||0);}
    res.push({p:p,A:A,B:B,C:C,played:played[p.id]||0});
  }
  res.sort(function(a,b){
    if(b.A!==a.A)return b.A-a.A;
    if(b.B!==a.B)return b.B-a.B;
    if(b.C!==a.C)return b.C-a.C;
    // A B C全て同じ場合：直接対決の結果で判定
    var pid1=a.p.id,pid2=b.p.id;
    for(var r=0;r<state.results[cls].length;r++){
      for(var m=0;m<state.results[cls][r].length;m++){
        var match=state.results[cls][r][m];
        if(match.p1===pid1&&match.p2===pid2||match.p1===pid2&&match.p2===pid1){
          if(match.winner===pid2)return 1;
          if(match.winner===pid1)return -1;
        }
      }
    }
    return 0; // 対戦なし→同順位（くじ引き）
  });
  return res;
}

// RANK-TIE-001: 順位決定項目（A/B/C/直接対決）が完全同点の参加者を同順位として
//   表示する。比較対象は競技上の順位決定項目のみ。
//   含めるもの:   A（勝数）, B（対戦相手の勝数合計）, C（勝った相手の勝数合計）, 直接対決
//   含めないもの: 参加者配列の登録順・entry_no・氏名・id 等、表示安定化用の tie-breaker
//   A/B/C はすべて整数のため厳密比較。許容誤差不要。
//   既存 calcFinal の sort 比較関数構造は変更しない（同点判定は本 helper で独立に行う）。
function isSameDisplayedRank(a,b,cls){
  if(!a||!b||!a.p||!b.p)return false;
  if(a.A!==b.A)return false;
  if(a.B!==b.B)return false;
  if(a.C!==b.C)return false;
  var pid1=a.p.id,pid2=b.p.id;
  var rounds=(typeof state!=='undefined'&&state&&state.results&&state.results[cls])?state.results[cls]:[];
  for(var r=0;r<rounds.length;r++){
    var round=rounds[r];
    if(!round)continue;
    for(var m=0;m<round.length;m++){
      var match=round[m];
      if((match.p1===pid1&&match.p2===pid2)||(match.p1===pid2&&match.p2===pid1)){
        if(match.winner===pid1||match.winner===pid2)return false;
      }
    }
  }
  return true;
}

// RANK-TIE-001: ソート済 finals から表示順位を算出する（欠番方式）。
//   - 先頭は 1 位
//   - 現在の同順位グループ「全員」と isSameDisplayedRank が成立する場合のみ同順位
//   - 1 人でも不成立なら新順位 = index+1（タイ後は欠番: 12,12,14）
//   - 直前 1 行だけと比較してはいけない: A/B/C 同点でも直接対決があれば
//     非隣接（X→Y→Z で X-Z 直接対決決着）の透過的な同順位化を防ぐ必要があるため。
//   - 表示順位は保存しない。毎回計算する（保存データ構造は不変）。
function computeDisplayRanks(finals,cls){
  var ranks=[];
  var currentRank=1;
  var currentGroup=[];
  for(var i=0;i<finals.length;i++){
    var row=finals[i];
    if(i===0){
      ranks.push(1);
      currentGroup=[row];
      continue;
    }
    var sameAsGroup=true;
    for(var g=0;g<currentGroup.length;g++){
      if(!isSameDisplayedRank(currentGroup[g],row,cls)){sameAsGroup=false;break;}
    }
    if(sameAsGroup){
      ranks.push(currentRank);
      currentGroup.push(row);
    }else{
      currentRank=i+1;
      ranks.push(currentRank);
      currentGroup=[row];
    }
  }
  return ranks;
}

// 大会の report.date（"YYYY年MM月DD日"）を YYYY-MM-DD に変換。失敗時は今日。
function getTournamentDateFromReport(r){
  if(r&&typeof r.date==='string'){
    var m=r.date.match(/(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/);
    if(m)return m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2);
  }
  return todayYmd();
}

// マスタ同期は saveData() 時のみ。save()/resetAll()/編集時に呼ばない（仕様書 3.4.1、§3.1.3）
function syncBranchMasterOnSave(){
  try{
    var master=loadBranchMaster();
    // 仕様書 v5 §3.5 / Codex MF #3: 破損由来の空マスタは保存しない。
    // 既存 localStorage を保持し、ユーザの再マイグレ・手動修復を待つ。
    if(master&&master._loaded_with_corruption){
      if(typeof console!=='undefined'&&console.warn)console.warn('支部マスタが破損しているため自動同期をスキップ（大会データのコピーは継続）');
      if(typeof showMsg==='function')showMsg('支部マスタが破損しているため自動同期をスキップしました（大会データのコピーは継続）','warn');
      save();
      return;
    }
    var date=getTournamentDateFromReport(state.report);
    // 仕様書 v5 §3.3 / Codex MF #1: 大会日を ensureTournamentId に明示的に渡す
    ensureTournamentId(state,master,date);
    // A-4 §3.1.5: 登録画面ふりがな欄から退避した値（_pendingNewYomi）をマスタへ反映
    updateBranchMasterFromTournament(state,master,{tournament_id:state.tournament_id,tournament_date:date,yomiMap:_pendingNewYomi});
    saveBranchMaster(master);
    // 反映済みのため一時マップをクリア
    _pendingNewYomi={};
    save();
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('支部マスタ同期に失敗（既存大会運営は継続）',e);
  }
}

// クリップボード優先、非対応(http等)はファイルダウンロードにフォールバック
function saveData(){
  // F2: 大会データコピー時に支部マスタへ同期（A-1 ではこのタイミングのみ）
  syncBranchMasterOnSave();
  var json=JSON.stringify(state,null,2);
  if(navigator.clipboard&&navigator.clipboard.writeText&&window.isSecureContext){
    navigator.clipboard.writeText(json).then(function(){
      alert('大会データをコピーしました。\n\nメモ帳やEvernoteに貼り付けて保管してください。\n\n次回大会前に「マスタ」タブの統合機能で取り込めます。');
    }).catch(function(){
      saveDataAsFile(json);
    });
    return;
  }
  saveDataAsFile(json);
}

function saveDataAsFile(json){
  try{
    var now=new Date();
    var y=now.getFullYear();
    var m=('0'+(now.getMonth()+1)).slice(-2);
    var d=('0'+now.getDate()).slice(-2);
    var hh=('0'+now.getHours()).slice(-2);
    var mm=('0'+now.getMinutes()).slice(-2);
    var filename='shogi_'+y+m+d+'_'+hh+mm+'.json';
    var blob=new Blob([json],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download=filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert(filename+' に保存しました（端末のダウンロードフォルダ）');
  }catch(e){
    alert('保存に失敗しました');
  }
}

// 読み込み済みのデータを state 反映して UI を更新（ファイル/貼り付け共通）
function applyLoadedJson(rawText){
  var loaded=JSON.parse(rawText);
  state=normalizeState(loaded);
  save();
  populateReportFields();
  renderRegList();
  renderPastParticipantsPanel();
  if(state.started){
    if(isTournamentDone()){
      showTab('result');
    } else {
      showTab('tournament');
    }
  } else {
    showTab('reg');
  }
}

function loadData(e){
  var file=e.target.files[0];
  if(!file)return;
  if(!confirm('現在のデータを上書きして読み込みますか？')){e.target.value='';return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      applyLoadedJson(ev.target.result);
      alert('データを読み込みました');
    } catch(err){
      alert('読み込みに失敗しました。正しいファイルか確認してください');
    }
    e.target.value='';
    var lm=document.getElementById('load-modal');if(lm)lm.remove();
  };
  reader.readAsText(file);
}

function loadFromPaste(){
  var ta=document.getElementById('load-paste-area');
  if(!ta)return;
  var text=ta.value.trim();
  if(!text){alert('大会データを貼り付けてください');return;}
  if(!confirm('現在のデータを上書きして読み込みますか？'))return;
  try{
    applyLoadedJson(text);
    var lm=document.getElementById('load-modal');if(lm)lm.remove();
    alert('データを読み込みました');
  }catch(err){
    alert('読み込みに失敗しました。正しい大会データか確認してください');
  }
}

function getTopPlayers(cls){
  var finals=calcFinal(cls);
  var result=[];
  for(var i=0;i<Math.min(3,finals.length);i++){
    result.push({rank:i+1,name:finals[i].p.name});
  }
  return result;
}

  try{
    // 仕様書 3.4.1 / §3.1.5: shogi_branch_master は絶対に消さない
    localStorage.removeItem(STORAGE_KEY);

// ============================================================
// INIT: アプリ起動とイベント初期化
//   bind*Events: 各画面領域のイベント登録
//   initApp: 状態復元とタブ表示の初期化
//   DOMContentLoaded: 上記を順に呼ぶだけ
// ============================================================

function bindHeaderEvents(){
  document.getElementById('saveBtn').addEventListener('click',saveData);
  document.getElementById('loadBtn').addEventListener('click',openLoadModal);
  document.getElementById('loadFile').addEventListener('change',loadData);
  document.getElementById('resetBtn').addEventListener('click',resetAll);

function bindRegistrationEvents(){
  document.getElementById('bulkEditA').addEventListener('click',function(){bulkEditNames('A');});
  document.getElementById('bulkEditB').addEventListener('click',function(){bulkEditNames('B');});
  document.getElementById('addBtn').addEventListener('click',addPlayer);
  document.getElementById('startBtn').addEventListener('click',startTournament);

  // 参加者名入力欄: IME対応 + Enterで追加
  var inpName=document.getElementById('inp-name');
  var composing=false;
  inpName.addEventListener('compositionstart',function(){
    composing=true;
    // A-4 §3.1.2: IME 開始時に自動取得バッファをリセット
    _yomiAutoBuffer='';
  });
  inpName.addEventListener('compositionupdate',function(e){
    // A-4 §3.1.2: ひらがな（U+3040-U+309F）のみで構成されていればバッファ更新。
    // 漢字変換中の data はスキップ（最後のひらがな状態が確定時の追記値となる）。
    var data=(e&&typeof e.data==='string')?e.data:'';
    if(/^[぀-ゟ]*$/.test(data))_yomiAutoBuffer=data;
  });
  inpName.addEventListener('compositionend',function(){
    composing=false;
    // A-4 §3.1.2: 手動編集されていない場合のみ、バッファを yomi 欄末尾に追記。
    // サジェスト由来の値も上書きせず追記するのが原則だが、サジェスト選択直後は
    // _yomiAutoBuffer は空（onSuggestTap で reset 済み）なので追記は発生しない。
    if(!_yomiManuallyEdited && _yomiAutoBuffer){
      var inpYomi=document.getElementById('inp-yomi');
      if(inpYomi){
        inpYomi.value=(inpYomi.value||'')+_yomiAutoBuffer;
      }
    }
    _yomiAutoBuffer='';
    updateSuggestList();
  });
  inpName.addEventListener('keypress',function(e){if(e.key==='Enter'&&!composing)addPlayer();});
  // A-3 サジェスト: 入力中・focus 時に候補更新、blur で閉じる（mousedown より遅延）
  inpName.addEventListener('input',function(){
    if(!composing)updateSuggestList();
    // A-4 §3.1.2: 氏名欄を空にしたら手動編集フラグもリセット
    if(!inpName.value)_yomiManuallyEdited=false;
  });
  inpName.addEventListener('focus',function(){if(!composing)updateSuggestList();});
  inpName.addEventListener('blur',function(){setTimeout(closeSuggestList,150);});

  // A-4 §3.1.2: ふりがな欄の手動編集を追跡。Stage 1 では追跡のみ。
  var inpYomi=document.getElementById('inp-yomi');
  if(inpYomi){
    var yomiComposing=false;
    inpYomi.addEventListener('compositionstart',function(){yomiComposing=true;});
    inpYomi.addEventListener('compositionend',function(){yomiComposing=false;});
    inpYomi.addEventListener('input',function(){
      // ユーザーが yomi 欄を直接編集 → 手動編集フラグ ON
      _yomiManuallyEdited=true;
    });
    inpYomi.addEventListener('keypress',function(e){if(e.key==='Enter'&&!yomiComposing)addPlayer();});
  }
}

function bindTabEvents(){
  document.getElementById('tab-reg').addEventListener('click',function(){showTab('reg');});
  document.getElementById('tab-tournament').addEventListener('click',function(){showTab('tournament');});
  document.getElementById('tab-result').addEventListener('click',function(){showTab('result');});

function populateReportFields(){
  if(!state.report)state.report={date:'',place:'労政会館',start:'',end:'',sei:'',fuku:'',note:''};
  ['date','place','start','end','sei','fuku','note'].forEach(function(k){
    var el=document.getElementById('rep-'+k);
    if(el)el.value=state.report[k]||'';
  });
}

function bindReportEvents(){
  ['date','place','start','end','sei','fuku','note'].forEach(function(k){
    var el=document.getElementById('rep-'+k);
    if(!el)return;
    el.addEventListener('input',function(e){
      if(!state.report)state.report={date:'',place:'労政会館',start:'',end:'',sei:'',fuku:'',note:''};
      state.report[k]=e.target.value;
      save();
    });
  });
  var btn=document.getElementById('downloadReportBtn');
  if(btn)btn.addEventListener('click',downloadReport);
}

// 全体として大会が完了しているか(参加者のいるクラスが全て全ラウンド消化済みか)
function isTournamentDone(){
  var hasAnyClass=false;
  for(var i=0;i<2;i++){
    var cls=['A','B'][i];
    if(state.players[cls].length>0){
      hasAnyClass=true;
      if(state.results[cls].length<state.rounds)return false;
    }
  }
  return hasAnyClass;
}

function initApp(){
  load();
  populateReportFields();
  renderRegList();
  renderPastParticipantsPanel();
  bindPastParticipantsToggle();
  if(state.started){
    if(isTournamentDone()){
      showTab('result');
    } else {
      showTab('tournament');
    }
  }
}

document.addEventListener('DOMContentLoaded',function(){
  bindHeaderEvents();
  bindRegistrationEvents();
  bindTabEvents();
  bindReportEvents();
  initApp();
});
</script>
