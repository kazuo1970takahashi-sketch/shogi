<!DOCTYPE html>
<html lang="ja">
<head>

<title>沼津支部 月例将棋大会 運営ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Meiryo',sans-serif;font-size:15px;color:#222;background:#f5f5f0;min-height:100vh}
.header{background:#1F3864;color:#fff;padding:10px 12px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:15px;font-weight:500}
.container{max-width:1100px;margin:0 auto;padding:10px 8px}
.tab-bar{display:flex;gap:3px;margin-bottom:10px;background:#fff;border-radius:10px;padding:5px;border:1px solid #ddd}
.tab{flex:1;padding:10px 4px;border-radius:8px;border:none;cursor:pointer;font-size:13px;background:transparent;color:#666;font-family:inherit}
.tab.active{background:#1F3864;color:#fff;font-weight:500}
.section{background:#fff;border-radius:10px;padding:12px 12px;margin-bottom:12px;border:1px solid #e0e0e0}
h2{font-size:15px;font-weight:500;margin-bottom:10px;color:#1F3864;border-bottom:2px solid #1F3864;padding-bottom:6px}
h3{font-size:14px;font-weight:500;margin-bottom:8px;color:#444}
.flex{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
input[type=text]{height:44px;padding:0 12px;border:1px solid #ccc;border-radius:8px;font-size:16px;font-family:inherit}
select{height:44px;padding:0 8px;border:1px solid #ccc;border-radius:8px;font-size:15px;font-family:inherit;background:#fff}
button{cursor:pointer;padding:10px 16px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:15px;font-family:inherit;-webkit-tap-highlight-color:transparent}
.btn-primary{background:#1F3864;color:#fff;border-color:#1F3864}
.btn-success{background:#27500A;color:#fff;border-color:#27500A}
.btn-danger{background:#A32D2D;color:#fff;border-color:#A32D2D}
.btn-sm{padding:6px 12px;font-size:13px}
.alert{padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:13px}
.alert-err{background:#fcebeb;color:#A32D2D;border:1px solid #f09595}
.alert-ok{background:#eaf3de;color:#27500A;border:1px solid #97c459}
.alert-warn{background:#faeeda;color:#633806;border:1px solid #EF9F27}
.fee-bar{margin-top:12px;padding:10px 14px;background:#e8f0f8;border-radius:8px;font-size:14px}
.separator{border:none;border-top:1px solid #eee;margin:12px 0}

@media(max-width:600px){

}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
.pairing-card{background:#f8fbff;border:1px solid #d0e4f7;border-radius:10px;padding:12px 12px;margin-bottom:8px}
.winner-btn{padding:10px 8px;border-radius:8px;border:2px solid #ccc;background:#fff;font-size:15px;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;width:7em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.winner-btn.selected{background:#1F3864;color:#fff;border-color:#1F3864}
.score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:6px;margin-bottom:12px}

.row-r1{background:#fef8e7}

table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#e8f0f8;color:#1F3864;font-weight:500;padding:7px 6px;text-align:center;border-bottom:2px solid #2E75B6}
td{padding:7px 6px;text-align:center;border-bottom:1px solid #eee;vertical-align:middle}

@media(max-width:480px){

}

      <button type="button" class="btn-primary" id="downloadReportBtn">報告書を印刷 / PDF保存</button>

<script>
var state = {
  players: {A:[], B:[]},
  rounds: 4,
  pairings: {A:[], B:[]},
  results: {A:[], B:[]},
  started: false,
  report: {date:'', place:'労政会館', start:'', end:'', sei:'', fuku:'', note:''}
};

var STORAGE_KEY='shogi_v4';
var LEGACY_STORAGE_KEYS=['shogi_v3'];

// ============================================================
// UTILITY: 共通の純粋/参照系関数(escapeHtml, 名前取得, 料金計算, 勝数集計, 整合チェック, JSON正規化)
// ============================================================

function escapeHtml(value){
  return String(value==null?'':value)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function getName(id,cls){
  var players=state.players[cls];
  for(var i=0;i<players.length;i++){if(players[i].id===id)return players[i].name;}
  return '(削除)';
}

function getFee(member,grade){
  if(grade==='chu')return member==='member'?0:500;
  return member==='member'?500:1000;
}

function calcTotal(){
  var all=state.players.A.concat(state.players.B);
  var t=0;
  for(var i=0;i<all.length;i++)t+=getFee(all[i].member||'member',all[i].grade||'ippan');
  return t;
}

function getWins(cls){
  var wins={};
  var players=state.players[cls];
  for(var i=0;i<players.length;i++)wins[players[i].id]=0;
  var results=state.results[cls];
  for(var r=0;r<results.length;r++){
    for(var m=0;m<results[r].length;m++){
      var match=results[r][m];
      if(match.winner)wins[match.winner]=(wins[match.winner]||0)+1;
    }
  }
  return wins;
}

function pairHasRematch(cls,p1,p2){
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      var match=state.results[cls][r][m];
      if((match.p1===p1&&match.p2===p2)||(match.p1===p2&&match.p2===p1))return true;
    }
  }
  return false;
}

function getDuplicatePlayersInPairings(cls){
  var used={};
  var dups=[];
  for(var i=0;i<state.pairings[cls].length;i++){
    var m=state.pairings[cls][i];
    if(!m)continue;
    [m.p1,m.p2].forEach(function(pid){
      if(!pid)return;
      if(used[pid]&&dups.indexOf(pid)<0)dups.push(pid);
      used[pid]=true;
    });
  }
  return dups;
}

function normalizeState(raw){
  var base={players:{A:[],B:[]},rounds:4,pairings:{A:[],B:[]},results:{A:[],B:[]},started:false,report:{date:'', place:'労政会館', start:'', end:'', sei:'', fuku:'', note:''}};
  var s=raw&&typeof raw==='object'?raw:{};
  base.rounds=Number(s.rounds)||4;
  base.started=!!s.started;
  ['A','B'].forEach(function(cls){
    var players=(s.players&&Array.isArray(s.players[cls]))?s.players[cls]:[];
    base.players[cls]=players.map(function(p,idx){
      var pp={
        id:p&&p.id?p.id:('restored_'+cls+'_'+idx+'_'+Date.now()),
        name:p&&p.name?String(p.name):'',
        cls:cls,
        member:p&&p.member==='other'?'other':'member',
        grade:p&&p.grade==='chu'?'chu':'ippan'
      };
      // 支部マスタとの紐付け（F2）。既存JSON（member_id 不在）は従来通り。
      if(p&&typeof p.member_id==='string'&&p.member_id)pp.member_id=p.member_id;
      return pp;
    }).filter(function(p){return p.name;});

    // 実在 player id のみ許可。p1/p2 が未登録なら除去、winner が p1/p2 と一致しないなら null 化
    var validIds={};
    for(var i=0;i<base.players[cls].length;i++)validIds[base.players[cls][i].id]=true;
    function sanitizeMatch(m){
      var p1=m&&m.p1&&validIds[m.p1]?m.p1:'';
      var p2=m&&m.p2&&validIds[m.p2]?m.p2:'';
      var winner=m&&m.winner?m.winner:null;
      if(winner!==p1&&winner!==p2)winner=null;
      return {p1:p1,p2:p2,winner:winner};
    }

    base.pairings[cls]=((s.pairings&&Array.isArray(s.pairings[cls]))?s.pairings[cls]:[])
      .map(sanitizeMatch).filter(function(m){return m.p1&&m.p2;});

    base.results[cls]=((s.results&&Array.isArray(s.results[cls]))?s.results[cls]:[]).map(function(round){
      return Array.isArray(round)?round.map(sanitizeMatch).filter(function(m){return m.p1&&m.p2;}):[];
    });
  });
  if(s.report&&typeof s.report==='object'){
    ['date','place','start','end','sei','fuku','note'].forEach(function(k){
      if(typeof s.report[k]==='string')base.report[k]=s.report[k];
    });
  }
  // 支部マスタ連携用の tournament_id を保持（F2）
  if(typeof s.tournament_id==='string'&&s.tournament_id)base.tournament_id=s.tournament_id;
  return base;
}

// ============================================================
// STORAGE: localStorageへの保存と復元(旧版キーからの移行込み)
// ============================================================

function save(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){notifyError('保存に失敗しました。容量超過か、プライベートブラウズの可能性があります。JSONバックアップを保存してください。');}}
function load(){
  // 現行キー → 旧キーの順に試行。各 key は parse 失敗時に次の key にフォールバック。
  var keys=[STORAGE_KEY].concat(LEGACY_STORAGE_KEYS);
  for(var i=0;i<keys.length;i++){
    var d=null;
    try{d=localStorage.getItem(keys[i]);}catch(e){continue;}
    if(!d)continue;
    try{
      state=normalizeState(JSON.parse(d));
      return;
    }catch(e){
      // この key の JSON は壊れている → 次の key を試す
    }
  }
  // すべての key が空 or 壊れている → 初期 state を normalize
  state=normalizeState(state);
}

// ============================================================
// BRANCH MASTER (支部マスタ) — Phase A-1
//   localStorage キー: shogi_branch_master（既存 state とは別管理）
//   破損時も既存大会運営を止めない（normalizeBranchMaster）
//   resetAll() ではマスタを消さない（仕様書 3.4.1）
// ============================================================

var BRANCH_MASTER_KEY='shogi_branch_master';
var BRANCH_MASTER_SCHEMA_VERSION=1;

function createEmptyBranchMaster(){
  return {schema_version:BRANCH_MASTER_SCHEMA_VERSION,updated_at:new Date().toISOString(),members:[]};
}

function isValidYmd(s){return typeof s==='string'&&/^\d{4}-\d{2}-\d{2}$/.test(s);}

function todayYmd(){
  var d=new Date();
  return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);
}

function generateMemberId(master){
  for(var i=0;i<3;i++){
    // 必ず replace(/-/g,'') を先に行う（slice 先行だとハイフンが残る危険）
    var raw=(typeof crypto!=='undefined'&&crypto.randomUUID)?crypto.randomUUID():'';
    var id='m_'+String(raw).replace(/-/g,'').slice(0,12);
    var dup=false;
    if(master&&Array.isArray(master.members)){
      for(var j=0;j<master.members.length;j++){
        if(master.members[j]&&master.members[j].id===id){dup=true;break;}
      }
    }
    if(!dup)return id;
  }
  throw new Error('member_id 生成に3回連続で失敗。マスタが異常です。');
}

function normalizePersonName(name){
  if(typeof name!=='string')return '';
  // 仕様書 3.4.4: 全角空白→半角空白、連続空白を単一空白、前後空白除去
  return name.replace(/　/g,' ').replace(/\s+/g,' ').replace(/^\s+|\s+$/g,'');
}

function normalizeBranchMaster(raw){
  // 仕様書 3.5: 破損データを与えられても落ちない／既存運営を止めない
  if(!raw||typeof raw!=='object'||Array.isArray(raw))return createEmptyBranchMaster();
  var schema_version=Number(raw.schema_version);
  if(!schema_version||isNaN(schema_version))schema_version=BRANCH_MASTER_SCHEMA_VERSION;
  if(schema_version!==BRANCH_MASTER_SCHEMA_VERSION)return createEmptyBranchMaster();

  var membersRaw=Array.isArray(raw.members)?raw.members:[];
  var seenIds={};
  var members=[];
  for(var i=0;i<membersRaw.length;i++){
    var m=membersRaw[i];
    if(!m||typeof m!=='object')continue;
    var id=typeof m.id==='string'?m.id:'';
    var name=typeof m.name==='string'?m.name:'';
    if(!id||!name||seenIds[id])continue;
    seenIds[id]=true;

    var yomi=typeof m.yomi==='string'?m.yomi:'';
    var last_class=(m.last_class==='A'||m.last_class==='B')?m.last_class:null;
    var last_attended=isValidYmd(m.last_attended)?m.last_attended:'';
    var first_attended=isValidYmd(m.first_attended)?m.first_attended:'';
    if(!last_attended&&first_attended)last_attended=first_attended;
    if(!first_attended&&last_attended)first_attended=last_attended;
    if(!last_attended&&!first_attended){var t=todayYmd();last_attended=t;first_attended=t;}

    var tidsRaw=Array.isArray(m.tournament_ids)?m.tournament_ids:[];
    var seenTid={};
    var tournament_ids=[];
    for(var ti=0;ti<tidsRaw.length;ti++){
      var t2=tidsRaw[ti];
      if(typeof t2==='string'&&t2&&!seenTid[t2]){seenTid[t2]=true;tournament_ids.push(t2);}
    }

    members.push({
      id:id,
      name:name,
      yomi:yomi,
      last_class:last_class,
      last_attended:last_attended,
      first_attended:first_attended,
      attendance_count:tournament_ids.length,
      tournament_ids:tournament_ids,
      deleted:m.deleted===true,
      deleted_at:typeof m.deleted_at==='string'?m.deleted_at:null,
      note:typeof m.note==='string'?m.note:''
    });
  }
  var updated_at=typeof raw.updated_at==='string'?raw.updated_at:new Date().toISOString();
  return {schema_version:BRANCH_MASTER_SCHEMA_VERSION,updated_at:updated_at,members:members};
}

function loadBranchMaster(){
  var raw=null;
  try{raw=localStorage.getItem(BRANCH_MASTER_KEY);}catch(e){return createEmptyBranchMaster();}
  if(!raw)return createEmptyBranchMaster();
  try{
    return normalizeBranchMaster(JSON.parse(raw));
  }catch(e){
    // 破損時は空マスタを返すが、既存 localStorage は触らない（自動上書き禁止）
    if(typeof console!=='undefined'&&console.warn)console.warn('支部マスタの読込に失敗。空マスタで継続。既存 localStorage は保持。',e);
    return createEmptyBranchMaster();
  }
}

function saveBranchMaster(master){
  try{
    master.updated_at=new Date().toISOString();
    localStorage.setItem(BRANCH_MASTER_KEY,JSON.stringify(master));
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('支部マスタの保存に失敗。',e);
  }
}

function findMemberCandidates(participant,master){
  if(!participant||!master||!Array.isArray(master.members))return [];
  var pname=normalizePersonName(participant.name||'');
  if(!pname)return [];
  var pyomi=typeof participant.yomi==='string'?participant.yomi:'';
  var out=[];
  for(var i=0;i<master.members.length;i++){
    var m=master.members[i];
    if(!m||m.deleted)continue;
    var nm=normalizePersonName(m.name||'');
    if(nm===pname){out.push(m);continue;}
    // 異体字（髙/高 等）は自動統合しない（仕様書 3.4.4 の方針）
    if(pyomi&&m.yomi&&pyomi===m.yomi)out.push(m);
  }
  return out;
}

// ============================================================
// BRANCH MASTER SYNC (F2): 大会JSONバックアップ保存時のマスタ同期
//   呼び出しは saveData() からのみ。save()/resetAll()/編集時には呼ばない。
// ============================================================

function ensureTournamentId(state,master,tournamentDate){
  if(state&&typeof state.tournament_id==='string'&&state.tournament_id)return state.tournament_id;
  // 仕様書 v5 §3.3 / Codex MF #1: tournament_id は「大会日」ベースで生成。
  // tournamentDate が無効な場合のみ todayYmd() にフォールバック。
  var date=isValidYmd(tournamentDate)?tournamentDate:todayYmd();
  var base='t_'+date.replace(/-/g,'_');
  var id=base;
  if(master&&Array.isArray(master.members)){
    var existing={};
    for(var i=0;i<master.members.length;i++){
      var arr=master.members[i].tournament_ids||[];
      for(var j=0;j<arr.length;j++)existing[arr[j]]=true;
    }
    var n=2;
    while(existing[id]){id=base+'_'+n;n++;}
  }
  if(state)state.tournament_id=id;
  return id;
}

function attachMemberIdToPlayer(player,member){
  if(!player||!member)return;
  player.member_id=member.id;
}

function addTournamentIdOnce(member,tournamentId){
  if(!member||!tournamentId)return false;
  if(!Array.isArray(member.tournament_ids))member.tournament_ids=[];
  if(member.tournament_ids.indexOf(tournamentId)>=0)return false;
  member.tournament_ids.push(tournamentId);
  return true;
}

function recalcMemberAttendance(member){
  if(!member)return 0;
  if(!Array.isArray(member.tournament_ids))member.tournament_ids=[];
  member.attendance_count=member.tournament_ids.length;
  return member.attendance_count;
}

function createMemberFromParticipant(p,master,date){
  return {
    id:generateMemberId(master),
    name:normalizePersonName(p.name||''),
    yomi:'',
    last_class:(p.cls==='A'||p.cls==='B')?p.cls:null,
    last_attended:date,
    first_attended:date,
    attendance_count:0,
    tournament_ids:[],
    deleted:false,
    deleted_at:null,
    note:''
  };
}

function updateBranchMasterFromTournament(state,master,tournamentMeta){
  if(!state||!master||!Array.isArray(master.members))return master;
  if(!tournamentMeta||!tournamentMeta.tournament_id)return master;
  var tid=tournamentMeta.tournament_id;
  var date=isValidYmd(tournamentMeta.tournament_date)?tournamentMeta.tournament_date:todayYmd();

  var affected={};
  var pendingSkippedNames=[];
  var classes=['A','B'];
  for(var ci=0;ci<classes.length;ci++){
    var cls=classes[ci];
    var players=(state.players&&Array.isArray(state.players[cls]))?state.players[cls]:[];
    for(var pi=0;pi<players.length;pi++){
      var p=players[pi];
      if(!p||!p.name)continue;
      var member=null;
      if(typeof p.member_id==='string'&&p.member_id){
        for(var mi=0;mi<master.members.length;mi++){
          if(master.members[mi].id===p.member_id){member=master.members[mi];break;}
        }
      }
      if(!member){
        var cands=findMemberCandidates({name:p.name},master);
        if(cands.length===1){
          member=cands[0];
          attachMemberIdToPlayer(p,member);
        }else if(cands.length>1){
          // 仕様書 v5 §3.4.4 / Codex MF #2: 同名複数候補時はマスタ同期をスキップ。
          // 誤タップ・取り違えで別人を統合する事故を防ぐため、member_id は付与しない。
          // tournament_ids への追加もしない。後で手動紐付け（A-2）の余地を残す。
          var skipName=String(p.name||'');
          if(typeof console!=='undefined'&&console.warn)console.warn('「'+skipName+'」は同名候補が '+cands.length+' 件あるためマスタ同期を保留');
          pendingSkippedNames.push(skipName);
          continue;
        }else{
          try{
            member=createMemberFromParticipant(p,master,date);
            master.members.push(member);
            attachMemberIdToPlayer(p,member);
          }catch(e){
            if(typeof console!=='undefined'&&console.warn)console.warn('member_id 生成失敗。スキップ',e);
            continue;
          }
        }
      }
      addTournamentIdOnce(member,tid);
      if(isValidYmd(date)){
        if(!member.last_attended||date>=member.last_attended)member.last_attended=date;
        if(!member.first_attended||date<member.first_attended)member.first_attended=date;
      }
      if(p.cls==='A'||p.cls==='B')member.last_class=p.cls;
      affected[member.id]=member;
    }
  }
  for(var k in affected){
    if(affected.hasOwnProperty(k))recalcMemberAttendance(affected[k]);
  }
  // 保留通知（複数件あっても1度だけ）
  if(pendingSkippedNames.length>0&&typeof showMsg==='function'){
    showMsg('同名候補が複数あるため次の '+pendingSkippedNames.length+' 名のマスタ同期を保留しました：'+pendingSkippedNames.join('、'),'warn');
  }
  return master;
}

function buildPastParticipantsPanelHtml(master,filter){

  }
  filtered.sort(function(a,b){
    var la=a.last_attended||'',lb=b.last_attended||'';
    if(la!==lb)return la<lb?1:-1;
    return (a.name||'')<(b.name||'')?-1:1;
  });
  var html='<div class="flex" style="margin-bottom:8px">';
  html+='<input type="text" id="pp-search" placeholder="氏名で検索（漢字部分一致）" value="'+escapeHtml(filter||'')+'" style="flex:1;min-width:0">';
  html+='</div>';

    html+='<div style="color:#888;font-size:13px;padding:8px 0">支部マスタが空です。「マスタ」タブから過去大会を統合できます。</div>';
    return html;
  }
  if(filtered.length===0){
    html+='<div style="color:#888;font-size:13px;padding:8px 0">該当する参加者がいません。</div>';
    return html;
  }
  html+='<div style="max-height:280px;overflow-y:auto;border:1px solid #e0e0e0;border-radius:8px;padding:6px;margin-bottom:8px">';
  for(var j=0;j<filtered.length;j++){
    var fm=filtered[j];
    var lc=fm.last_class==='A'?'Aクラス':(fm.last_class==='B'?'Bクラス':'-');
    html+='<label style="display:flex;align-items:center;gap:8px;padding:6px 4px;border-bottom:1px solid #f0f0f0;cursor:pointer">';
    html+='<input type="checkbox" class="pp-check" data-mid="'+escapeHtml(fm.id)+'">';
    html+='<span style="flex:1;font-size:14px">'+escapeHtml(fm.name)+'</span>';
    html+='<span style="font-size:12px;color:#666">'+escapeHtml(lc)+'</span>';
    html+='<span style="font-size:11px;color:#888;min-width:5em;text-align:right">'+escapeHtml(fm.last_attended||'')+'</span>';
    html+='</label>';
  }
  html+='</div>';
  html+='<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
  html+='<button type="button" class="btn-primary" id="pp-add">選択した <span id="pp-count">0</span> 名を追加</button>';
  html+='<span style="font-size:12px;color:#888">最終クラスをデフォルトに登録</span>';
  html+='</div>';
  return html;
}

function bindPastParticipantsPanelEvents(){
  var input=document.getElementById('pp-search');
  if(input){
    var composing=false;
    input.addEventListener('compositionstart',function(){composing=true;});
    input.addEventListener('compositionend',function(){composing=false;renderPastParticipantsPanel(input.value);});
    input.addEventListener('input',function(){if(!composing)renderPastParticipantsPanel(input.value);});
  }
  var checks=document.querySelectorAll('.pp-check');
  function updateCount(){
    var n=0;
    for(var i=0;i<checks.length;i++)if(checks[i].checked)n++;
    var c=document.getElementById('pp-count');
    if(c)c.textContent=n;
  }
  for(var i=0;i<checks.length;i++)checks[i].addEventListener('change',updateCount);
  updateCount();
  var addBtn=document.getElementById('pp-add');
  if(addBtn)addBtn.addEventListener('click',addSelectedPastParticipants);
}

function addSelectedPastParticipants(){
  var master=loadBranchMaster();
  var checks=document.querySelectorAll('.pp-check');
  var picked=[];
  for(var i=0;i<checks.length;i++){
    if(!checks[i].checked)continue;
    var mid=checks[i].getAttribute('data-mid');
    for(var j=0;j<master.members.length;j++){
      if(master.members[j].id===mid){picked.push(master.members[j]);break;}
    }
  }
  if(picked.length===0){alert('追加する参加者を選択してください');return;}
  var existingNames={};
  var existingMids={};
  var allCurrent=state.players.A.concat(state.players.B);
  for(var k=0;k<allCurrent.length;k++){
    if(allCurrent[k].name)existingNames[allCurrent[k].name]=true;
    if(allCurrent[k].member_id)existingMids[allCurrent[k].member_id]=true;
  }
  var added=0,skipped=0;
  for(var p=0;p<picked.length;p++){
    var m=picked[p];
    if(existingMids[m.id]||existingNames[m.name]){skipped++;continue;}
    var cls=(m.last_class==='A'||m.last_class==='B')?m.last_class:'A';
    var pid='p'+Date.now()+Math.floor(Math.random()*1000)+'_'+p;
    state.players[cls].push({id:pid,name:m.name,cls:cls,member:'member',grade:'ippan',member_id:m.id});
    existingMids[m.id]=true;
    existingNames[m.name]=true;
    added++;
  }
  renderRegList();save();
  renderPastParticipantsPanel('');
  showMsg(added+'名を追加しました'+(skipped>0?'（同名・同 member_id 重複 '+skipped+'名はスキップ）':''),'ok');
}

  var master=loadBranchMaster();
  var members=(master&&Array.isArray(master.members))?master.members.filter(function(m){return !m.deleted;}):[];
  if(members.length===0){section.style.display='none';return;}
  section.style.display='block';
  var summary=document.getElementById('pp-summary');
  if(summary)summary.textContent='登録 '+members.length+'名';
  var panel=document.getElementById('ppPanel');
  if(!panel)return;
  panel.innerHTML=buildPastParticipantsPanelHtml(master,filter||'');
  bindPastParticipantsPanelEvents();
}

function buildMigrationModalHtml(){

    +'<h3 style="margin-bottom:12px;font-size:16px;font-weight:500;color:#1F3864">過去大会の統合</h3>'
    +'<p style="font-size:13px;color:#555;line-height:1.6;margin-bottom:12px">過去の大会JSONファイルを読み込んで、支部マスタを構築します。複数選択できます。</p>'
    +'<div style="margin-bottom:12px">'
    +'<input type="file" id="mig-files" accept=".json" multiple style="font-size:13px;width:100%">'
    +'</div>'
    +'<div id="mig-status" style="font-size:13px;color:#555;margin-bottom:12px;min-height:1.5em;line-height:1.6"></div>'

    +'<button type="button" class="btn-primary" id="mig-run">統合を実行</button>'
    +'</div></div>';
}

function bindMigrationModalEvents(){
  var cancelBtn=document.getElementById('mig-cancel');
  if(cancelBtn)cancelBtn.addEventListener('click',function(){
    var m=document.getElementById('mig-modal');if(m)m.remove();
  });
  var runBtn=document.getElementById('mig-run');
  if(runBtn)runBtn.addEventListener('click',function(){
    var input=document.getElementById('mig-files');
    var files=input&&input.files?input.files:[];
    if(!files||files.length===0){alert('JSONファイルを選択してください');return;}
    var statusEl=document.getElementById('mig-status');
    if(statusEl)statusEl.textContent='読み込み中...';
    parseTournamentJsonFiles(files).then(function(tournaments){
      var master=loadBranchMaster();
      var summary=mergeTournamentParticipantsIntoMaster(tournaments,master);
      saveBranchMaster(master);
      if(statusEl){
        statusEl.textContent=summary.tournaments+'大会を読込：新規追加 '+summary.added+'名 / 既存統合 '+summary.matched+'件 / スキップ '+summary.skipped+'件';
      }
      renderMasterTab();
      renderPastParticipantsPanel();
    }).catch(function(err){
      if(statusEl)statusEl.textContent='読み込みに失敗：'+(err&&err.message?err.message:String(err));
    });
  });
}

function openMigrationWizard(){
  var existing=document.getElementById('mig-modal');
  if(existing)existing.remove();
  var modal=document.createElement('div');
  modal.id='mig-modal';
  modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML=buildMigrationModalHtml();
  document.body.appendChild(modal);
  bindMigrationModalEvents();
}

function parseTournamentJsonFiles(files){
  var arr=Array.prototype.slice.call(files);
  return Promise.all(arr.map(function(file){
    return new Promise(function(resolve,reject){
      var reader=new FileReader();
      reader.onload=function(ev){
        try{
          var raw=JSON.parse(ev.target.result);
          resolve({raw:raw,filename:file.name||''});
        }catch(e){
          reject(new Error((file.name||'JSONファイル')+' のパースに失敗：'+e.message));
        }
      };
      reader.onerror=function(){reject(new Error((file.name||'JSONファイル')+' の読込に失敗'));};
      reader.readAsText(file);
    });
  }));
}

function deriveTournamentMetaForMigration(raw,filename,master){
  if(raw&&typeof raw.tournament_id==='string'&&raw.tournament_id){
    var tdate=isValidYmd(raw.tournament_date)?raw.tournament_date:null;
    if(!tdate&&raw.report&&typeof raw.report.date==='string'){
      var rm0=raw.report.date.match(/(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/);
      if(rm0)tdate=rm0[1]+'-'+('0'+rm0[2]).slice(-2)+'-'+('0'+rm0[3]).slice(-2);
    }
    return {tournament_id:raw.tournament_id, tournament_date:tdate||todayYmd()};
  }
  var date=null;
  var fm=filename&&filename.match(/(\d{4})(\d{2})(\d{2})/);
  if(fm)date=fm[1]+'-'+fm[2]+'-'+fm[3];
  if(!date&&raw&&raw.report&&typeof raw.report.date==='string'){
    var rm=raw.report.date.match(/(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/);
    if(rm)date=rm[1]+'-'+('0'+rm[2]).slice(-2)+'-'+('0'+rm[3]).slice(-2);
  }
  if(!date)date=todayYmd();
  var base='t_'+date.replace(/-/g,'_');
  var existing={};
  for(var i=0;i<master.members.length;i++){
    var arr=master.members[i].tournament_ids||[];
    for(var j=0;j<arr.length;j++)existing[arr[j]]=true;
  }
  var id=base; var n=2;
  while(existing[id]){id=base+'_'+n;n++;}
  return {tournament_id:id, tournament_date:date};
}

function mergeTournamentParticipantsIntoMaster(tournaments,master){
  var added=0, matched=0, skipped=0;
  for(var t=0;t<tournaments.length;t++){
    var entry=tournaments[t];
    var raw=entry&&entry.raw;
    if(!raw||typeof raw!=='object'){skipped++;continue;}
    var tempState=normalizeState(raw);
    var meta=deriveTournamentMetaForMigration(raw,entry.filename||'',master);
    var classes=['A','B'];
    for(var ci=0;ci<classes.length;ci++){
      var cls=classes[ci];
      var players=tempState.players[cls]||[];
      for(var pi=0;pi<players.length;pi++){
        var p=players[pi];
        if(!p||!p.name)continue;
        var member=null;
        if(typeof p.member_id==='string'&&p.member_id){
          for(var mi=0;mi<master.members.length;mi++){
            if(master.members[mi].id===p.member_id){member=master.members[mi];break;}
          }
        }
        if(!member){
          var cands=findMemberCandidates({name:p.name},master);
          if(cands.length===1){
            member=cands[0]; matched++;
          }else{
            // 0件 → 新規。複数 → 自動統合しない（仕様書 7.5）→ 新規作成
            try{
              member=createMemberFromParticipant(p,master,meta.tournament_date);
              master.members.push(member); added++;
            }catch(e){skipped++;continue;}
          }
        }else{
          matched++;
        }
        addTournamentIdOnce(member,meta.tournament_id);
        if(isValidYmd(meta.tournament_date)){
          if(!member.last_attended||meta.tournament_date>=member.last_attended)member.last_attended=meta.tournament_date;
          if(!member.first_attended||meta.tournament_date<member.first_attended)member.first_attended=meta.tournament_date;
        }
        if(p.cls==='A'||p.cls==='B')member.last_class=p.cls;
        recalcMemberAttendance(member);
      }
    }
  }
  return {tournaments:tournaments.length, added:added, matched:matched, skipped:skipped};
}

function showMsg(text,type){
  var el=document.getElementById('reg-msg');
  el.innerHTML=text?'<div class="alert alert-'+type+'">'+escapeHtml(text)+'</div>':'';
}

// 致命的エラーは登録タブが見えていない可能性があるため alert で通知（重複連発を避けるため直近メッセージで抑止）
var _lastErr={text:'',at:0};
function notifyError(text){
  showMsg(text,'err');
  var now=Date.now();
  if(_lastErr.text===text&&now-_lastErr.at<3000)return;
  _lastErr={text:text,at:now};
  var regVisible=document.getElementById('pane-reg').style.display!=='none';
  if(!regVisible)alert(text);
}

function renderRegList(){
  var clsList=['A','B'];
  for(var ci=0;ci<clsList.length;ci++){
    var cls=clsList[ci];
    var players=state.players[cls];
    var countId=cls==='A'?'a-count':'b-count';
    var listId=cls==='A'?'a-list':'b-list';
    var countEl=document.getElementById(countId);
    var listEl=document.getElementById(listId);
    if(countEl)countEl.textContent='('+players.length+'名)';
    if(listEl){
      listEl.innerHTML='';
      for(var i=0;i<players.length;i++){
        listEl.appendChild(makePlayerRow(players[i],cls,i));
      }
    }
  }
  var total=calcTotal();
  var allCount=state.players.A.length+state.players.B.length;
  var feeEl=document.getElementById('fee-summary');
  if(feeEl){

      feeEl.className='fee-bar';

function makePlayerRow(p,cls,i){
  var div=document.createElement('div');

  // 1段目: 情報(番号・名前・支部員区分・種別)
  var mainDiv=document.createElement('div');
  mainDiv.className='player-row-main';

  var num=document.createElement('span');
  num.style.cssText='color:#888;font-size:12px;min-width:28px';
  num.textContent=cls+(i+1);
  mainDiv.appendChild(num);

  var name=document.createElement('span');
  name.className='player-name';
  name.textContent=p.name;
  mainDiv.appendChild(name);

  var mSel=document.createElement('select');
  mSel.className='sel-sm';
  var o1=document.createElement('option');o1.value='member';o1.textContent='支部員';

  mSel.appendChild(o1);mSel.appendChild(o2);

  gSel.className='sel-sm';

  if((p.grade||'ippan')==='chu')g2.selected=true; else g1.selected=true;
  gSel.appendChild(g1);gSel.appendChild(g2);
  gSel.addEventListener('change',(function(pid,c){return function(){
    updateField(pid,c,'grade',this.value);
  };})(p.id,cls));
  mainDiv.appendChild(gSel);

  div.appendChild(mainDiv);

  // 2段目: 左=料金(情報)、右=操作ボタン群(名前編集・削除)
  // スマホでは space-between で左右に分離
  // PCでは main の右に詰めて並ぶ
  var actionsDiv=document.createElement('div');
  actionsDiv.className='player-row-actions';

  var fee=getFee(p.member||'member',p.grade||'ippan');
  var feeSpan=document.createElement('span');
  feeSpan.className='player-fee';
  feeSpan.textContent=fee===0?'無料':fee.toLocaleString()+'円';
  actionsDiv.appendChild(feeSpan);

  // 操作ボタン群を1単位にまとめる(スマホの space-between で右端にまとめて配置)
  var buttonsDiv=document.createElement('div');

  editBtn.className='btn-sm';

  editBtn.addEventListener('click',(function(pid,c){return function(){editPlayer(pid,c);};})(p.id,cls));
  buttonsDiv.appendChild(editBtn);

  delBtn.className='btn-sm btn-danger';
  delBtn.textContent='削除';

  buttonsDiv.appendChild(delBtn);

  actionsDiv.appendChild(buttonsDiv);
  div.appendChild(actionsDiv);

  return div;

function updateField(id,cls,field,value){
  var players=state.players[cls];
  for(var i=0;i<players.length;i++){
    if(players[i].id===id){players[i][field]=value;break;}
  }
  renderRegList();save();
}

function addPlayer(){
  var name=document.getElementById('inp-name').value.trim();
  var cls=document.getElementById('inp-class').value;
  if(!name){showMsg('名前を入力してください','err');return;}
  var all=state.players.A.concat(state.players.B);
  for(var i=0;i<all.length;i++){if(all[i].name===name){showMsg('同じ名前の参加者がいます','err');return;}}
  var id='p'+Date.now()+Math.floor(Math.random()*1000);
  state.players[cls].push({id:id,name:name,cls:cls,member:'member',grade:'ippan'});
  document.getElementById('inp-name').value='';
  document.getElementById('inp-name').focus();
  showMsg(name+'（'+cls+'クラス）を登録しました','ok');
  renderRegList();save();
}

function removePlayer(id,cls){
  var name=getName(id,cls);
  var inPairings=false;
  for(var i=0;i<state.pairings[cls].length;i++){
    var pm=state.pairings[cls][i];
    if(pm.p1===id||pm.p2===id){inPairings=true;break;}
  }
  if(inPairings){
    alert(name+'は進行中の対局に登録されているため削除できません。\n\n先に「対戦相手変更」で別の選手に差し替えてから削除してください。');
    return;
  }
  var pastMatches=0;
  for(var r=0;r<state.results[cls].length;r++){
    for(var mi=0;mi<state.results[cls][r].length;mi++){
      var rm=state.results[cls][r][mi];
      if(rm.p1===id||rm.p2===id)pastMatches++;
    }
  }
  // 大会開始後で過去対局がある参加者は削除禁止（calcFinalがstate.players前提のため、TypeErrorで最終結果タブが落ちる）
  if(state.started&&pastMatches>0){
    alert(name+'は過去'+pastMatches+'試合分の対戦履歴があるため、大会開始後は削除できません。\n\n誤って登録した場合は「リセット」で大会をやり直してください。');
    return;
  }
  var msg=name+'を削除しますか？';
  if(!confirm(msg))return;
  var arr=state.players[cls];
  state.players[cls]=arr.filter(function(p){return p.id!==id;});
  renderRegList();save();
}

function bindBulkEditModalEvents(cls, players){
  // 最初のinputにフォーカス
  var firstInput=document.getElementById('bulk-name-'+players[0].id);
  if(firstInput)firstInput.focus();

  // Enterで次のフィールドに移動
  for(var i=0;i<players.length;i++){
    (function(idx){
      var inp=document.getElementById('bulk-name-'+players[idx].id);
      if(!inp)return;
      inp.addEventListener('keypress',function(e){
        if(e.key==='Enter'){
          var next=document.getElementById('bulk-name-'+(players[idx+1]?players[idx+1].id:''));
          if(next)next.focus();
          else document.getElementById('bulk-save').click();
        }
      });
    })(i);
  }

  document.getElementById('bulk-cancel').addEventListener('click',function(){
    document.getElementById('bulk-edit-modal').remove();
  });

  document.getElementById('bulk-save').addEventListener('click',function(){
    var all=state.players.A.concat(state.players.B);
    var hasError=false;
    var newNames={};

    for(var i=0;i<players.length;i++){
      var inp=document.getElementById('bulk-name-'+players[i].id);
      var newName=inp?inp.value.trim():'';
      if(!newName){alert((i+1)+'番目の名前が空です');hasError=true;break;}
      newNames[players[i].id]=newName;
    }
    if(hasError)return;

    // 重複チェック（他クラス含む、編集対象同士の新名前も比較）
    for(var i=0;i<players.length;i++){
      var newName=newNames[players[i].id];
      for(var j=0;j<all.length;j++){
        if(all[j].id===players[i].id)continue;
        var otherName=newNames[all[j].id]||all[j].name;
        if(otherName===newName){
          alert('"'+newName+'"が重複しています');hasError=true;break;
        }
      }
      if(hasError)break;
    }
    if(hasError)return;

    for(var i=0;i<players.length;i++){
      players[i].name=newNames[players[i].id];
    }
    document.getElementById('bulk-edit-modal').remove();
    renderRegList();save();
  });
}

function startTournament(){
  var total=state.players.A.length+state.players.B.length;
  if(total<2){showMsg('参加者が少なすぎます','err');return;}
  if(state.players.A.length%2!==0&&state.players.A.length>0){showMsg('Aクラスが奇数です。運営者を追加してください','warn');return;}
  if(state.players.B.length%2!==0&&state.players.B.length>0){showMsg('Bクラスが奇数です。運営者を追加してください','warn');return;}
  var hasOngoing=state.started && (
    state.pairings.A.length>0 || state.pairings.B.length>0 ||
    state.results.A.length>0 || state.results.B.length>0
  );
  if(hasOngoing){
    if(!confirm('進行中の大会データがあります。再開始すると現在の結果が消えます。続けますか？'))return;
  }
  state.started=true;
  state.pairings={A:[],B:[]};
  state.results={A:[],B:[]};
  if(state.players.A.length>0)generatePairing('A');
  if(state.players.B.length>0)generatePairing('B');
  showTab('tournament');save();
}

function generatePairing(cls){
  var players=state.players[cls];
  if(players.length<2)return;
  var wins=getWins(cls);
  var played={};
  for(var i=0;i<players.length;i++)played[players[i].id]=[];
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      var match=state.results[cls][r][m];
      if(match.winner){
        played[match.p1].push(match.p2);
        played[match.p2].push(match.p1);
      }
    }
  }

  // 勝ち数降順ソート後、全体を完全ランダムにシャッフル（勝ち数順は維持）
  var sorted=players.slice().sort(function(a,b){return (wins[b.id]||0)-(wins[a.id]||0);});
  // 同勝ち数グループを完全ランダムにシャッフル
  var si=0;
  while(si<sorted.length){
    var sj=si;
    var sw=wins[sorted[si].id]||0;
    while(sj<sorted.length&&(wins[sorted[sj].id]||0)===sw)sj++;
    // グループ全体をFisher-Yatesで完全シャッフル
    for(var sk=sj-1;sk>si;sk--){
      var sl=si+Math.floor(Math.random()*(sk-si+1));
      var stmp=sorted[sk];sorted[sk]=sorted[sl];sorted[sl]=stmp;
    }
    si=sj;
  }
  // さらに全体も勝ち数を崩さない範囲でシャッフル（登録順の影響を排除）
  // 同勝ち数の選手同士の順番はすでにランダム化済み

  // バックトラッキングでペアリング生成
  var pairedArr=[];
  for(var i=0;i<sorted.length;i++)pairedArr.push(false);
  var pairs=[];

  function backtrack(idx,allowRematch){
    while(idx<sorted.length&&pairedArr[idx])idx++;
    if(idx>=sorted.length)return true;
    // 候補を勝数差で評価。同勝ち数グループ内はランダム順、グループ間は勝数差昇順
    var pi=sorted[idx];
    var piWins=wins[pi.id]||0;
    // 勝数差ごとにバケット化
    var buckets={};
    for(var j=idx+1;j<sorted.length;j++){
      if(pairedArr[j])continue;
      var pj=sorted[j];
      if(!allowRematch&&played[pi.id].indexOf(pj.id)>=0)continue;
      var diff=Math.abs((wins[pj.id]||0)-piWins);
      if(!buckets[diff])buckets[diff]=[];
      buckets[diff].push(j);
    }
    // 勝数差昇順でバケットを並べ、各バケット内をシャッフルしてフラット化
    var diffs=[];
    for(var dk in buckets){if(buckets.hasOwnProperty(dk))diffs.push(Number(dk));}
    diffs.sort(function(a,b){return a-b;});
    var candidates=[];
    for(var di=0;di<diffs.length;di++){
      var bucket=buckets[diffs[di]];
      // Fisher-Yatesでバケット内をシャッフル
      for(var bi=bucket.length-1;bi>0;bi--){
        var bj=Math.floor(Math.random()*(bi+1));
        var bt=bucket[bi];bucket[bi]=bucket[bj];bucket[bj]=bt;
      }
      for(var bk=0;bk<bucket.length;bk++)candidates.push(bucket[bk]);
    }
    for(var ci=0;ci<candidates.length;ci++){
      var j=candidates[ci];
      pairedArr[idx]=true;pairedArr[j]=true;
      pairs.push({p1:sorted[idx].id,p2:sorted[j].id,winner:null});
      if(backtrack(idx+1,allowRematch))return true;
      pairs.pop();
      pairedArr[idx]=false;pairedArr[j]=false;
    }
    return false;
  }

  if(!backtrack(0,false))backtrack(0,true);

  state.pairings[cls]=pairs;
  save();
}

function setWinner(cls,idx,wid){
  if(state.pairings[cls][idx].winner===wid){
    state.pairings[cls][idx].winner=null;
  } else {
    state.pairings[cls][idx].winner=wid;
  }
  renderTournament(cls);save();
}

function bindChangePairingModalEvents(cls, idx){
  document.getElementById('chg-save').addEventListener('click',function(){
    var p1=document.getElementById('chg-p1').value;
    var p2=document.getElementById('chg-p2').value;
    if(p1===p2){alert('同じ選手を先手・後手両方に選べません');return;}

    var duplicateConflict=false;
    for(var i=0;i<state.pairings[cls].length;i++){
      if(i===idx)continue;
      var pair=state.pairings[cls][i];
      if(pair.p1===p1||pair.p2===p1||pair.p1===p2||pair.p2===p2){
        duplicateConflict=true;
        break;
      }
    }
    if(duplicateConflict){
      alert('選んだ選手は、すでに別の対局に入っています。重複しない組み合わせにしてください。');
      return;
    }

    if(pairHasRematch(cls,p1,p2)){
      if(!confirm('この組み合わせは過去に対戦済みです。再戦として保存しますか？'))return;
    }

    state.pairings[cls][idx]={p1:p1,p2:p2,winner:null};
    document.getElementById('chg-modal').remove();
    renderTournament(cls);save();
  });
}

function changePairing(cls,idx){
  var match=state.pairings[cls][idx];
  var candidates=state.players[cls];
  var html=buildChangePairingModalHtml(cls, idx, candidates, match);
  var div=document.createElement('div');
  div.innerHTML=html;
  document.body.appendChild(div.firstChild);
  bindChangePairingModalEvents(cls, idx);
}

function submitRound(cls){
  var unfinished=state.pairings[cls].filter(function(m){return !m.winner;});
  if(unfinished.length>0){alert('全試合の結果を入力してください');return;}
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      if(!state.results[cls][r][m].winner){
        alert((r+1)+'回戦に未入力の対局があります。修正してから確定してください');return;
      }
    }
  }
  var playerMap={};
  for(var pi=0;pi<state.players[cls].length;pi++){
    playerMap[state.players[cls][pi].id]=true;
  }
  var usedIds={};
  for(var i=0;i<state.pairings[cls].length;i++){
    var m=state.pairings[cls][i];
    if(!playerMap[m.p1]||!playerMap[m.p2]){alert((i+1)+'試合目に登録されていない選手が含まれています。「対戦相手変更」または「組み合わせを再生成」で修正してください。');return;}
    if(usedIds[m.p1]){alert(getName(m.p1,cls)+'が複数の対局に登録されています。対戦相手を修正してください。');return;}
    if(usedIds[m.p2]){alert(getName(m.p2,cls)+'が複数の対局に登録されています。対戦相手を修正してください。');return;}
    if(m.p1===m.p2){alert(getName(m.p1,cls)+'が同じ対局の先手・後手に登録されています。対戦相手を修正してください。');return;}
    usedIds[m.p1]=true;
    usedIds[m.p2]=true;
  }
  var missing=[];
  for(var i=0;i<state.players[cls].length;i++){
    var p=state.players[cls][i];
    if(!usedIds[p.id])missing.push(p.name);
  }
  if(missing.length>0){
    alert('次の参加者が対局に登録されていません：\n'+missing.join('、')+'\n\n「対戦相手変更」または「組み合わせを再生成」で全員を対局に入れてください。');return;
  }
  state.results[cls].push(JSON.parse(JSON.stringify(state.pairings[cls])));
  state.pairings[cls]=[];
  if(state.results[cls].length<state.rounds)generatePairing(cls);
  renderTournament(cls);save();
}

function buildScoreGridHtml(cls, sorted, wins){

  for(var i=0;i<sorted.length;i++){
    var p=sorted[i];var w=wins[p.id]||0;
    var total=0;for(var r=0;r<state.results[cls].length;r++){for(var m=0;m<state.results[cls][r].length;m++){var mm=state.results[cls][r][m];if(mm.p1===p.id||mm.p2===p.id)total++;}}
    html+='<div class="score-card"><div class="sname">'+escapeHtml(p.name)+'</div><div class="swins">'+w+'</div><div style="font-size:11px;color:#888">'+w+'勝'+(total-w)+'敗</div></div>';
  }
  html+='</div>';
  return html;
}

function buildPlayedHistoryHtml(cls, sorted, played){
  var html='<h3>対戦済みリスト</h3><div style="margin-bottom:12px">';

    html+='<div style="margin-bottom:4px"><strong style="font-size:12px">'+escapeHtml(p.name)+'</strong>：'+(tags||'なし')+'</div>';

function bindTournamentEvents(cls){
  for(var i=0;i<state.pairings[cls].length;i++){
    (function(idx,c){
      var m=state.pairings[cls][idx];
      var b1=document.getElementById('wb_'+c+'_'+idx+'_p1');
      var b2=document.getElementById('wb_'+c+'_'+idx+'_p2');
      var cb=document.getElementById('chgbtn_'+c+'_'+idx);
      if(b1)b1.addEventListener('click',function(){setWinner(c,idx,m.p1);});
      if(b2)b2.addEventListener('click',function(){setWinner(c,idx,m.p2);});
      if(cb)cb.addEventListener('click',function(){changePairing(c,idx);});
    })(i,cls);
  }
  var sb=document.getElementById('submitBtn_'+cls);
  if(sb)sb.addEventListener('click',function(){submitRound(cls);});
  var rb=document.getElementById('repairBtn_'+cls);
  if(rb)rb.addEventListener('click',function(){
    var hasWinner=state.pairings[cls].some(function(m){return m.winner;});
    if(hasWinner){
      if(!confirm('入力済みの勝敗があります。組み合わせを再生成すると勝敗が消えます。続けますか？'))return;
    }
    generatePairing(cls);renderTournament(cls);
  });

  for(var rr=0;rr<state.results[cls].length;rr++){
    for(var mm=0;mm<state.results[cls][rr].length;mm++){
      (function(ri,mi,c){
        var btn=document.getElementById('editpast_'+c+'_'+ri+'_'+mi);
        if(btn)btn.addEventListener('click',function(){editPastResult(c,ri,mi);});
      })(rr,mm,cls);
    }
  }
}

function renderTournament(cls){
  var el=document.getElementById('pane-'+cls);
  if(!el)return;
  var players=state.players[cls];
  if(players.length===0){el.innerHTML='<div class="section"><h2>'+cls+'クラス</h2><p style="color:#888">参加者なし</p></div>';return;}
  var wins=getWins(cls);
  var done=state.results[cls].length>=state.rounds;
  var roundNum=state.results[cls].length+1;
  var sorted=players.slice().sort(function(a,b){return (wins[b.id]||0)-(wins[a.id]||0);});

  var played={};
  for(var i=0;i<players.length;i++)played[players[i].id]=[];
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      var match=state.results[cls][r][m];
      if(match.winner){
        played[match.p1].push(match.p2);
        played[match.p2].push(match.p1);
      }
    }
  }

  var html='<div class="section"><h2>'+cls+'クラス</h2>';
  html+=buildScoreGridHtml(cls, sorted, wins);
  html+=buildPlayedHistoryHtml(cls, sorted, played);
  html+=buildPastResultsHtml(cls);
  html+=buildCurrentPairingsHtml(cls, roundNum, done);

  el.innerHTML=html;
  bindTournamentEvents(cls);
}

function calcFinal(cls){
  var players=state.players[cls];
  var wins=getWins(cls);
  var opponents={};
  var played={};
  for(var i=0;i<players.length;i++){
    opponents[players[i].id]=[];
    played[players[i].id]=0;
  }
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      var match=state.results[cls][r][m];
      if(match.winner){
        opponents[match.p1].push({opp:match.p2,won:match.winner===match.p1});
        opponents[match.p2].push({opp:match.p1,won:match.winner===match.p2});
        played[match.p1]++;
        played[match.p2]++;
      }
    }
  }
  var res=[];
  for(var i=0;i<players.length;i++){
    var p=players[i];
    var A=wins[p.id]||0;
    var opps=opponents[p.id]||[];
    var B=0;for(var j=0;j<opps.length;j++)B+=(wins[opps[j].opp]||0);
    var C=0;for(var j=0;j<opps.length;j++){if(opps[j].won)C+=(wins[opps[j].opp]||0);}
    res.push({p:p,A:A,B:B,C:C,played:played[p.id]||0});
  }
  res.sort(function(a,b){
    if(b.A!==a.A)return b.A-a.A;
    if(b.B!==a.B)return b.B-a.B;
    if(b.C!==a.C)return b.C-a.C;
    // A B C全て同じ場合：直接対決の結果で判定
    var pid1=a.p.id,pid2=b.p.id;
    for(var r=0;r<state.results[cls].length;r++){
      for(var m=0;m<state.results[cls][r].length;m++){
        var match=state.results[cls][r][m];
        if(match.p1===pid1&&match.p2===pid2||match.p1===pid2&&match.p2===pid1){
          if(match.winner===pid2)return 1;
          if(match.winner===pid1)return -1;
        }
      }
    }
    return 0; // 対戦なし→同順位（くじ引き）
  });
  return res;
}

  var html='<div class="section"><h2>'+cls+'クラス '+(done?'最終結果':'（途中経過）')+'</h2>';
  html+=isSP?buildResultsMobileHtml(cls, finals, wins):buildResultsDesktopHtml(cls, finals, wins);
  html+='<div style="margin-top:8px;font-size:12px;color:#666">※順位：①勝数(A)多い順　②B（対戦相手の勝数合計）多い順　③C（勝った相手の勝数合計）多い順　④直接対決　⑤くじ引き</div>';
  html+='</div>';
  return html;
}

// 大会の report.date（"YYYY年MM月DD日"）を YYYY-MM-DD に変換。失敗時は今日。
function getTournamentDateFromReport(r){
  if(r&&typeof r.date==='string'){
    var m=r.date.match(/(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/);
    if(m)return m[1]+'-'+('0'+m[2]).slice(-2)+'-'+('0'+m[3]).slice(-2);
  }
  return todayYmd();
}

// マスタ同期は saveData() 時のみ。save()/resetAll()/編集時に呼ばない（仕様書 3.4.1、§3.1.3）
function syncBranchMasterOnSave(){
  try{
    var master=loadBranchMaster();
    var date=getTournamentDateFromReport(state.report);
    // 仕様書 v5 §3.3 / Codex MF #1: 大会日を ensureTournamentId に明示的に渡す
    ensureTournamentId(state,master,date);
    updateBranchMasterFromTournament(state,master,{tournament_id:state.tournament_id,tournament_date:date});
    saveBranchMaster(master);
    save();
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('支部マスタ同期に失敗（既存大会運営は継続）',e);
  }
}

// クリップボード優先、非対応(http等)はファイルダウンロードにフォールバック
function saveData(){
  // F2: 大会JSONバックアップ保存時に支部マスタへ同期（A-1 ではこのタイミングのみ）
  syncBranchMasterOnSave();
  var json=JSON.stringify(state,null,2);
  if(navigator.clipboard&&navigator.clipboard.writeText&&window.isSecureContext){
    navigator.clipboard.writeText(json).then(function(){
      alert('JSONをクリップボードにコピーしました。\n\nメモ帳やEvernoteに貼り付けて保管してください。');
    }).catch(function(){
      saveDataAsFile(json);
    });
    return;
  }
  saveDataAsFile(json);
}

function saveDataAsFile(json){
  try{
    var now=new Date();
    var y=now.getFullYear();
    var m=('0'+(now.getMonth()+1)).slice(-2);
    var d=('0'+now.getDate()).slice(-2);
    var hh=('0'+now.getHours()).slice(-2);
    var mm=('0'+now.getMinutes()).slice(-2);
    var filename='shogi_'+y+m+d+'_'+hh+mm+'.json';
    var blob=new Blob([json],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    a.download=filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    alert(filename+'に保存しました');
  }catch(e){
    alert('保存に失敗しました');
  }
}

// 読み込み済みの生JSON文字列をstate反映してUIを更新（ファイル/貼り付け共通）
function applyLoadedJson(rawText){
  var loaded=JSON.parse(rawText);
  state=normalizeState(loaded);
  save();
  populateReportFields();
  renderRegList();
  renderPastParticipantsPanel();
  if(state.started){
    if(isTournamentDone()){
      showTab('result');
    } else {
      showTab('tournament');
    }
  } else {
    showTab('reg');
  }
}

function loadData(e){
  var file=e.target.files[0];
  if(!file)return;
  if(!confirm('現在のデータを上書きして読み込みますか？')){e.target.value='';return;}
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      applyLoadedJson(ev.target.result);
      alert('データを読み込みました');
    } catch(err){
      alert('読み込みに失敗しました。正しいファイルか確認してください');
    }
    e.target.value='';
    var lm=document.getElementById('load-modal');if(lm)lm.remove();
  };
  reader.readAsText(file);
}

  var winA={};
  state.players.A.forEach(function(p){winA[p.id]=0;});

        var won=match.winner===f.p.id;

    html+='</div>';

  win.focus();
  // B05: setTimeout(800) → load イベント、B08: 印刷後に afterprint で win.close()
  win.addEventListener('load',function(){

  setTimeout(function(){URL.revokeObjectURL(url);},60000);

  var repSei=document.getElementById('rep-sei');if(repSei)repSei.value='';
  var repFuku=document.getElementById('rep-fuku');if(repFuku)repFuku.value='';
  var repNote=document.getElementById('rep-note');if(repNote)repNote.value='';
  showTab('reg');
  showMsg('リセットしました','ok');
}

// ============================================================
// INIT: アプリ起動とイベント初期化
//   bind*Events: 各画面領域のイベント登録
//   initApp: 状態復元とタブ表示の初期化
//   DOMContentLoaded: 上記を順に呼ぶだけ
// ============================================================

function bindHeaderEvents(){
  document.getElementById('saveBtn').addEventListener('click',saveData);
  document.getElementById('loadBtn').addEventListener('click',openLoadModal);
  document.getElementById('loadFile').addEventListener('change',loadData);
  document.getElementById('resetBtn').addEventListener('click',resetAll);
}

function bindRegistrationEvents(){
  document.getElementById('bulkEditA').addEventListener('click',function(){bulkEditNames('A');});
  document.getElementById('bulkEditB').addEventListener('click',function(){bulkEditNames('B');});
  document.getElementById('addBtn').addEventListener('click',addPlayer);
  document.getElementById('startBtn').addEventListener('click',startTournament);

  // 参加者名入力欄: IME対応 + Enterで追加
  var inpName=document.getElementById('inp-name');
  var composing=false;
  inpName.addEventListener('compositionstart',function(){composing=true;});
  inpName.addEventListener('compositionend',function(){composing=false;});
  inpName.addEventListener('keypress',function(e){if(e.key==='Enter'&&!composing)addPlayer();});
}

function bindTabEvents(){
  document.getElementById('tab-reg').addEventListener('click',function(){showTab('reg');});
  document.getElementById('tab-tournament').addEventListener('click',function(){showTab('tournament');});
  document.getElementById('tab-result').addEventListener('click',function(){showTab('result');});
  var tm=document.getElementById('tab-master');
  if(tm)tm.addEventListener('click',function(){showTab('master');});
}

function populateReportFields(){
  if(!state.report)state.report={date:'',place:'労政会館',start:'',end:'',sei:'',fuku:'',note:''};
  ['date','place','start','end','sei','fuku','note'].forEach(function(k){
    var el=document.getElementById('rep-'+k);
    if(el)el.value=state.report[k]||'';
  });
}

function bindReportEvents(){
  ['date','place','start','end','sei','fuku','note'].forEach(function(k){
    var el=document.getElementById('rep-'+k);
    if(!el)return;
    el.addEventListener('input',function(e){
      if(!state.report)state.report={date:'',place:'労政会館',start:'',end:'',sei:'',fuku:'',note:''};
      state.report[k]=e.target.value;
      save();
    });
  });
  var btn=document.getElementById('downloadReportBtn');
  if(btn)btn.addEventListener('click',downloadReport);
}

// 全体として大会が完了しているか(参加者のいるクラスが全て全ラウンド消化済みか)
function isTournamentDone(){
  var hasAnyClass=false;
  for(var i=0;i<2;i++){
    var cls=['A','B'][i];
    if(state.players[cls].length>0){
      hasAnyClass=true;
      if(state.results[cls].length<state.rounds)return false;
    }
  }
  return hasAnyClass;
}

function initApp(){
  load();
  populateReportFields();
  renderRegList();
  renderPastParticipantsPanel();
  bindPastParticipantsToggle();
  if(state.started){
    if(isTournamentDone()){
      showTab('result');
    } else {
      showTab('tournament');
    }
  }
}

document.addEventListener('DOMContentLoaded',function(){
  bindHeaderEvents();
  bindRegistrationEvents();
  bindTabEvents();
  bindReportEvents();
  initApp();
});
</script>
</body>
</html>
