function bindMasterEditModalEvents(){
  var cancelBtn=document.getElementById('me-cancel');
  if(cancelBtn)cancelBtn.addEventListener('click',function(){
    var m=document.getElementById('master-edit-modal');if(m)m.remove();
  });
  // Phase 3 §2.1: 履歴情報トグル(▼ 開く / ▲ 閉じる)。既存「過去参加者から選ぶ」と同パターン
  var historyToggle=document.getElementById('me-history-toggle');
  var historyDiv=document.getElementById('me-history');
  if(historyToggle&&historyDiv){
    historyToggle.addEventListener('click',function(){
      var open=historyDiv.style.display!=='none';
      if(open){historyDiv.style.display='none';historyToggle.textContent='▼ 履歴情報を開く';}
      else{historyDiv.style.display='block';historyToggle.textContent='▲ 履歴情報を閉じる';}
    });
  }
  var saveBtn=document.getElementById('me-save');
  if(saveBtn)saveBtn.addEventListener('click',function(){
    // iPhone Safari blur 競合回避
    var nameInput=document.getElementById('me-name');
    var yomiInput=document.getElementById('me-yomi');
    var cityInput=document.getElementById('me-city');
    if(nameInput)nameInput.blur();
    if(yomiInput)yomiInput.blur();
    if(cityInput)cityInput.blur();
    var memberId=this.getAttribute('data-mid');
    var newName=nameInput?nameInput.value:'';
    var newYomi=yomiInput?yomiInput.value:'';
    // Phase 1 §3: city は cityInput が存在しない場合に既存値を変更しないため undefined を保つ
    var newCity=cityInput?cityInput.value:undefined;
    var statusEl=document.getElementById('me-status');
    if(!newName||!newName.trim()){
      if(statusEl)statusEl.textContent='氏名を入力してください';
      return;
    }
    // A-4 §3.3.2: ラジオから member/grade を読み取り options で渡す
    // A-4.3 §2.5: last_class も同様に options で渡す
    // Phase 1 §2.1: city も options で渡す(値は applyMasterMemberEdit 側で normalizeCity 適用)
    var memberRadios=document.getElementsByName('me-member');
    var gradeRadios=document.getElementsByName('me-grade');
    var lastClassRadios=document.getElementsByName('me-last-class');
    var memberPick=null,gradePick=null,lastClassPick=null,lastClassPicked=false;
    for(var ri=0;ri<memberRadios.length;ri++){if(memberRadios[ri].checked){memberPick=memberRadios[ri].value;break;}}
    for(var rj=0;rj<gradeRadios.length;rj++){if(gradeRadios[rj].checked){gradePick=gradeRadios[rj].value;break;}}
    for(var rk=0;rk<lastClassRadios.length;rk++){if(lastClassRadios[rk].checked){lastClassPick=lastClassRadios[rk].value;lastClassPicked=true;break;}}
    var options={};
    if(memberPick==='member'||memberPick==='other')options.member=memberPick;
    if(gradePick==='ippan'||gradePick==='chu')options.grade=gradePick;
    // A-4.5 §2.6: 「未設定」radio 廃止。A/B どちらも未 check なら last_class を変更しない(undefined)
    if(lastClassPicked&&(lastClassPick==='A'||lastClassPick==='B'))options.last_class=lastClassPick;
    // Phase 1: cityInput が存在する場合のみ options.city を渡す。空文字も明示更新として扱う(=任意項目をクリア可能)
    if(cityInput)options.city=newCity;

    var master=loadBranchMaster();
    var result=applyMasterMemberEdit(memberId,newName,newYomi,master,options);
    if(!result.success){
      if(statusEl){
        if(result.error==='empty_name')statusEl.textContent='氏名を入力してください';
        else if(result.error==='not_found')statusEl.textContent='対象の member が見つかりません';
        else if(result.error==='deleted')statusEl.textContent='削除済み member は編集できません';
        else if(result.error==='invalid_member_value')statusEl.textContent='支部員区分の値が不正です';
        else if(result.error==='invalid_grade_value')statusEl.textContent='中学生以下区分の値が不正です';
        else statusEl.textContent='保存に失敗しました';
      }
      return;
    }
    // MASTER-V2-LASTCLASS S22: expected はフォーム生値ではなく applyMasterMemberEdit 適用後の
    // in-memory master.members[i] の正規化済み値から取得する。city は normalizeCity（trim /
    // 最大 20 文字）で正規化されているため、フォーム生値を expected にすると false negative になる。
    var verifyTarget_s22=null;
    for(var vi_s22=0;vi_s22<master.members.length;vi_s22++){
      if(master.members[vi_s22]&&master.members[vi_s22].id===memberId){verifyTarget_s22=master.members[vi_s22];break;}
    }
    saveBranchMaster(master);
    // saveBranchMaster は例外を握り潰すため、4 fields を localStorage 再読込で検証する。
    // 1 field 不一致ごとに console.warn を 1 行（field 別、後追いデバッグ用）。
    // SAVE-UX-MIN-NOTIFY-002: user-facing showMsg は 1 件集約のため、verify 結果を s22MasterVerifyOk
    // 変数に集約する。rollback / alert / retry なし。
    // SAVE-UX-WARN-HELPER: 失敗 field を s22FailedFields に集めて helper の fields 引数に渡す
    // （debug 用、user-facing 文言には含めない）。
    var s22MasterVerifyOk=true;
    var s22FailedFields=[];
    if(verifyTarget_s22){
      var checks_s22=[
        ['last_class',verifyTarget_s22.last_class],
        ['member',verifyTarget_s22.member],
        ['grade',verifyTarget_s22.grade],
        ['city',verifyTarget_s22.city]
      ];
      for(var ci_s22=0;ci_s22<checks_s22.length;ci_s22++){
        var fname_s22=checks_s22[ci_s22][0],fexp_s22=checks_s22[ci_s22][1];
        if(!verifyMasterFieldPersisted(memberId,fname_s22,fexp_s22)){
          if(typeof console!=='undefined'&&console.warn){
            console.warn('[MASTER-V2-LASTCLASS] S22 verify failed',{memberId:memberId,field:fname_s22,expected:fexp_s22});
          }
          s22MasterVerifyOk=false;
          s22FailedFields.push(fname_s22);
        }
      }
    }
    var modalEl=document.getElementById('master-edit-modal');if(modalEl)modalEl.remove();
    // SAVE-UX-DESIGN Level 1 / SAVE-UX-MIN-NOTIFY-002: master verify 失敗時は user-facing
    // 表示を warn に集約する。success showMsg('マスタを更新しました', ...) で上書きしない
    // （PR #63 と同パターン）。詳細は docs/specs/20260513_shogi_save_ux_design.md
    if(typeof showMsg==='function'){
      if(s22MasterVerifyOk){
        var msg='マスタを更新しました';
        if(result.duplicateCount>0){
          msg+='（同名 '+result.duplicateCount+'件あり：自動統合しません）';
        }
        showMsg(msg,result.duplicateCount>0?'warn':'ok');
      } else {
        // user-facing は 1 件集約。field 別の詳細は console.warn 側に残す。
        // duplicate 警告は verify failure を優先するため出さない。
        // SAVE-UX-WARN-HELPER: user-facing warn は helper 経由。success showMsg 抑止は上の if-else で行う（不変）。
        notifySaveWarning({
          message:'会員マスタ情報の保存が確認できませんでした',
          consoleTag:'[MASTER-V2-LASTCLASS]',
          callsiteId:'S22',
          fields:s22FailedFields
        });
      }
    }
    renderMasterTab();
    // A-4.5 §2.7 (bug fix #7): F7 保存後に過去参加者パネルを再描画(リロード不要で「前回:Xクラス」表示が即更新)
    if(typeof renderPastParticipantsPanel==='function'){
      var ppSearch=document.getElementById('pp-search');
      renderPastParticipantsPanel(ppSearch?ppSearch.value:'');
    }
  });
}

// UTILITY: テキスト入力から複数の大会データをパース
//   - 空行で大会を区切る
//   - 改行コード CRLF/LF/CR を正規化
//   - BOM を除去
//   - 各ブロックを JSON.parse → 呼び出し側で normalizeState 等を適用
//   - 原則 throw しない（想定外の内部例外のみ throw）
//
// 戻り値: { tournaments: [{raw, source}, ...], errors: [string, ...] }
//   - 空文字 / 空白のみ: { tournaments: [], errors: [] }
//   - 全件パース失敗:    { tournaments: [], errors: [...] }
//   - 一部成功:          { tournaments: [成功分], errors: [失敗分] }
function parseTournamentTextInput(text){
  if(!text||typeof text!=='string'){
    return {tournaments:[],errors:[]};
  }
  if(text.charCodeAt(0)===0xFEFF){
    text=text.slice(1);
  }
  text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  if(!text.trim()){
    return {tournaments:[],errors:[]};
  }
  var blocks=text.split(/\n\s*\n+/);
  var tournaments=[];
  var errors=[];
  blocks.forEach(function(block,idx){
    var trimmed=block.trim();
    if(!trimmed)return;
    try{
      var raw=JSON.parse(trimmed);
      tournaments.push({raw:raw,source:'block '+(idx+1)});
    }catch(e){
      errors.push('block '+(idx+1)+': パースに失敗 - '+e.message);
    }
  });
  return {tournaments:tournaments,errors:errors};
}

function deriveTournamentMetaForMigration(raw,filename,master){
  if(raw&&typeof raw.tournament_id==='string'&&raw.tournament_id){
    var tdate=isValidYmd(raw.tournament_date)?raw.tournament_date:null;
    if(!tdate&&raw.report&&typeof raw.report.date==='string'){
      var rm0=raw.report.date.match(/(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/);
      if(rm0)tdate=rm0[1]+'-'+('0'+rm0[2]).slice(-2)+'-'+('0'+rm0[3]).slice(-2);
    }
    return {tournament_id:raw.tournament_id, tournament_date:tdate||todayYmd()};
  }
  var date=null;
  var fm=filename&&filename.match(/(\d{4})(\d{2})(\d{2})/);
  if(fm)date=fm[1]+'-'+fm[2]+'-'+fm[3];
  if(!date&&raw&&raw.report&&typeof raw.report.date==='string'){
    var rm=raw.report.date.match(/(\d{4})年\s*(\d{1,2})月\s*(\d{1,2})日/);
    if(rm)date=rm[1]+'-'+('0'+rm[2]).slice(-2)+'-'+('0'+rm[3]).slice(-2);
  }
  if(!date)date=todayYmd();
  var base='t_'+date.replace(/-/g,'_');
  var existing={};
  for(var i=0;i<master.members.length;i++){
    var arr=master.members[i].tournament_ids||[];
    for(var j=0;j<arr.length;j++)existing[arr[j]]=true;
  }
  var id=base; var n=2;
  while(existing[id]){id=base+'_'+n;n++;}
  return {tournament_id:id, tournament_date:date};
}

function mergeTournamentParticipantsIntoMaster(tournaments,master){
  var added=0, matched=0, skipped=0;
  for(var t=0;t<tournaments.length;t++){
    var entry=tournaments[t];
    var raw=entry&&entry.raw;
    if(!raw||typeof raw!=='object'){skipped++;continue;}
    var tempState=normalizeState(raw);
    var meta=deriveTournamentMetaForMigration(raw,entry.filename||'',master);
    var classes=['A','B'];
    for(var ci=0;ci<classes.length;ci++){
      var cls=classes[ci];
      var players=tempState.players[cls]||[];
      for(var pi=0;pi<players.length;pi++){
        var p=players[pi];
        if(!p||!p.name)continue;
        var member=null;
        if(typeof p.member_id==='string'&&p.member_id){
          for(var mi=0;mi<master.members.length;mi++){
            if(master.members[mi].id===p.member_id){member=master.members[mi];break;}
          }
        }
        if(!member){
          var cands=findMemberCandidates({name:p.name},master);
          if(cands.length===1){
            member=cands[0]; matched++;
          }else{
            // 0件 → 新規。複数 → 自動統合しない（仕様書 7.5）→ 新規作成
            try{
              member=createMemberFromParticipant(p,master,meta.tournament_date);
              master.members.push(member); added++;
            }catch(e){skipped++;continue;}
          }
        }else{
          matched++;
        }
        addTournamentIdOnce(member,meta.tournament_id);
        if(isValidYmd(meta.tournament_date)){
          if(!member.last_attended||meta.tournament_date>=member.last_attended)member.last_attended=meta.tournament_date;
          if(!member.first_attended||meta.tournament_date<member.first_attended)member.first_attended=meta.tournament_date;
        }
        if(p.cls==='A'||p.cls==='B')member.last_class=p.cls;
        recalcMemberAttendance(member);
      }
    }
  }
  return {tournaments:tournaments.length, added:added, matched:matched, skipped:skipped};
}

// SAVE-UX-STATUS-INDICATOR: Level 2 indicator 用の memory-only state。
//   localStorage / sessionStorage / tournament state に保存しない（設計書 §6）。
//   reload で消えるのは意図的。永続ログが必要なら SAVE-FUTURE-REPORT で別設計。
//   将来 history 等を持つ余地として object 形式。
var saveWarningIndicatorState={count:0};

// SAVE-UX-STATUS-INDICATOR: indicator count を +1 し、DOM を更新する。
//   notifySaveWarning 1 回呼出 = count +1（設計書 §7 count 増加単位）。
//   fields.length 分は加算しない（S22 4 fields 失敗でも +1）。
//   options は将来拡張用に受け取るが現状は使わない。
//   例外を投げない（notifySaveWarning の契約を壊さない）。戻り値 void。
function recordSaveWarningForIndicator(options){
  try{
    saveWarningIndicatorState.count+=1;
    updateSaveWarningIndicator();
  }catch(e){
    if(typeof console!=='undefined'&&console.warn){
      console.warn('[SAVE-WARN-INDICATOR] record failed',e);
    }
  }
}

// SAVE-UX-STATUS-INDICATOR: indicator DOM (#save-warning-indicator) に count を反映。
//   DOM 不在時は silent skip。textContent で表示（innerHTML 不使用）。
//   N=0 → hidden / N>=1 → 「保存確認 N件」。
//   例外を投げない。戻り値 void。
function updateSaveWarningIndicator(){
  try{
    var el=document.getElementById('save-warning-indicator');
    if(!el)return;
    var n=saveWarningIndicatorState.count;
    if(n<=0){
      el.hidden=true;
      el.textContent='';
    }else{
      el.hidden=false;
      el.textContent='保存確認 '+n+'件';
    }
  }catch(e){
    if(typeof console!=='undefined'&&console.warn){
      console.warn('[SAVE-WARN-INDICATOR] update failed',e);
    }
  }
}

// SAVE-UX-WARN-HELPER: SAVE-UX-DESIGN Level 1 の user-facing warn helper。
//   showMsg(.., 'warn') と 総括 console.warn のみを担当する。
//   success showMsg の抑止は callsite 側の責務（PR #63 / #65 と同じ設計を保護する）。
//   aggregationKey / severity / indicator / retry は後続タスクで扱う。
//   既存の field 別 console.warn は callsite 側に残す（debug 詳細）。
// 引数 options:
//   - message (string, 必須): user-facing 文言。空のときは showMsg を出さず安全側で return
//   - consoleTag (string): 総括 console.warn のタグ。grep しやすい既存タグ準拠
//   - callsiteId (string): 'S03' / 'S05' / 'S22' などの識別子
//   - fields (string[]): 失敗 field 名（debug 用、user-facing 文言には含めない）
// 戻り値: void。success 抑止判定には使わない。例外は投げない。
function notifySaveWarning(options){
  var opts=options||{};
  var message=(typeof opts.message==='string'&&opts.message)?opts.message:'';
  var consoleTag=(typeof opts.consoleTag==='string'&&opts.consoleTag)?opts.consoleTag:'[SAVE-WARN]';
  var callsiteId=(typeof opts.callsiteId==='string')?opts.callsiteId:'unknown';
  var fields=(Object.prototype.toString.call(opts.fields)==='[object Array]')?opts.fields:[];
  if(!message){
    // message 不在は callsite 側 bug の可能性。例外を投げず、debug ログを残して安全 return。
    if(typeof console!=='undefined'&&console.warn){
      console.warn(consoleTag,{callsiteId:callsiteId,fields:fields,error:'notifySaveWarning called without message'});
    }
    return;
  }
  if(typeof showMsg==='function'){
    showMsg(message,'warn');
  }
  if(typeof console!=='undefined'&&console.warn){
    console.warn(consoleTag,{callsiteId:callsiteId,fields:fields});
  }
  // SAVE-UX-STATUS-INDICATOR: helper 1 呼出 = indicator count +1（設計書 §7）。
  //   fields.length 分は加算しない。callsite 不変。例外を投げない契約を維持。
  recordSaveWarningForIndicator({callsiteId:callsiteId,fields:fields});
}

function updateField(id,cls,field,value){
  var players=state.players[cls];
  for(var i=0;i<players.length;i++){
    if(players[i].id===id){players[i][field]=value;break;}
  }
  renderRegList();save();
  // A-5.1-SAVE-003b: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
  // false は「保存未確認」（保存失敗と断定しない）。属性変更は rollback しない・運営は継続する。
  // updateField は member / grade を書換えるため、verifyPlayerPersistedById（name 軸）では
  // 不足。field 軸の verifyPlayerFieldPersisted で expected と厳密一致を確認する。
  if(!verifyPlayerFieldPersisted(cls,id,field,value)){
    if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: updateField の保存が確認できませんでした (player='+id+', cls='+cls+', field='+field+', expected='+value+')');
    showMsg('属性を変更しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください','warn');
  }
}

      var classes=['A','B'];

          // mousedown / touchstart で行ハンドラより先に処理して伝播停止（行本体タップは A-4 既存挙動として維持）
          btn.addEventListener('mousedown',function(e){
            if(e.preventDefault)e.preventDefault();
            if(e.stopPropagation)e.stopPropagation();

          });
          btn.addEventListener('touchstart',function(e){
            if(e.preventDefault)e.preventDefault();

          });

          btn.addEventListener('click',function(e){

            if(e.stopPropagation)e.stopPropagation();

// A-4.3 §2.3: サジェスト A/B ボタン押下時の処理。
// 過去参加者パネルと同じ 3 ケース分岐（メンタルモデル一貫性）。サジェストは既登録者除外があるため通常はケース 1 のみだが、念のため 3 ケース全対応。
// _pendingNewYomi / master.yomi は触らない（A-4.2 Should Fix 6）。
function handleSuggestClassAdd(memberId,cls){
  var master=loadBranchMaster();
  var member=null;
  if(master&&Array.isArray(master.members)){
    for(var mi=0;mi<master.members.length;mi++){
      if(master.members[mi]&&master.members[mi].id===memberId){member=master.members[mi];break;}
    }
  }
  if(!member){showMsg('該当する参加者が見つかりません','err');return;}
  if(member.deleted===true){showMsg('この参加者は削除済みのため追加できません','err');return;}
  var memberName=member.name||'';
  var existingCls=null;
  var existClasses=['A','B'];
  for(var eci=0;eci<existClasses.length;eci++){
    var eArr=state.players[existClasses[eci]]||[];
    for(var epi=0;epi<eArr.length;epi++){
      if(eArr[epi]&&eArr[epi].member_id===memberId){existingCls=existClasses[eci];break;}
    }
    if(existingCls)break;
  }
  // 共通：成功後の登録画面後処理（氏名/ふりがな欄クリア + サジェスト閉じ + 再描画）
  // A-5.1-SAVE-003b: 追加 / クラス変更の両経路から呼ばれるため、verify 対象（pid/cls/name）と
  // 保存未確認時の warn 文言を引数で受け取り、save() 後に検証する。
  // SAVE-UX-MIN-NOTIFY-001: options.suppressOkMsg=true のとき成功 showMsg(ok) を出さない。
  // master verify 失敗時に呼出側で立て、直前に出した warn を ok で上書きしないために使う。
  function postSuccess(msgText,verifyPid,verifyCls,verifyName,warnMsg,options){
    options=options||{};
    var inpName=document.getElementById('inp-name');
    var inpYomi=document.getElementById('inp-yomi');
    if(inpName)inpName.value='';
    if(inpYomi)inpYomi.value='';
    _suggestState.selectedMemberId=null;
    _suggestState.selectedNormalizedName=null;
    _yomiManuallyEdited=false;
    _yomiAutoBuffer='';
    closeSuggestList();
    renderRegList();save();
    if(typeof renderPastParticipantsPanel==='function'){
      var ppSearch=document.getElementById('pp-search');
      renderPastParticipantsPanel(ppSearch?ppSearch.value:'');
    }
    if(!options.suppressOkMsg){
      showMsg(msgText,'ok');
    }
    // A-5.1-SAVE-003b: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
    // false は「保存未確認」（保存失敗と断定しない）。追加 / クラス変更とも rollback しない・運営は継続する。
    if(!verifyPlayerPersistedById(verifyPid,verifyCls,verifyName)){
      if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: handleSuggestClassAdd の保存が確認できませんでした (player='+verifyPid+', cls='+verifyCls+', name='+verifyName+')');
      showMsg(warnMsg,'warn');
    }
  }
  // ケース 3: 同クラス登録済（alert OK のみ）
  if(existingCls===cls){
    alert(memberName+'さんは既に '+cls+'クラス に登録されています。');
    return;
  }
  // ケース 2: 別クラス登録済（変更 confirm）
  if(existingCls&&existingCls!==cls){
    var ok2=confirm(memberName+'さんは現在 '+existingCls+'クラス に登録されています。\n'+cls+'クラス に変更しますか?');
    if(!ok2)return;
    var r2=changePlayerClass(memberId,cls,master,state);
    if(!r2||!r2.success){showMsg('クラス変更に失敗しました','err');return;}
    saveBranchMaster(master);
    // MASTER-V2-LASTCLASS S05: 既登録者クラス変更分岐限定の master.last_class 保存検証。
    // changePlayerClass が master.members[i].last_class を新クラスに更新済み（line 1250）。
    // saveBranchMaster は例外を握り潰すため、localStorage を再読込して検証する。
    // 新規追加分岐（addPlayerFromMaster 側）では master を更新しないため、ここに verify を入れない。
    // SAVE-UX-DESIGN Level 1: console.warn + showMsg。最終表示が warn になるよう、
    // master verify 失敗時は postSuccess の成功 showMsg を suppressOkMsg で抑止する。
    // 詳細は docs/specs/20260513_shogi_save_ux_design.md
    var s05MasterVerifyOk=verifyMasterFieldPersisted(memberId,'last_class',cls);
    if(!s05MasterVerifyOk){
      if(typeof console!=='undefined'&&console.warn){
        console.warn('[MASTER-V2-LASTCLASS] S05 last_class verify failed',{memberId:memberId,expected:cls});
      }
      // SAVE-UX-WARN-HELPER: user-facing warn は helper 経由。success showMsg 抑止は postSuccess(suppressOkMsg) で行う（不変）。
      notifySaveWarning({
        message:'前回クラス情報の保存が確認できませんでした',
        consoleTag:'[MASTER-V2-LASTCLASS]',
        callsiteId:'S05',
        fields:['last_class']
      });
    }
    postSuccess('['+memberName+'] を '+cls+'クラス に変更しました',r2.player.id,cls,r2.player.name,'クラスを変更しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください',{suppressOkMsg:!s05MasterVerifyOk});
    return;
  }
  // ケース 1: 未登録（追加 confirm）
  var ok1=confirm(memberName+'さんを '+cls+'クラス に追加しますか?');
  if(!ok1)return;
  var r=addPlayerFromMaster(memberId,cls,master,state);
  if(!r||!r.success){
    var err=r&&r.error;
    if(err==='duplicate_member'){
      showMsg('この参加者はすでに登録されています','err');
    }else if(err==='duplicate_name'){
      showMsg('同じ名前の参加者がいます。別人の場合は手入力で区別してください','err');
    }else if(err==='deleted'){
      showMsg('この参加者は削除済みのため追加できません','err');
    }else if(err==='not_found'){
      showMsg('該当する参加者が見つかりません','err');
    }else{
      showMsg('追加に失敗しました','err');
    }
    return;
  }
  postSuccess('['+r.player.name+']（'+cls+'クラス）を登録しました',r.player.id,cls,r.player.name,'参加者は登録されましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください');
}

function closeSuggestList(){
  var list=document.getElementById('suggest-list');
  if(!list)return;
  list.style.display='none';
  list.innerHTML='';
}

function onSuggestTap(member){
  if(!member)return;
  var inpName=document.getElementById('inp-name');
  var inpClass=document.getElementById('inp-class');
  var inpYomi=document.getElementById('inp-yomi');
  if(inpName)inpName.value=member.name||'';
  if(inpClass&&(member.last_class==='A'||member.last_class==='B'))inpClass.value=member.last_class;
  // A-4 §3.1.3: サジェスト由来は yomi 欄にもマスタ値を反映。
  // _yomiManuallyEdited は false のまま（手動編集扱いにしない）。
  if(inpYomi)inpYomi.value=member.yomi||'';
  _yomiManuallyEdited=false;
  _yomiAutoBuffer='';
  _suggestState.selectedMemberId=member.id;
  _suggestState.selectedNormalizedName=normalizePersonName(member.name||'');
  closeSuggestList();
}

function updateSuggestList(){
  var inpName=document.getElementById('inp-name');
  if(!inpName)return;
  var raw=inpName.value;
  // 候補選択後に氏名を変更したら member_id 解除（normalize 後の比較）
  if(_suggestState.selectedMemberId){
    var curNorm=normalizePersonName(raw);
    if(curNorm!==_suggestState.selectedNormalizedName){
      _suggestState.selectedMemberId=null;
      _suggestState.selectedNormalizedName=null;
    }
  }
  var trimmed=raw.replace(/^\s+|\s+$/g,'');
  if(trimmed.length<1){
    closeSuggestList();
    return;
  }
  var master=loadBranchMaster();
  var excluded=getCurrentlyRegisteredMemberIds();
  var sugg=findMasterSuggestions(trimmed,master,excluded);
  renderSuggestList(sugg);
}

function addPlayer(){
  // iPhone Safari: ペースト後のボタン無反応回避（A-2.6 ガイドライン）
  var inpName=document.getElementById('inp-name');
  var inpYomi=document.getElementById('inp-yomi');
  if(inpName)inpName.blur();
  if(inpYomi)inpYomi.blur();
  closeSuggestList();

  var name=inpName.value.trim();
  var cls=document.getElementById('inp-class').value;
  // A-4 §3.1.4: ふりがな欄の値は DOM のみで保持。player.yomi には保存しない。
  var yomiRaw=inpYomi?inpYomi.value:'';
  if(!name){showMsg('名前を入力してください','err');return;}
  var all=state.players.A.concat(state.players.B);
  for(var i=0;i<all.length;i++){if(all[i].name===name){showMsg('同じ名前の参加者がいます','err');return;}}

  // サジェスト選択中かつ氏名が選択時の正規化名と一致 → マスタから member_id / member / grade を引き継ぐ
  var memberValue='member';
  var gradeValue='ippan';
  var memberIdValue=null;
  var suggestSelected=null;
  if(_suggestState.selectedMemberId){
    var curNorm=normalizePersonName(name);
    if(curNorm===_suggestState.selectedNormalizedName){
      var master=loadBranchMaster();
      var sel=null;
      if(master&&Array.isArray(master.members)){
        for(var mi=0;mi<master.members.length;mi++){
          if(master.members[mi].id===_suggestState.selectedMemberId){sel=master.members[mi];break;}
        }
      }
      if(sel&&sel.deleted!==true){
        // 当日同 member_id 二重追加防止
        var dupRegistered=false;
        var existingIds=getCurrentlyRegisteredMemberIds();
        for(var ei=0;ei<existingIds.length;ei++){
          if(existingIds[ei]===sel.id){dupRegistered=true;break;}
        }
        if(dupRegistered){
          showMsg(name+'（'+cls+'クラス）はすでに登録されています','err');
          return;
        }
        memberIdValue=sel.id;
        if(sel.member==='other')memberValue='other';
        if(sel.grade==='chu')gradeValue='chu';
        suggestSelected=sel;
      }
    }
  }

  var id='p'+Date.now()+Math.floor(Math.random()*1000);
  var newPlayer={id:id,name:name,cls:cls,member:memberValue,grade:gradeValue};
  if(memberIdValue)newPlayer.member_id=memberIdValue;
  // A-5.1 §11.8: 同一クラス内で max(entry_no)+1 を採番（欠番維持）
  newPlayer.entry_no=nextEntryNoForClass(cls,state);
  state.players[cls].push(newPlayer);

  // A-4 §3.1.4 + Should Fix 2: yomi のマスタ反映条件
  //   サジェスト由来：既存マスタ yomi が **空** の場合のみ補完（誤上書き防止）。
  //   新規参加者：_pendingNewYomi[player.id] に退避し、saveData 時に updateBranchMasterFromTournament 経由で反映。
  var yomiForMaster=normalizeYomi(yomiRaw||'');
  if(suggestSelected){
    if(yomiForMaster && !normalizeYomi(suggestSelected.yomi||'')){
      try{
        var masterToSave=loadBranchMaster();
        if(masterToSave&&Array.isArray(masterToSave.members)){
          for(var mj=0;mj<masterToSave.members.length;mj++){
            if(masterToSave.members[mj].id===suggestSelected.id){
              masterToSave.members[mj].yomi=yomiForMaster;
              saveBranchMaster(masterToSave);
              break;
            }
          }
        }
      }catch(e){}
    }
  }else if(yomiForMaster){
    _pendingNewYomi[id]=yomiForMaster;
  }

  inpName.value='';
  if(inpYomi)inpYomi.value='';
  _suggestState.selectedMemberId=null;
  _suggestState.selectedNormalizedName=null;
  _yomiManuallyEdited=false;
  _yomiAutoBuffer='';
  inpName.focus();
  showMsg(name+'（'+cls+'クラス）を登録しました','ok');
  renderRegList();save();
  // A-5.1-SAVE-002: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
  // false は「保存未確認」（保存失敗と断定しない）。追加は rollback しない・運営は継続する。
  if(!verifyPlayerPersistedById(id,cls,name)){
    notifySaveWarning({
      message:'参加者は登録されましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください',
      consoleTag:'SAVE-002: addPlayer の保存が確認できませんでした (player=' + id + ', cls=' + cls + ', name=' + name + ')',
      callsiteId:'SAVE-002-addPlayer'
    });
  }
}

function removePlayer(id,cls){
  var name=getName(id,cls);
  var inPairings=false;
  for(var i=0;i<state.pairings[cls].length;i++){
    var pm=state.pairings[cls][i];
    if(pm.p1===id||pm.p2===id){inPairings=true;break;}
  }
  if(inPairings){
    alert(name+'は進行中の対局に登録されているため削除できません。\n\n先に「対戦相手変更」で別の選手に差し替えてから削除してください。');
    return;
  }
  var pastMatches=0;
  for(var r=0;r<state.results[cls].length;r++){
    for(var mi=0;mi<state.results[cls][r].length;mi++){
      var rm=state.results[cls][r][mi];
      if(rm.p1===id||rm.p2===id)pastMatches++;
    }
  }
  // 大会開始後で過去対局がある参加者は削除禁止（calcFinalがstate.players前提のため、TypeErrorで最終結果タブが落ちる）
  if(state.started&&pastMatches>0){
    alert(name+'は過去'+pastMatches+'試合分の対戦履歴があるため、大会開始後は削除できません。\n\n誤って登録した場合は「リセット」で大会をやり直してください。');
    return;
  }
  var msg=name+'を削除しますか？';
  if(!confirm(msg))return;
  var arr=state.players[cls];
  state.players[cls]=arr.filter(function(p){return p.id!==id;});
  // A-4 §3.1.4: 当該 player の _pendingNewYomi も破棄
  if(_pendingNewYomi&&Object.prototype.hasOwnProperty.call(_pendingNewYomi,id))delete _pendingNewYomi[id];
  renderRegList();save();
  // A-5.1-SAVE-001: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
  // false は「保存未確認」（保存失敗と断定しない）。削除は rollback しない・運営は継続する。
  if(!verifyPlayerAbsent(id,cls)){
    notifySaveWarning({
      message:'削除は反映されましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください',
      consoleTag:'SAVE-001: removePlayer の保存が確認できませんでした (player='+id+', cls='+cls+')',
      callsiteId:'SAVE-001-removePlayer'
    });
  }
}

function buildBulkEditModalHtml(cls, players){
  var rows='';
  for(var i=0;i<players.length;i++){
    // A-5.1 §11.8: 一括編集モーダルでも entry_no を表示（欠番維持を視覚化）。
    // A-4 §2: 番号表示は 2 桁ゼロ埋めに統一（参加者一覧・対戦相手変更・PDF と整合）。
    rows+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'
      +'<span style="font-size:12px;color:#888;min-width:28px">'+cls+entryNoOf(cls,players[i].id)+'</span>'
      +'<input type="text" id="bulk-name-'+players[i].id+'" value="'+escapeHtml(players[i].name)+'" '
      +'style="flex:1;height:34px;padding:0 10px;border:1px solid #ccc;border-radius:6px;font-size:14px;font-family:inherit">'
      +'</div>';
  }
  return '<div style="background:#fff;border-radius:12px;padding:24px;width:360px;max-height:80vh;overflow-y:auto;">'
    +'<h3 style="margin-bottom:16px;font-size:16px;font-weight:500;color:#1F3864">'+cls+'クラス 名前の一括編集</h3>'
    +rows
    +'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">'
    +'<button id="bulk-cancel" style="padding:8px 16px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:14px;cursor:pointer">キャンセル</button>'
    +'<button id="bulk-save" style="padding:8px 16px;border-radius:8px;border:none;background:#1F3864;color:#fff;font-size:14px;cursor:pointer">保存</button>'
    +'</div></div>';
}

function bindBulkEditModalEvents(cls, players){
  // 最初のinputにフォーカス
  var firstInput=document.getElementById('bulk-name-'+players[0].id);
  if(firstInput)firstInput.focus();

  // Enterで次のフィールドに移動
  for(var i=0;i<players.length;i++){
    (function(idx){
      var inp=document.getElementById('bulk-name-'+players[idx].id);
      if(!inp)return;
      inp.addEventListener('keypress',function(e){
        if(e.key==='Enter'){
          var next=document.getElementById('bulk-name-'+(players[idx+1]?players[idx+1].id:''));
          if(next)next.focus();
          else document.getElementById('bulk-save').click();
        }
      });
    })(i);
  }

  document.getElementById('bulk-cancel').addEventListener('click',function(){
    document.getElementById('bulk-edit-modal').remove();
  });

  document.getElementById('bulk-save').addEventListener('click',function(){
    var all=state.players.A.concat(state.players.B);
    var hasError=false;
    var newNames={};

    for(var i=0;i<players.length;i++){
      var inp=document.getElementById('bulk-name-'+players[i].id);
      var newName=inp?inp.value.trim():'';
      if(!newName){alert((i+1)+'番目の名前が空です');hasError=true;break;}
      newNames[players[i].id]=newName;
    }
    if(hasError)return;

    // 重複チェック（他クラス含む、編集対象同士の新名前も比較）
    for(var i=0;i<players.length;i++){
      var newName=newNames[players[i].id];
      for(var j=0;j<all.length;j++){
        if(all[j].id===players[i].id)continue;
        var otherName=newNames[all[j].id]||all[j].name;
        if(otherName===newName){
          alert('"'+newName+'"が重複しています');hasError=true;break;
        }
      }
      if(hasError)break;
    }
    if(hasError)return;

    for(var i=0;i<players.length;i++){
      players[i].name=newNames[players[i].id];
    }
    document.getElementById('bulk-edit-modal').remove();
    renderRegList();save();
    // A-5.1-SAVE-003b: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
    // 全件 verify し、未確認件数を集計。warn は件数集約して 1 回のみ（UI ノイズ回避）。
    // rollback しない・運営は継続する。alert も使わない（pre-save の空欄 / 同名重複 alert は別経路）。
    // 既存 verifyStatePersisted(id, expectedName) を流用し、新 helper は追加しない。
    var unverified=0;
    for(var vi=0;vi<players.length;vi++){
      if(!verifyStatePersisted(players[vi].id,newNames[players[vi].id]))unverified++;
    }
    if(unverified>0){
      if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: bulkEditNames の保存が確認できませんでした ('+unverified+'/'+players.length+' 件未確認)');
      showMsg(players.length+'名のうち '+unverified+'名分の保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください','warn');
    }
  });
}

function bulkEditNames(cls){
  var players=state.players[cls];
  if(players.length===0){alert(cls+'クラスの参加者がいません');return;}

  var existing=document.getElementById('bulk-edit-modal');
  if(existing)existing.remove();

  var modal=document.createElement('div');
  modal.id='bulk-edit-modal';
  modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
  modal.innerHTML=buildBulkEditModalHtml(cls, players);
  document.body.appendChild(modal);

  bindBulkEditModalEvents(cls, players);
}

// ============================================================
// MASTER-001: 参加者名修正時の会員マスタ反映
//   editPlayer() を入口とし、新氏名が確定したらユーザの明示確認に応じて
//   会員マスタも更新する。無条件上書きは禁止。
//
//   会員特定の方針 (Codex Should Fix 2):
//   - member_id があれば優先（氏名フォールバックしない）
//   - なければ旧氏名の **氏名一致のみ**（yomi 一致は使わない）で候補検索
//     - 0件 / 複数件: マスタ更新ボタンを無効化
//     - 1件 + ユーザ確認: applyMasterMemberEdit → saveBranchMaster
//
//   保存検証 (Codex Must Fix 1):
//   - saveBranchMaster / save は内部で例外を握り潰すため、書込み後に
//     localStorage を再読込し、対象 member.name / player.name が新値に
//     なっていることを確認する。検証失敗時は「成功」と扱わない。
//
//   クリック時再特定 (Codex Should Fix 1):
//   - 「会員マスタも更新」クリック時に loadBranchMaster で再取得し、
//     member_id（あれば）または旧氏名から再特定。同じ id でない場合は
//     マスタ更新を中止して大会参加者名のみ修正する。
//
//   既存挙動（同名拒否 alert / renderRegList / 必須関数定義）は維持。
//   Enter 連打防止: デフォルトフォーカスは安全側の「この大会のみ修正」。
//   キャンセル導線: ボタン / Esc / 背景クリック (Codex Should Fix 4)。
// ============================================================

// 旧氏名から **氏名一致のみ** で候補検索（rename 用に findMemberCandidates より絞る）
function findMemberCandidatesByName(name,master){
  if(!master||!Array.isArray(master.members))return [];
  var pname=normalizePersonName(name||'');
  if(!pname)return [];
  var out=[];
  for(var i=0;i<master.members.length;i++){
    var m=master.members[i];
    if(!m||m.deleted===true)continue;
    if(normalizePersonName(m.name||'')===pname)out.push(m);
  }
  return out;
}

// targetInfo = {status, member}
// status: 'by_member_id' | 'unique' | 'multi' | 'none' | 'no_master'
function findMasterRenameTarget(p,master){
  if(!master||!Array.isArray(master.members))return {status:'no_master',member:null};
  if(p&&typeof p.member_id==='string'&&p.member_id){
    for(var i=0;i<master.members.length;i++){
      var m=master.members[i];
      if(m&&m.id===p.member_id&&m.deleted!==true)return {status:'by_member_id',member:m};
    }
    // Codex Must Fix: member_id 不在時は氏名フォールバックしない（誤統合防止）
    return {status:'none',member:null};
  }
  var cands=findMemberCandidatesByName((p&&p.name)||'',master);
  if(cands.length===1)return {status:'unique',member:cands[0]};
  if(cands.length>1)return {status:'multi',member:null};
  return {status:'none',member:null};
}

// A-5.1-SAVE-003: shogi_v4 を再読込し、保存済み state を返す。
// 戻り値: state オブジェクト / null（空・破損 JSON・構造不正・schema 不正・例外）
// 呼出側は null または期待値不一致を「保存未確認」として扱う（保存失敗と断定しない）。
//
// PR #48 Codex Must Fix: 最低限の state schema を検証して、{started:true} のような壊れた
// object を「有効」として通してしまう false positive を防ぐ。具体的には players/pairings/
// results それぞれが object で、A/B が Array であることまでをここで保証する。
function readPersistedState(){
  if(typeof localStorage==='undefined')return null;
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(typeof raw!=='string'||!raw)return null;
    var parsed=JSON.parse(raw);
    if(!parsed||typeof parsed!=='object')return null;
    if(!parsed.players||typeof parsed.players!=='object')return null;
    if(!Array.isArray(parsed.players.A)||!Array.isArray(parsed.players.B))return null;
    if(!parsed.pairings||typeof parsed.pairings!=='object')return null;
    if(!Array.isArray(parsed.pairings.A)||!Array.isArray(parsed.pairings.B))return null;
    if(!parsed.results||typeof parsed.results!=='object')return null;
    if(!Array.isArray(parsed.results.A)||!Array.isArray(parsed.results.B))return null;
    return parsed;
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003: readPersistedState failed',e);
    return null;
  }
}

// A-5.1-SAVE-003 / PR #48 Codex Should Fix: pairings 配列の簡易シグネチャ比較。
// length のみだと「同件数だが中身が古い stale pairings」を見逃すため、p1/p2/winner と、
// 両側に存在する場合のみ lastModifiedBy を比較する。過剰な deep equal は持たない。
function pairingsMatchSnapshot(persisted,expected){
  if(!Array.isArray(persisted)||!Array.isArray(expected))return false;
  if(persisted.length!==expected.length)return false;
  for(var i=0;i<expected.length;i++){
    var pe=expected[i],pp=persisted[i];
    if(!pe||!pp||typeof pe!=='object'||typeof pp!=='object')return false;
    if(pe.p1!==pp.p1)return false;
    if(pe.p2!==pp.p2)return false;
    if((pe.winner||null)!==(pp.winner||null))return false;
    // lastModifiedBy は normalizeState の補完範囲。両側に存在する場合のみ比較し、
    // どちらか欠損は容認（旧データ互換のため false にしない）。
    if(typeof pe.lastModifiedBy!=='undefined'&&typeof pp.lastModifiedBy!=='undefined'){
      if(pe.lastModifiedBy!==pp.lastModifiedBy)return false;
    }
  }
  return true;
}

// shogi_v4 を再読込し、対象 player の name が expectedName になっているかを検証。
// 例外時は false（呼出側は「保存未確認」として扱う）。
function verifyStatePersisted(playerId,expectedName){
  if(typeof localStorage==='undefined')return false;
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(typeof raw!=='string'||!raw)return false;
    var parsed=JSON.parse(raw);
    if(!parsed||!parsed.players)return false;
    var classes=['A','B'];
    for(var ci=0;ci<classes.length;ci++){
      var arr=parsed.players[classes[ci]];
      if(!Array.isArray(arr))continue;
      for(var i=0;i<arr.length;i++){
        if(arr[i]&&arr[i].id===playerId)return arr[i].name===expectedName;
      }
    }
    return false;
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('MASTER-001: shogi_v4 verify failed',e);
    return false;
  }
}

// shogi_branch_master を再読込し、対象 member の name が expectedName と normalize 一致するかを検証。
function verifyMasterPersisted(memberId,expectedName){
  if(typeof localStorage==='undefined')return false;
  try{
    var raw=localStorage.getItem(BRANCH_MASTER_KEY);
    if(typeof raw!=='string'||!raw)return false;
    var parsed=JSON.parse(raw);
    if(!parsed||!Array.isArray(parsed.members))return false;
    var expectedNorm=normalizePersonName(expectedName||'');
    for(var i=0;i<parsed.members.length;i++){
      var m=parsed.members[i];
      if(m&&m.id===memberId)return normalizePersonName(m.name||'')===expectedNorm;
    }
    return false;
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('MASTER-001: branch master verify failed',e);
    return false;
  }
}

// A-5.1-SAVE-001: shogi_v4 を再読込し、対象 player.id が state.players[cls] に存在しないことを検証。
// 戻り値: true  = 削除対象 id が保存後の localStorage に存在しない（= 削除が永続化された）
//        false = 「保存未確認」（id がまだ存在 / 例外 / 構造不正 / 空 / parse 不可）
// false は「保存失敗」と断定しない。呼出側は warn 表示のみで削除フローは継続する。
function verifyPlayerAbsent(playerId,cls){
  if(typeof localStorage==='undefined')return false;
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(typeof raw!=='string'||!raw)return false;
    var parsed=JSON.parse(raw);
    if(!parsed||!parsed.players)return false;
    var arr=parsed.players[cls];
    if(!Array.isArray(arr))return false;
    for(var i=0;i<arr.length;i++){
      if(arr[i]&&arr[i].id===playerId)return false;
    }
    return true;
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-001: verifyPlayerAbsent failed',e);
    return false;
  }
}

// A-5.1-SAVE-002: shogi_v4 を再読込し、追加対象 player が指定 cls に存在し、name も一致することを検証。
// 戻り値: true  = id + cls + name の3軸一致（= 追加が永続化された）
//        false = 「保存未確認」（不在 / name 不一致 / 例外 / 構造不正 / 空 / parse 不可）
// false は「保存失敗」と断定しない。呼出側は warn 表示のみで追加フローは継続する。
// id を主軸にすることで、同姓同名の別 player による偽陽性を防ぐ。
function verifyPlayerPersistedById(playerId,cls,expectedName){
  if(typeof localStorage==='undefined')return false;
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(typeof raw!=='string'||!raw)return false;
    var parsed=JSON.parse(raw);
    if(!parsed||!parsed.players)return false;
    var arr=parsed.players[cls];
    if(!Array.isArray(arr))return false;
    for(var i=0;i<arr.length;i++){
      if(arr[i]&&arr[i].id===playerId)return arr[i].name===expectedName;
    }
    return false;
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-002: verifyPlayerPersistedById failed',e);
    return false;
  }
}

// A-5.1-SAVE-003b-3: updateField 用の field 軸 verify。
// 戻り値: true  = id + cls 一致かつ persisted 側の field 値が expected と一致
//        false = 「保存未確認」（不在 / 値不一致 / 例外 / 構造不正 / 空 / parse 不可）
// updateField は member / grade など name 以外の軸を書換えるため、name 軸の
// verifyPlayerPersistedById や verifyStatePersisted では不足。本 helper は
// 任意の field 名と expected 値を受け取り、persisted 側で厳密一致を確認する。
function verifyPlayerFieldPersisted(cls,playerId,field,expected){
  if(typeof localStorage==='undefined')return false;
  try{
    var raw=localStorage.getItem(STORAGE_KEY);
    if(typeof raw!=='string'||!raw)return false;
    var parsed=JSON.parse(raw);
    if(!parsed||!parsed.players)return false;
    var arr=parsed.players[cls];
    if(!Array.isArray(arr))return false;
    for(var i=0;i<arr.length;i++){
      if(arr[i]&&arr[i].id===playerId)return arr[i][field]===expected;
    }
    return false;
  }catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: verifyPlayerFieldPersisted failed',e);
    return false;
  }
}

// MASTER-V2-LASTCLASS: master member の任意の許可フィールドが localStorage 上で
// expected と一致するかを検証する。verifyMasterPersisted（name 専用）の field 汎用版。
// normalizeBranchMaster は通さず raw JSON を直接検証する（保存された実データそのもの
// を確認するため、normalize による補正値で false negative を作らない）。
//
// 戻り値: true  = persisted の member[field] が expected と一致
//        false = 不一致 / member 不在 / schema 不正 / JSON 不正 / 例外 / 不許可 field
//
// 引数:
//   memberId : master member 側の id（= player.member_id に格納される値）
//   field    : ALLOWED_FIELDS 内のキー
//   expected : last_class は 'A' / 'B' / null、member / grade / city は文字列
//
// 注意（callsite 向け）:
//   - expected はフォーム生値ではなく applyMasterMemberEdit / changePlayerClass 適用後の
//     in-memory master.members[i] の正規化済み値から取る（city の normalizeCity による
//     trim / 20 文字丸めで false negative を避けるため）。詳細は SAVE-DESIGN-001 v0.1 を
//     拡張した MASTER-V2-LASTCLASS 設計書 §7.3 参照。
//   - helper 内で console.warn しない。warn は callsite 側で SXX タグ付きに出す。
var MASTER_V2_VERIFIABLE_FIELDS={last_class:true,member:true,grade:true,city:true};
function verifyMasterFieldPersisted(memberId,field,expected){
  if(typeof localStorage==='undefined')return false;
  if(typeof memberId!=='string'||!memberId)return false;
  if(typeof field!=='string'||!Object.prototype.hasOwnProperty.call(MASTER_V2_VERIFIABLE_FIELDS,field))return false;
  try{
    var raw=localStorage.getItem(BRANCH_MASTER_KEY);
    if(typeof raw!=='string'||!raw)return false;
    var parsed=JSON.parse(raw);
    if(!parsed||typeof parsed!=='object'||Array.isArray(parsed))return false;
    if(parsed.schema_version!==1)return false;
    if(!Array.isArray(parsed.members))return false;
    var found=null;
    for(var i=0;i<parsed.members.length;i++){
      var m=parsed.members[i];
      if(m&&typeof m==='object'&&m.id===memberId){found=m;break;}
    }
    if(!found)return false;
    var actual=found[field];
    if(field==='last_class'){
      // 'A' / 'B' / null の三値のみ受理。undefined（raw 側に key 不在を含む）は null と
      // 同一視しない（raw JSON 直接検証の目的: 「保存された実データそのものが期待値と
      // 一致するか」を確認するため、normalize による null 補完を持ち込まない）。
      var allowedA=(expected==='A'||expected==='B'||expected===null);
      var allowedP=(actual==='A'||actual==='B'||actual===null);
      if(!allowedA)return false;
      if(!allowedP)return false;
      return actual===expected;
    }
    return actual===expected;
  }catch(e){
    return false;
  }
}

// 戻り値: {success:true, persisted, renderOk}
//   persisted=false でも success=true（in-memory rename は適用済み）。
//   呼出側は persisted を見て UI 表示を分岐する。
function applyParticipantRenameOnly(p,newName){
  p.name=newName;
  var renderOk=true;
  try{renderRegList();}catch(e){
    renderOk=false;
    if(typeof console!=='undefined'&&console.warn)console.warn('MASTER-001: renderRegList failed',e);
  }
  // save() は例外を握り潰すため戻り値で判定できない。書込み後に localStorage を再読込して検証。
  save();
  var persisted=verifyStatePersisted(p.id,newName);
  if(!persisted&&typeof console!=='undefined'&&console.warn){
    console.warn('MASTER-001: shogi_v4 への保存が確認できませんでした (player='+p.id+')');
  }
  return {success:true,persisted:persisted,renderOk:renderOk};
}

// 戻り値:
//   {success:true,  masterPersisted:true|false, duplicateCount}
//   {success:false, error:'candidate_changed', ...}  ← クリック時再特定で別IDになった等
//   {success:false, error:'<other>'}                 ← edit / load / save 段階の失敗
// success=false の場合、member_id 後付け補完は呼出側で行わない（Must Fix §4）。
function applyParticipantRenameWithMaster(p,newName,expectedMemberId,oldName){
  if(typeof expectedMemberId!=='string'||!expectedMemberId)return {success:false,error:'invalid_member_id'};
  var master=null;
  try{master=loadBranchMaster();}catch(e){return {success:false,error:'load_failed'};}
  if(!master||!Array.isArray(master.members))return {success:false,error:'no_master'};
  if(master._loaded_with_corruption===true)return {success:false,error:'corrupted'};

  // クリック時再特定 (Codex Should Fix 1): モーダル表示後にマスタが変更された可能性があるため、
  // member_id（あれば）または旧氏名で再特定し、結果が expectedMemberId と一致する場合のみ更新。
  var resolved=findMasterRenameTarget(p,master);
  if(resolved.status==='multi')return {success:false,error:'candidate_changed_multi'};
  if(resolved.status==='none'||resolved.status==='no_master')return {success:false,error:'candidate_changed_none'};
  if(!resolved.member||resolved.member.id!==expectedMemberId)return {success:false,error:'candidate_changed'};
  var target=resolved.member;
  if(target.deleted===true)return {success:false,error:'deleted'};
  // ふりがな更新は本タスクの必須範囲外。既存値を保持する。
  var preserveYomi=(typeof target.yomi==='string')?target.yomi:'';
  var r=applyMasterMemberEdit(expectedMemberId,newName,preserveYomi,master);
  if(!r||!r.success)return {success:false,error:(r&&r.error)||'edit_failed'};
  try{saveBranchMaster(master);}catch(e){
    if(typeof console!=='undefined'&&console.warn)console.warn('MASTER-001: saveBranchMaster threw',e);
  }
  // saveBranchMaster は例外を握り潰すので、再読込で保存検証 (Codex Must Fix §2)。
  var masterPersisted=verifyMasterPersisted(expectedMemberId,newName);
  if(!masterPersisted&&typeof console!=='undefined'&&console.warn){
    console.warn('MASTER-001: shogi_branch_master への保存が確認できませんでした (member='+expectedMemberId+')');
  }
  return {success:true,masterPersisted:masterPersisted,duplicateCount:r.duplicateCount||0};
}

function buildMasterSyncModalHtml(oldName,newName,targetInfo){
  var html='<div style="background:#fff;border-radius:12px;padding:24px;width:420px;max-width:90vw;max-height:85vh;overflow-y:auto">';
  html+='<h3 style="margin-bottom:12px;font-size:16px;font-weight:500;color:#1F3864">参加者名の修正と会員マスタ反映</h3>';
  html+='<div style="font-size:13px;color:#333;line-height:1.8;margin-bottom:12px">';
  html+='<div><span style="color:#888">変更前：</span>'+escapeHtml(oldName)+'</div>';
  html+='<div><span style="color:#888">変更後：</span><strong>'+escapeHtml(newName)+'</strong></div>';
  html+='</div>';
  html+='<div style="border-top:1px solid #eee;padding-top:12px;margin-bottom:12px;font-size:13px;line-height:1.7;color:#333">';
  var masterEnabled=false;
  if(targetInfo.status==='by_member_id'||targetInfo.status==='unique'){
    masterEnabled=true;
    var label=(targetInfo.status==='by_member_id')?'対象会員（member_id で特定）':'対象会員（同名1件で特定）';
    var mName=escapeHtml((targetInfo.member&&targetInfo.member.name)||'');
    var mYomi=escapeHtml((targetInfo.member&&targetInfo.member.yomi)||'');
    html+='<div style="color:#1F3864;font-weight:500;margin-bottom:4px">'+escapeHtml(label)+'</div>';
    html+='<div>氏名：'+mName+'</div>';
    if(mYomi)html+='<div style="color:#666">ふりがな：'+mYomi+'</div>';
  } else if(targetInfo.status==='multi'){
    html+='<div style="color:#a05000">同名候補が複数あるため、会員マスタの更新は今回スキップします。</div>';
  } else if(targetInfo.status==='none'){
    html+='<div style="color:#a05000">該当する会員マスタが見つかりませんでした。会員マスタは更新できません。</div>';
  } else {
    html+='<div style="color:#a05000">会員マスタが利用できないため、参加者名のみ更新できます。</div>';
  }
  html+='</div>';
  html+='<div style="display:flex;flex-direction:column;gap:8px">';
  html+='<button type="button" id="ms-tournament-only" class="btn-primary" style="padding:10px 16px;font-size:14px">この大会のみ修正</button>';
  var disabledAttr=masterEnabled?'':' disabled';
  var enabledStyle='background:#fff;color:#1F3864;border:1px solid #1F3864;cursor:pointer';
  var disabledStyle='background:#eee;color:#999;border:1px solid #ddd;cursor:not-allowed';
  var btnStyle=masterEnabled?enabledStyle:disabledStyle;
  html+='<button type="button" id="ms-master-too" style="padding:10px 16px;font-size:14px;border-radius:8px;'+btnStyle+'"'+disabledAttr+'>会員マスタも更新する</button>';
  html+='<button type="button" id="ms-cancel" style="padding:10px 16px;font-size:14px;border-radius:8px;background:#fff;color:#666;border:1px solid #ccc;cursor:pointer">キャンセル</button>';
  html+='</div>';
  html+='<p style="font-size:11px;color:#888;margin-top:10px;line-height:1.5">「会員マスタも更新する」は対象会員が安全に1件特定できる場合のみ有効です。Esc キー / 背景クリックでもキャンセルできます。</p>';
  html+='</div>';
  return html;
}

// 保存検証結果に応じて UI 表示を 4 種類に区別する（Codex Must Fix §8）:
//   1) tournament_only_ok   : 参加者名のみ更新（マスタ未変更）
//   2) tournament_only_warn : 大会データ保存が確認できない
//   3) master_too_ok        : 大会データ＋会員マスタの両方が保存検証済み
//   4) master_too_warn      : マスタは更新したが保存検証ができない 等
function showMasterSyncResult(kind,context){
  if(typeof showMsg!=='function')return;
  var dupNote=(context&&context.duplicateCount>0)?'（同名の別会員が '+context.duplicateCount+' 件あります）':'';
  if(kind==='tournament_only_ok'){
    showMsg('参加者名を更新しました（会員マスタは変更していません）','ok');
  } else if(kind==='tournament_only_warn'){
    showMsg('参加者名を更新しましたが、保存できていない可能性があります（会員マスタは変更していません）','warn');
  } else if(kind==='master_too_ok'){
    showMsg('参加者名と会員マスタを更新しました'+dupNote,'ok');
  } else if(kind==='master_too_state_unpersisted'){
    showMsg('会員マスタは更新しましたが、大会データの保存ができていない可能性があります'+dupNote,'warn');
  } else if(kind==='master_save_unverified'){
    showMsg('会員マスタは保存できなかった可能性があります。大会参加者名のみ修正しました','warn');
  } else if(kind==='candidate_changed'){
    showMsg('会員マスタ候補が変わったため、会員マスタは更新せず大会参加者名のみ修正しました','warn');
  } else if(kind==='master_edit_failed'){
    var eCode=(context&&context.error)?context.error:'unknown';
    showMsg('会員マスタ更新に失敗したため、大会参加者名のみ更新しました（'+escapeHtml(eCode)+'）','warn');
  }
}

function bindMasterSyncModalEvents(p,newName,targetInfo){
  var keydownHandler=null;
  function close(){
    var m=document.getElementById('member-sync-modal');
    if(m&&m.remove)m.remove();
    if(keydownHandler&&typeof document!=='undefined'&&document.removeEventListener){
      try{document.removeEventListener('keydown',keydownHandler);}catch(e){}
      keydownHandler=null;
    }
  }
  function handleTournamentOnly(){
    close();
    var r=applyParticipantRenameOnly(p,newName);
    showMasterSyncResult(r&&r.persisted?'tournament_only_ok':'tournament_only_warn',null);
  }
  function handleMasterToo(){
    var candidate=targetInfo&&targetInfo.member;
    if(!candidate||typeof candidate.id!=='string'||!candidate.id){
      close();
      applyParticipantRenameOnly(p,newName);
      showMasterSyncResult('candidate_changed',null);
      return;
    }
    var oldName=p.name||'';
    var r=applyParticipantRenameWithMaster(p,newName,candidate.id,oldName);
    close();
    if(r&&r.success){
      // Codex Must Fix §4: member_id 後付け補完はマスタ保存検証成功時のみ。
      if(r.masterPersisted&&(typeof p.member_id!=='string'||!p.member_id)){
        p.member_id=candidate.id;
      }
      var local=applyParticipantRenameOnly(p,newName);
      if(r.masterPersisted&&local&&local.persisted){
        showMasterSyncResult('master_too_ok',{duplicateCount:r.duplicateCount});
      } else if(r.masterPersisted){
        showMasterSyncResult('master_too_state_unpersisted',{duplicateCount:r.duplicateCount});
      } else {
        showMasterSyncResult('master_save_unverified',null);
      }
    } else {
      applyParticipantRenameOnly(p,newName);
      var err=(r&&r.error)?r.error:'unknown';
      if(err==='candidate_changed'||err==='candidate_changed_multi'||err==='candidate_changed_none'){
        showMasterSyncResult('candidate_changed',null);
      } else {
        showMasterSyncResult('master_edit_failed',{error:err});
      }
    }
  }
  var tBtn=document.getElementById('ms-tournament-only');
  if(tBtn)tBtn.addEventListener('click',handleTournamentOnly);
  var mBtn=document.getElementById('ms-master-too');
  if(mBtn&&!mBtn.disabled)mBtn.addEventListener('click',handleMasterToo);
  var cBtn=document.getElementById('ms-cancel');
  if(cBtn)cBtn.addEventListener('click',function(){close();});
  // Codex Should Fix §4: 背景クリックでキャンセル（モーダル本体のクリックは伝播しない）
  var backdrop=document.getElementById('member-sync-modal');
  if(backdrop)backdrop.addEventListener('click',function(e){if(e&&e.target===backdrop)close();});
  // Codex Should Fix §4: Esc キーでキャンセル
  if(typeof document!=='undefined'&&document.addEventListener){
    keydownHandler=function(e){
      if(e&&(e.key==='Escape'||e.keyCode===27)){
        close();
      }
    };
    try{document.addEventListener('keydown',keydownHandler);}catch(e){keydownHandler=null;}
  }
}

function openMemberMasterSyncDialog(p,newName){
  var existing=document.getElementById('member-sync-modal');
  if(existing&&existing.remove)existing.remove();
  var master=null;
  try{master=loadBranchMaster();}catch(e){master=null;}
  var targetInfo;
  if(!master||master._loaded_with_corruption===true){
    targetInfo={status:'no_master',member:null};
  } else {
    targetInfo=findMasterRenameTarget(p,master);
  }
  var modal=document.createElement('div');
  modal.id='member-sync-modal';
  modal.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.innerHTML=buildMasterSyncModalHtml(p.name||'',newName,targetInfo);
  document.body.appendChild(modal);
  bindMasterSyncModalEvents(p,newName,targetInfo);
  // Enter 連打や誤操作対策: 安全側の「この大会のみ修正」をデフォルトフォーカス
  var focusBtn=document.getElementById('ms-tournament-only');
  if(focusBtn&&focusBtn.focus){try{focusBtn.focus();}catch(e){}}
}

function editPlayer(id,cls){
  var players=state.players[cls];
  var p=null;
  for(var i=0;i<players.length;i++){if(players[i].id===id){p=players[i];break;}}
  if(!p)return;
  var newName=prompt('名前を変更してください',p.name);
  if(!newName||!newName.trim())return;
  newName=newName.trim();
  var all=state.players.A.concat(state.players.B);
  for(var i=0;i<all.length;i++){if(all[i].name===newName&&all[i].id!==id){alert('同じ名前がいます');return;}}
  // MASTER-001: normalize 後に変更なしならモーダルを開かず、旧フローと同じく参加者名のみ更新。
  if(normalizePersonName(p.name)===normalizePersonName(newName)){
    applyParticipantRenameOnly(p,newName);
    return;
  }
  // MASTER-001: 会員マスタ反映の分岐確認モーダルを開く。
  openMemberMasterSyncDialog(p,newName);
}

function startTournament(){
  var total=state.players.A.length+state.players.B.length;
  if(total<2){showMsg('参加者が少なすぎます','err');return;}
  if(state.players.A.length%2!==0&&state.players.A.length>0){showMsg('Aクラスが奇数です。運営者を追加してください','warn');return;}
  if(state.players.B.length%2!==0&&state.players.B.length>0){showMsg('Bクラスが奇数です。運営者を追加してください','warn');return;}
  var hasOngoing=state.started && (
    state.pairings.A.length>0 || state.pairings.B.length>0 ||
    state.results.A.length>0 || state.results.B.length>0
  );
  if(hasOngoing){
    if(!confirm('進行中の大会データがあります。再開始すると現在の結果が消えます。続けますか？'))return;
  }
  state.started=true;
  state.pairings={A:[],B:[]};
  state.results={A:[],B:[]};
  if(state.players.A.length>0)generatePairing('A');
  if(state.players.B.length>0)generatePairing('B');
  showTab('tournament');save();
  // A-5.1-SAVE-003: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
  // false は「保存未確認」（保存失敗と断定しない）。大会開始は rollback しない・運営は継続する。
  var persisted_st=readPersistedState();
  if(!persisted_st||persisted_st.started!==true){
    notifySaveWarning({
      message:'大会を開始しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください',
      consoleTag:'SAVE-003: startTournament の保存が確認できませんでした',
      callsiteId:'SAVE-003-startTournament'
    });
  }
}

// ============================================================
// PAIRING QUALITY (A-4 §1, §2, §5):
//   evaluatePairingQuality は副作用なしの純粋関数。
//   入力: pairings(配列), results(回戦の配列), players(配列)
//   出力: 品質メトリクス + ペア毎ラベル
//   仕様書 docs/specs/20260510_1904_shogi_a4_specs.md §1, §2, §5 準拠。
//
//   avoidableWinDiffPairs の算定は A-4 簡易版:
//     - 各勝数グループ内で再戦回避マッチングが成立する場合のみ「同勝数で組めた」と判定
//     - 奇数グループは1名が必ず別群と組むため、最低限の cross-group ペア数を控除
//   A-5 で本格マッチング（Blossom 等）に置換予定。
// ============================================================
function evaluatePairingQuality(pairings, results, players){
  var safePairings=Array.isArray(pairings)?pairings:[];
  var safeResults=Array.isArray(results)?results:[];
  var safePlayers=Array.isArray(players)?players:[];

  // 1. 勝数集計
  var wins={};
  for(var i=0;i<safePlayers.length;i++)wins[safePlayers[i].id]=0;
  for(var r=0;r<safeResults.length;r++){
    var round=safeResults[r];
    if(!Array.isArray(round))continue;
    for(var m=0;m<round.length;m++){
      var w=round[m]&&round[m].winner;
      if(w&&typeof wins[w]==='number')wins[w]+=1;
    }
  }

  // 2. 過去対戦履歴
  var history={};
  for(var i=0;i<safePlayers.length;i++)history[safePlayers[i].id]={};
  for(var r=0;r<safeResults.length;r++){
    var round=safeResults[r];
    if(!Array.isArray(round))continue;
    for(var m=0;m<round.length;m++){
      var pm=round[m];
      if(!pm||!pm.p1||!pm.p2)continue;
      if(history[pm.p1])history[pm.p1][pm.p2]=true;
      if(history[pm.p2])history[pm.p2][pm.p1]=true;
    }
  }

  // 3. ペアごとの基本指標
  var pairDetails=[];
  var totalWinDiff=0, maxWinDiff=0, sameScorePairCount=0, rematchCount=0;
  var currentMixedCount=0;
  var pairedIds={};
  for(var i=0;i<safePairings.length;i++){
    var pp=safePairings[i];
    if(!pp||!pp.p1||!pp.p2){
      pairDetails.push({idx:i,p1:'',p2:'',winDiff:0,isRematch:false,labels:[]});
      continue;
    }
    var w1=wins[pp.p1]||0, w2=wins[pp.p2]||0;
    var diff=Math.abs(w1-w2);
    var isRematch=!!(history[pp.p1]&&history[pp.p1][pp.p2]);
    totalWinDiff+=diff;
    if(diff>maxWinDiff)maxWinDiff=diff;
    if(diff===0)sameScorePairCount+=1; else currentMixedCount+=1;
    if(isRematch)rematchCount+=1;
    pairedIds[pp.p1]=true; pairedIds[pp.p2]=true;
    pairDetails.push({idx:i,p1:pp.p1,p2:pp.p2,winDiff:diff,isRematch:isRematch,labels:[]});
  }

  // 4. avoidableWinDiffPairs 算定
  //   勝数グループごとに「内部マッチング（再戦回避）が成立するか」を確認し、
  //   不可避な cross-group ペアの最低数（forced）を見積る。
  var groups={};
  for(var pi=0;pi<safePairings.length;pi++){
    var pp=safePairings[pi];
    if(!pp||!pp.p1||!pp.p2)continue;
    var w1=wins[pp.p1]||0, w2=wins[pp.p2]||0;
    if(!groups.hasOwnProperty(w1))groups[w1]=[];
    if(!groups.hasOwnProperty(w2))groups[w2]=[];
    groups[w1].push(pp.p1);
    groups[w2].push(pp.p2);
  }
  // 各グループ内で再戦回避マッチングを試行（バックトラック）
  function canMatchInternally(ids,hist){
    if(ids.length===0)return true;
    if(ids.length%2!==0)return false;
    var used={};
    function tryMatch(){
      var first=-1;
      for(var i=0;i<ids.length;i++){if(!used[i]){first=i;break;}}
      if(first===-1)return true;
      used[first]=true;
      for(var j=first+1;j<ids.length;j++){
        if(used[j])continue;
        if(hist[ids[first]]&&hist[ids[first]][ids[j]])continue;
        used[j]=true;
        if(tryMatch())return true;
        used[j]=false;
      }
      used[first]=false;
      return false;
    }
    return tryMatch();
  }
  var oddGroupCount=0;
  var unmatchableEvenGroupCount=0;
  for(var key in groups){
    if(!groups.hasOwnProperty(key))continue;
    var ids=groups[key];
    if(ids.length%2===1){oddGroupCount+=1;}
    else if(!canMatchInternally(ids,history)){unmatchableEvenGroupCount+=1;}
  }
  // 奇数群が k 個あれば 必ず ceil(k/2) 個の cross-group ペアが発生する
  // 内部マッチング不可能な偶数群は「全員を別群と組ませる必要がある」最悪ケースを許容
  var forcedMixed=Math.ceil(oddGroupCount/2)+unmatchableEvenGroupCount;
  var avoidableWinDiffPairs=Math.max(0,currentMixedCount-forcedMixed);

  // 5. ラベル付与（§2）
  var warningHit=(rematchCount>0)||(avoidableWinDiffPairs>0)||(maxWinDiff>=2);
  for(var di=0;di<pairDetails.length;di++){
    var d=pairDetails[di];
    var pp=safePairings[di];
    var labels=[];
    if(d.p1&&d.p2){
      labels.push(d.winDiff===0?'同勝数':('勝数差'+d.winDiff));
      labels.push(d.isRematch?'再戦':'再戦なし');
      // 個別ペアが警告条件に該当する場合のみ [要確認]
      var pairWarning=d.isRematch||(d.winDiff>=2)||(avoidableWinDiffPairs>0&&d.winDiff>0);
      if(pairWarning)labels.push('要確認');
      if(pp&&pp.lastModifiedBy==='manual')labels.push('手動変更');
    }
    d.labels=labels;
  }

  return {
    totalWinDiff:totalWinDiff,
    maxWinDiff:maxWinDiff,
    sameScorePairCount:sameScorePairCount,
    rematchCount:rematchCount,
    avoidableWinDiffPairs:avoidableWinDiffPairs,
    warningHit:warningHit,
    pairDetails:pairDetails
  };
}

function generatePairing(cls){
  var players=state.players[cls];
  if(players.length<2)return;
  var wins=getWins(cls);
  var played={};
  for(var i=0;i<players.length;i++)played[players[i].id]=[];
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      var match=state.results[cls][r][m];
      if(match.winner){
        played[match.p1].push(match.p2);
        played[match.p2].push(match.p1);
      }
    }
  }

  // 勝ち数降順ソート後、全体を完全ランダムにシャッフル（勝ち数順は維持）
  var sorted=players.slice().sort(function(a,b){return (wins[b.id]||0)-(wins[a.id]||0);});
  // 同勝ち数グループを完全ランダムにシャッフル
  var si=0;
  while(si<sorted.length){
    var sj=si;
    var sw=wins[sorted[si].id]||0;
    while(sj<sorted.length&&(wins[sorted[sj].id]||0)===sw)sj++;
    // グループ全体をFisher-Yatesで完全シャッフル
    for(var sk=sj-1;sk>si;sk--){
      var sl=si+Math.floor(Math.random()*(sk-si+1));
      var stmp=sorted[sk];sorted[sk]=sorted[sl];sorted[sl]=stmp;
    }
    si=sj;
  }
  // さらに全体も勝ち数を崩さない範囲でシャッフル（登録順の影響を排除）
  // 同勝ち数の選手同士の順番はすでにランダム化済み

  // バックトラッキングでペアリング生成
  var pairedArr=[];
  for(var i=0;i<sorted.length;i++)pairedArr.push(false);
  var pairs=[];

  function backtrack(idx,allowRematch){
    while(idx<sorted.length&&pairedArr[idx])idx++;
    if(idx>=sorted.length)return true;
    // 候補を勝数差で評価。同勝ち数グループ内はランダム順、グループ間は勝数差昇順
    var pi=sorted[idx];
    var piWins=wins[pi.id]||0;
    // 勝数差ごとにバケット化
    var buckets={};
    for(var j=idx+1;j<sorted.length;j++){
      if(pairedArr[j])continue;
      var pj=sorted[j];
      if(!allowRematch&&played[pi.id].indexOf(pj.id)>=0)continue;
      var diff=Math.abs((wins[pj.id]||0)-piWins);
      if(!buckets[diff])buckets[diff]=[];
      buckets[diff].push(j);
    }
    // 勝数差昇順でバケットを並べ、各バケット内をシャッフルしてフラット化
    var diffs=[];
    for(var dk in buckets){if(buckets.hasOwnProperty(dk))diffs.push(Number(dk));}
    diffs.sort(function(a,b){return a-b;});
    var candidates=[];
    for(var di=0;di<diffs.length;di++){
      var bucket=buckets[diffs[di]];
      // Fisher-Yatesでバケット内をシャッフル
      for(var bi=bucket.length-1;bi>0;bi--){
        var bj=Math.floor(Math.random()*(bi+1));
        var bt=bucket[bi];bucket[bi]=bucket[bj];bucket[bj]=bt;
      }
      for(var bk=0;bk<bucket.length;bk++)candidates.push(bucket[bk]);
    }
    for(var ci=0;ci<candidates.length;ci++){
      var j=candidates[ci];
      pairedArr[idx]=true;pairedArr[j]=true;
      // A-4 §4: 自動生成ペアには lastModifiedBy: 'auto' を付与
      pairs.push({p1:sorted[idx].id,p2:sorted[j].id,winner:null,lastModifiedBy:'auto'});
      if(backtrack(idx+1,allowRematch))return true;
      pairs.pop();
      pairedArr[idx]=false;pairedArr[j]=false;
    }
    return false;
  }

  if(!backtrack(0,false))backtrack(0,true);

  state.pairings[cls]=pairs;
  save();
  // A-5.1-SAVE-003 / SAVE-004: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
  // false は「保存未確認」（保存失敗と断定しない）。組合せ生成は rollback しない・運営は継続する。
  // SAVE-004: length 一致だけでは「同件数だが中身が古い stale pairings」を見逃すため、
  // pairingsMatchSnapshot で p1/p2/winner（lastModifiedBy は両側に存在する場合のみ）も比較する。
  var persisted_gp=readPersistedState();
  var pairingsOk_gp=persisted_gp&&persisted_gp.pairings&&pairingsMatchSnapshot(persisted_gp.pairings[cls],pairs);
  if(!pairingsOk_gp){
    notifySaveWarning({
      message:'組み合わせを生成しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください',
      consoleTag:'SAVE-004: generatePairing の保存が確認できませんでした (cls='+cls+', expected='+pairs.length+')',
      callsiteId:'SAVE-004-generatePairing'
    });
  }
}

function setWinner(cls,idx,wid){
  if(state.pairings[cls][idx].winner===wid){
    state.pairings[cls][idx].winner=null;
  } else {
    state.pairings[cls][idx].winner=wid;
  }
  renderTournament(cls);save();
  // A-5.1-SAVE-003: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
  // false は「保存未確認」（保存失敗と断定しない）。勝敗入力は rollback しない・運営は継続する。
  var expectedWinner=state.pairings[cls][idx].winner;
  var persisted_sw=readPersistedState();
  if(!persisted_sw||!persisted_sw.pairings||!Array.isArray(persisted_sw.pairings[cls])||!persisted_sw.pairings[cls][idx]||persisted_sw.pairings[cls][idx].winner!==expectedWinner){
    notifySaveWarning({
      message:'勝敗を入力しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください',
      consoleTag:'SAVE-003: setWinner の保存が確認できませんでした (cls='+cls+', idx='+idx+', expected='+expectedWinner+')',
      callsiteId:'SAVE-003-setWinner'
    });
  }
}

function buildChangePairingModalHtml(cls, idx, candidates, match){
  var opts='';
  for(var i=0;i<candidates.length;i++){
    // A-4 §3 MF6-a: プルダウン表示も「番号｜名前」フォーマット
    // A-5.1 §11.8: 番号は entryNoOf 経由（欠番維持された entry_no を反映）
    var optLabel=entryNoOf(cls,candidates[i].id)+'｜'+candidates[i].name;
    opts+='<option value="'+candidates[i].id+'"'+(candidates[i].id===match.p1?' selected':'')+'>'+escapeHtml(optLabel)+'</option>';
  }
  var opts2='';
  for(var i=0;i<candidates.length;i++){
    var optLabel2=entryNoOf(cls,candidates[i].id)+'｜'+candidates[i].name;
    opts2+='<option value="'+candidates[i].id+'"'+(candidates[i].id===match.p2?' selected':'')+'>'+escapeHtml(optLabel2)+'</option>';
  }
  return '<div style="background:rgba(0,0,0,0.5);position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;display:flex;align-items:center;justify-content:center;" id="chg-modal">'
    +'<div style="background:#fff;border-radius:12px;padding:24px;width:320px;">'
    +'<h3 style="margin-bottom:16px;font-size:16px;color:#1F3864">対戦相手の変更</h3>'
    +'<div style="margin-bottom:12px"><label style="font-size:12px;color:#666;display:block;margin-bottom:4px">先手</label>'
    +'<select id="chg-p1" style="width:100%;height:36px;border:1px solid #ccc;border-radius:8px;font-size:14px">'+opts+'</select></div>'
    +'<div style="margin-bottom:20px"><label style="font-size:12px;color:#666;display:block;margin-bottom:4px">後手</label>'
    +'<select id="chg-p2" style="width:100%;height:36px;border:1px solid #ccc;border-radius:8px;font-size:14px">'+opts2+'</select></div>'
    +'<div style="display:flex;gap:8px;justify-content:flex-end">'
    +'<button onclick="document.getElementById(\'chg-modal\').remove()" style="padding:8px 16px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:14px;cursor:pointer">キャンセル</button>'
    +'<button id="chg-save" style="padding:8px 16px;border-radius:8px;border:none;background:#1F3864;color:#fff;font-size:14px;cursor:pointer">変更を保存</button>'
    +'</div></div></div>';
}

function bindChangePairingModalEvents(cls, idx){
  document.getElementById('chg-save').addEventListener('click',function(){
    var newP1=document.getElementById('chg-p1').value;
    var newP2=document.getElementById('chg-p2').value;
    var match=state.pairings[cls][idx];
    var oldP1=match.p1, oldP2=match.p2;

    if(newP1===newP2){alert('同じ選手を先手・後手両方に選べません');return;}
    if(newP1===oldP1 && newP2===oldP2){alert('変更がありません');return;}

    var keepPlayer, X;
    if(newP1===oldP1 && newP2!==oldP2){ keepPlayer=oldP1; X=newP2; }
    else if(newP2===oldP2 && newP1!==oldP1){ keepPlayer=oldP2; X=newP1; }
    else { alert('2 選手同時の変更は対象外です。1 名ずつ変更してください');return; }

    var otherIdx=findPairContainingPlayer(cls, X, idx);

    if(otherIdx===-1){
      if(pairHasRematch(cls, keepPlayer, X)){
        if(!confirm('この組み合わせは過去に対戦済みです。再戦として保存しますか？'))return;
      }
      // A-4 §4: 手動変更ペアには lastModifiedBy: 'manual' を付与
      state.pairings[cls][idx]={p1:newP1,p2:newP2,winner:null,lastModifiedBy:'manual'};
    } else {
      var otherPair=state.pairings[cls][otherIdx];
      if(otherPair.winner){
        alert('相手ペアが結果入力済みのため swap できません');
        return;
      }
      var Y=(otherPair.p1===X)?otherPair.p2:otherPair.p1;
      var droppedFromTarget=(keepPlayer===oldP1)?oldP2:oldP1;

      if(pairHasRematch(cls, keepPlayer, X) || pairHasRematch(cls, droppedFromTarget, Y)){
        alert('swap で再戦が発生します。別の選手を選んでください');
        return;
      }

      var newOtherP1=(otherPair.p1===X)?droppedFromTarget:otherPair.p1;
      var newOtherP2=(otherPair.p2===X)?droppedFromTarget:otherPair.p2;

      if(!confirm('swap を実行します。\n  ('+getName(oldP1,cls)+'-'+getName(oldP2,cls)+') → ('+getName(newP1,cls)+'-'+getName(newP2,cls)+')\n  ('+getName(otherPair.p1,cls)+'-'+getName(otherPair.p2,cls)+') → ('+getName(newOtherP1,cls)+'-'+getName(newOtherP2,cls)+')\nよろしいですか?'))return;

      var backup1=state.pairings[cls][idx];
      var backup2=state.pairings[cls][otherIdx];
      // A-4 §4: swap で影響を受けた両ペアに lastModifiedBy: 'manual' を付与
      state.pairings[cls][idx]={p1:newP1,p2:newP2,winner:null,lastModifiedBy:'manual'};
      state.pairings[cls][otherIdx]={p1:newOtherP1,p2:newOtherP2,winner:null,lastModifiedBy:'manual'};

      if(getDuplicatePlayersInPairings(cls).length>0){
        state.pairings[cls][idx]=backup1;
        state.pairings[cls][otherIdx]=backup2;
        alert('内部エラー: swap 後の重複を検出しました。変更を取り消しました');
        return;
      }
    }

    document.getElementById('chg-modal').remove();
    renderTournament(cls);save();
    // A-5.1-SAVE-003b: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
    // false は「保存未確認」（保存失敗と断定しない）。対戦相手変更 / swap は rollback しない・運営は継続する。
    // pairingsMatchSnapshot で配列全体（p1 / p2 / winner、両側存在時のみ lastModifiedBy）を比較するため、
    // swap で 2 ペア同時に変わっても、片方だけ stale になっているケースを検知できる。
    var expectedPairings_cp=state.pairings[cls];
    var persisted_cp=readPersistedState();
    var pairingsOk_cp=persisted_cp&&persisted_cp.pairings&&pairingsMatchSnapshot(persisted_cp.pairings[cls],expectedPairings_cp);
    if(!pairingsOk_cp){
      if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: bindChangePairingModalEvents の保存が確認できませんでした (cls='+cls+', idx='+idx+')');
      showMsg('対戦相手を変更しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください','warn');
    }
  });
}

function changePairing(cls,idx){
  var match=state.pairings[cls][idx];
  if(match.winner){
    alert('結果入力済みのため変更できません');
    return;
  }
  var candidates=state.players[cls];
  var html=buildChangePairingModalHtml(cls, idx, candidates, match);
  var div=document.createElement('div');
  div.innerHTML=html;
  document.body.appendChild(div.firstChild);
  bindChangePairingModalEvents(cls, idx);
}

function submitRound(cls){
  var unfinished=state.pairings[cls].filter(function(m){return !m.winner;});
  if(unfinished.length>0){alert('全試合の結果を入力してください');return;}
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      if(!state.results[cls][r][m].winner){
        alert((r+1)+'回戦に未入力の対局があります。修正してから確定してください');return;
      }
    }
  }
  var playerMap={};
  for(var pi=0;pi<state.players[cls].length;pi++){
    playerMap[state.players[cls][pi].id]=true;
  }
  var usedIds={};
  for(var i=0;i<state.pairings[cls].length;i++){
    var m=state.pairings[cls][i];
    if(!playerMap[m.p1]||!playerMap[m.p2]){alert((i+1)+'試合目に登録されていない選手が含まれています。「対戦相手変更」または「組み合わせを再生成」で修正してください。');return;}
    if(usedIds[m.p1]){alert(getName(m.p1,cls)+'が複数の対局に登録されています。対戦相手を修正してください。');return;}
    if(usedIds[m.p2]){alert(getName(m.p2,cls)+'が複数の対局に登録されています。対戦相手を修正してください。');return;}
    if(m.p1===m.p2){alert(getName(m.p1,cls)+'が同じ対局の先手・後手に登録されています。対戦相手を修正してください。');return;}
    usedIds[m.p1]=true;
    usedIds[m.p2]=true;
  }
  var missing=[];
  for(var i=0;i<state.players[cls].length;i++){
    var p=state.players[cls][i];
    if(!usedIds[p.id])missing.push(p.name);
  }
  if(missing.length>0){
    alert('次の参加者が対局に登録されていません：\n'+missing.join('、')+'\n\n「対戦相手変更」または「組み合わせを再生成」で全員を対局に入れてください。');return;
  }
  state.results[cls].push(JSON.parse(JSON.stringify(state.pairings[cls])));
  state.pairings[cls]=[];
  if(state.results[cls].length<state.rounds)generatePairing(cls);
  renderTournament(cls);save();
  // A-5.1-SAVE-003: save() は例外を握り潰すため書込み後に localStorage を再読込して検証。
  // false は「保存未確認」（保存失敗と断定しない）。回戦確定は rollback しない・運営は継続する。
  // 内部で generatePairing(cls) が呼ばれた場合、in-memory の state.pairings[cls] は新ペアを保持する。
  // PR #48 Codex Should Fix: pairings は length 一致だけでは stale を見逃すため、
  // pairingsMatchSnapshot で p1/p2/winner（lastModifiedBy は両側に存在する場合のみ）も比較する。
  var expectedRoundsLen=state.results[cls].length;
  var expectedPairings=state.pairings[cls];
  var persisted_sr=readPersistedState();
  var resultsOk=persisted_sr&&persisted_sr.results&&Array.isArray(persisted_sr.results[cls])&&persisted_sr.results[cls].length===expectedRoundsLen;
  var pairingsOk=persisted_sr&&persisted_sr.pairings&&pairingsMatchSnapshot(persisted_sr.pairings[cls],expectedPairings);
  if(!resultsOk||!pairingsOk){
    notifySaveWarning({
      message:'回戦を確定しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください',
      consoleTag:'SAVE-003: submitRound の保存が確認できませんでした (cls='+cls+', expectedRounds='+expectedRoundsLen+', expectedPairings='+expectedPairings.length+')',
      callsiteId:'SAVE-003-submitRound'
    });
  }
}

  for(var i=0;i<sorted.length;i++){
    var p=sorted[i];var w=wins[p.id]||0;
    var total=0;for(var r=0;r<state.results[cls].length;r++){for(var m=0;m<state.results[cls][r].length;m++){var mm=state.results[cls][r][m];if(mm.p1===p.id||mm.p2===p.id)total++;}}
    html+='<div class="score-card"><div class="sname">'+escapeHtml(getNameWithNo(p.id,cls))+'</div><div class="swins">'+w+'</div><div style="font-size:11px;color:#888">'+w+'勝'+(total-w)+'敗</div></div>';
  }
  html+='</div>';
  return html;
}

function buildPlayedHistoryHtml(cls, sorted, played){

  // A-4 §1, §6: ペアリング品質評価 → 警告バナー（表示のみ・ブロックしない）
  var quality=evaluatePairingQuality(state.pairings[cls],state.results[cls],state.players[cls]);
  if(quality.warningHit){
    var warns=[];

    if(quality.avoidableWinDiffPairs>0)warns.push('同勝数で組めた可能性のある異勝数ペア '+quality.avoidableWinDiffPairs+'件');
    if(quality.maxWinDiff>=2)warns.push('勝数差 '+quality.maxWinDiff+' のペアあり');
    html+='<div class="alert alert-warn" style="margin-bottom:12px">⚠ 要確認：'+escapeHtml(warns.join(' / '))+'<div style="font-size:11px;color:#666;margin-top:4px">※ 操作はブロックされません。例外判断は現場運営に委ねます。</div></div>';

  for(var i=0;i<state.pairings[cls].length;i++){

    for(var li=0;li<detail.labels.length;li++){

    }
    html+='<div class="pairing-card" style="position:relative">'
      // A-4 §3 MF6-a: 卓番号バッジ（配列 index+1 から算出。永続化なし）
      +'<div style="position:absolute;top:6px;left:6px;padding:2px 8px;border-radius:4px;background:#1F3864;color:#fff;font-size:11px;font-weight:bold">第 '+(i+1)+' 卓</div>'
      +'<button style="position:absolute;top:6px;right:6px;padding:3px 7px;border-radius:5px;border:1px solid #ccc;background:#fff;font-size:11px;color:#888;cursor:pointer" id="chgbtn_'+cls+'_'+i+'">変更</button>'
      +'<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;margin-top:28px">'
      +'<div style="display:flex;flex-direction:column;align-items:center">'

      +(m.winner===m.p1?'<div style="font-size:11px;font-weight:bold;color:#27500A;text-align:center;margin-top:3px">▲ 勝</div>':'')
      +'</div>'
      +'<span style="font-weight:500;color:#888;padding-top:12px">vs</span>'
      +'<div style="display:flex;flex-direction:column;align-items:center">'
      +'<button class="winner-btn'+(m.winner===m.p2?' selected':'')+'" id="wb_'+cls+'_'+i+'_p2">'+escapeHtml(n2)+'</button>'
      +(m.winner===m.p2?'<div style="font-size:11px;font-weight:bold;color:#27500A;text-align:center;margin-top:3px">▲ 勝</div>':'')
      +'</div>'
      +'</div>'

      +(labelsHtml?'<div style="margin-top:4px">'+labelsHtml+'</div>':'')

  }
  html+='<div style="display:flex;gap:8px;margin-top:8px">'

}

function bindTournamentEvents(cls){
  for(var i=0;i<state.pairings[cls].length;i++){
    (function(idx,c){
      var m=state.pairings[cls][idx];
      var b1=document.getElementById('wb_'+c+'_'+idx+'_p1');
      var b2=document.getElementById('wb_'+c+'_'+idx+'_p2');
      var cb=document.getElementById('chgbtn_'+c+'_'+idx);
      if(b1)b1.addEventListener('click',function(){setWinner(c,idx,m.p1);});
      if(b2)b2.addEventListener('click',function(){setWinner(c,idx,m.p2);});
      if(cb)cb.addEventListener('click',function(){changePairing(c,idx);});
    })(i,cls);
  }
  var sb=document.getElementById('submitBtn_'+cls);
  if(sb)sb.addEventListener('click',function(){submitRound(cls);});
  var rb=document.getElementById('repairBtn_'+cls);
  if(rb)rb.addEventListener('click',function(){
    var hasWinner=state.pairings[cls].some(function(m){return m.winner;});
    if(hasWinner){
      if(!confirm('入力済みの勝敗があります。組み合わせを再生成すると勝敗が消えます。続けますか？'))return;
    }
    generatePairing(cls);renderTournament(cls);
  });

  for(var rr=0;rr<state.results[cls].length;rr++){
    for(var mm=0;mm<state.results[cls][rr].length;mm++){
      (function(ri,mi,c){
        var btn=document.getElementById('editpast_'+c+'_'+ri+'_'+mi);
        if(btn)btn.addEventListener('click',function(){editPastResult(c,ri,mi);});
      })(rr,mm,cls);
    }
  }
}

function renderTournament(cls){
  var el=document.getElementById('pane-'+cls);
  if(!el)return;
  var players=state.players[cls];
  if(players.length===0){el.innerHTML='<div class="section"><h2>'+cls+'クラス</h2><p style="color:#888">参加者なし</p></div>';return;}
  var wins=getWins(cls);
  var done=state.results[cls].length>=state.rounds;
  var roundNum=state.results[cls].length+1;
  var sorted=players.slice().sort(function(a,b){return (wins[b.id]||0)-(wins[a.id]||0);});

  var played={};
  for(var i=0;i<players.length;i++)played[players[i].id]=[];
  for(var r=0;r<state.results[cls].length;r++){
    for(var m=0;m<state.results[cls][r].length;m++){
      var match=state.results[cls][r][m];
      if(match.winner){
        played[match.p1].push(match.p2);
        played[match.p2].push(match.p1);
      }
    }
  }

  var html='<div class="section"><h2>'+cls+'クラス</h2>';
  html+=buildScoreGridHtml(cls, sorted, wins);
  html+=buildPlayedHistoryHtml(cls, sorted, played);
  html+=buildPastResultsHtml(cls);
  html+=buildCurrentPairingsHtml(cls, roundNum, done);

  el.innerHTML=html;
  bindTournamentEvents(cls);
}

function bindEditPastResultModalEvents(cls, roundIdx, matchIdx){

  });
  // A-5.1-SAVE-003b: 過去結果修正の保存確認。p1 / p2 両経路で readPersistedState 経由に
  // インライン index 確認で expectedWinner と照合する。多次元 index の存在チェックを必ず行い、
  // どこかが欠落していれば保存未確認扱い。rollback しない・alert しない。
  function verifyPastResultPersisted_ep(expectedWinner){
    var persisted_ep=readPersistedState();
    if(!persisted_ep||!persisted_ep.results)return false;
    var rArr=persisted_ep.results[cls];
    if(!Array.isArray(rArr))return false;
    var round=rArr[roundIdx];
    if(!Array.isArray(round))return false;
    var match=round[matchIdx];
    if(!match||typeof match!=='object')return false;
    return match.winner===expectedWinner;
  }
  document.getElementById('ep-p1').addEventListener('click',function(){
    state.results[cls][roundIdx][matchIdx].winner=state.results[cls][roundIdx][matchIdx].p1;
    document.getElementById('edit-past-modal').remove();
    renderTournament(cls);renderResults();save();
    var expectedWinner_p1=state.results[cls][roundIdx][matchIdx].winner;
    if(!verifyPastResultPersisted_ep(expectedWinner_p1)){
      if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: bindEditPastResultModalEvents (p1) の保存が確認できませんでした (cls='+cls+', round='+roundIdx+', match='+matchIdx+', expected='+expectedWinner_p1+')');
      showMsg('過去結果を修正しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください','warn');
    }
  });
  document.getElementById('ep-p2').addEventListener('click',function(){
    state.results[cls][roundIdx][matchIdx].winner=state.results[cls][roundIdx][matchIdx].p2;
    document.getElementById('edit-past-modal').remove();
    renderTournament(cls);renderResults();save();
    var expectedWinner_p2=state.results[cls][roundIdx][matchIdx].winner;
    if(!verifyPastResultPersisted_ep(expectedWinner_p2)){
      if(typeof console!=='undefined'&&console.warn)console.warn('SAVE-003b: bindEditPastResultModalEvents (p2) の保存が確認できませんでした (cls='+cls+', round='+roundIdx+', match='+matchIdx+', expected='+expectedWinner_p2+')');
      showMsg('過去結果を修正しましたが、保存が確認できませんでした。ブラウザを閉じる前にバックアップしてください','warn');
    }
  });
}
